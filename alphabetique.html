<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="mobile.css">
    <title>Le Malicieux - Index Alphabétique</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --nav-bg: rgba(15, 15, 15, 0.85); }

        #bg-layer {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat;
        }
        /* Overlay sombre pour lisibilité */
        body::after {
            content: ''; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: -1; pointer-events: none;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            padding-top: 116px;
            overflow-x: hidden;
        }

        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 30px; height: 30px; border-radius: 4px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }

        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 5px; order: -1; }

        .search-bar-wrap {
            display: flex; align-items: center; gap: 8px;
            flex: 1; min-width: 200px;
        }
        .search-bar-wrap input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            height: 30px;
        }
        .search-bar-wrap input:focus { outline: none; border-color: var(--primary); }
        .search-bar-wrap select {
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.8em;
            height: 30px;
            cursor: pointer;
        }

        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links .nav-btn {
            background: var(--primary); border: none; color: white;
            padding: 5px 10px; border-radius: 4px; font-size: 0.8em;
            text-decoration: none; cursor: pointer; white-space: nowrap;
            font-weight: bold;
        }
        .nav-links .discord-btn {
            background: #5865F2; color: white; text-decoration: none;
            padding: 5px 10px; border-radius: 20px; font-size: 0.8em;
            font-weight: bold; white-space: nowrap;
            border: 2px solid rgba(255,255,255,0.15);
            display: inline-flex; align-items: center; gap: 5px;
        }
        .nav-links .discord-btn::before { content: '💬'; font-size: 0.9em; }
        .nav-links .discord-btn:hover { background: #4752c4; border-color: rgba(255,255,255,0.3); }

        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }

        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .search-bar-wrap { order: 3; width: 100%; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links {
                position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
                background: #0f0f0f; flex-direction: column; padding: 30px 20px;
                transition: 0.4s cubic-bezier(0.4,0,0.2,1); z-index: 1100; align-items: stretch;
                overflow-y: auto;
                left: auto;
                right: -100%;
            }
            .nav-links.active { right: 0; left: auto; }
            .nav-links a, .nav-links .nav-btn, .nav-links .discord-btn { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .nav-links .discord-btn { margin-top: auto; border-radius: 20px; justify-content: center; }
            body { padding-top: 106px; }
        }

        .content-area { position: relative; z-index: 1; padding: 20px 15px; min-height: 100vh; max-width: 1400px; margin: 0 auto; }
        .letter-anchor { display: flex; align-items: center; gap: 12px; margin: 30px 0 12px 0; }
        .letter-badge { font-size: 1.1em; font-weight: 900; color: var(--primary); min-width: 50px; height: 50px; padding: 0 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,71,87,0.1); border: 2px solid var(--primary); border-radius: 10px; flex-shrink: 0; white-space: nowrap; }
        .letter-line { flex: 1; height: 1px; background: linear-gradient(to right, rgba(255,71,87,0.4), transparent); }
        .anime-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 10px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.8em; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card .img-container { width: 100%; aspect-ratio: 2/3; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; height: 2.4em; overflow: hidden; font-size: 1.05em; line-height: 1.2; }
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 4px; font-size: 0.72em; color: #bbb; margin-top: 2px; }
        .highlight { background: var(--primary); color: white; padding: 0 3px; border-radius: 3px; font-weight: bold; }
        .alpha-nav { position: fixed; top: 50px; left: 0; right: 0; z-index: 998; display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 4px; padding: 4px 16px; background: rgba(15,15,15,0.97); backdrop-filter: blur(10px); border-bottom: 1px solid #1a1a1a; height: 36px; align-items: center; scrollbar-width: none; box-sizing: border-box; }
        .alpha-nav::-webkit-scrollbar { display: none; }
        .alpha-nav a { color: #aaa; text-decoration: none; font-weight: bold; font-size: 0.8em; padding: 2px 6px; border-radius: 4px; transition: 0.2s; border: 1px solid #2a2a2a; flex-shrink: 0; }
        .alpha-nav a:hover { color: white; border-color: var(--primary); background: rgba(255,71,87,0.1); }
        .alpha-nav a.disabled { color: #333; border-color: #1a1a1a; pointer-events: none; }
        #no-result { text-align: center; color: #ccc; padding: 40px; font-size: 1.1em; display: none; }

        .display-mode-bar {
            display: flex; align-items: center; gap: 8px; padding: 0 15px; max-width: 1400px; margin: 0 auto 15px;
            flex-wrap: wrap;
        }
        .display-mode-bar select {
            background: #1e1e1e; border: 1px solid #3a3a3a; color: white;
            padding: 4px 8px; border-radius: 5px; font-size: 0.8em; height: 30px; cursor: pointer;
        }
        .display-mode-bar label { font-size: 0.75em; color: #888; }

        .list-table-wrap { display: none; overflow-x: auto; max-width: 1400px; margin: 0 auto; padding: 0 15px; }
        .list-table-wrap.active { display: block; }
        .anime-list.table-hidden { display: none; }
        .list-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; font-size: 0.8em; }
        .list-table th, .list-table td { padding: 8px; border-bottom: 1px solid #222; text-align: left; }
        .list-table th { color: var(--primary); font-size: 0.75em; text-transform: uppercase; }
        .list-table a { color: white; text-decoration: none; }
        .list-table a:hover { color: var(--primary); }
        .list-table .table-img { width: 35px; height: 50px; object-fit: cover; border-radius: 3px; }

        @media (max-width: 1000px) { 
            .anime-list { grid-template-columns: repeat(3, 1fr); gap: 8px; } 
            .card-info { padding: 5px; } 
            .card-title { font-size: 0.85em; } 
            .card-meta-row { font-size: 0.65em; gap: 2px; } 
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M65SBS3C"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div id="bg-layer"></div>

    <div class="top-navbar">
        <div class="burger" onclick="toggleM()">☰</div>
        <div class="nav-left">
            <a href="index.html" class="nav-brand">
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX</span>
            </a>
        </div>

        <div class="search-bar-wrap">
            <input type="text" id="search" placeholder="Rechercher un anime...">
            <select id="sort-select">
                <option value="">🔀 Aléatoire</option>
                <option value="popularite">📈 Popularité</option>
                <option value="score">⭐ Score</option>
                <option value="nom">📝 Nom (A-Z)</option>
                <option value="sortie">📅 Année</option>
                <option value="episodes">🎞️ Épisodes</option>
                <option value="etat">🛠️ État</option>
                <option value="censure">🔞 Censure</option>
                <option value="editeur">🏢 Éditeur</option>
            </select>
        </div>

        <div class="mobile-overlay" id="overlay" onclick="toggleM()"></div>

        <div class="nav-links" id="menu">
            <div class="close-menu" onclick="toggleM()">← Retour</div>
            <a href="index.html">🏠 Accueil</a>
            <a href="tags.html">🏷️ Tags</a>
            <a href="alphabetique.html">📖 A-Z</a>
            <a href="playlist.html">📂 Playlist</a>
            <a href="editeurs.html">🏢 Studios</a>
            <button class="nav-btn" onclick="randomAnime()">🎲 Random</button>
            <a href="share.html">🔗 Partager</a>
            <a href="profil.html">👤 Profil</a>
            <a href="index_old.html">🕰️ Ancien Index</a>
            <a href="https://discord.gg/4DY3Zq4vW4" target="_blank" class="discord-btn">Discord</a>
        </div>
    </div>

    <div class="alpha-nav" id="alpha-nav"></div>

    <div class="content-area">
        <div class="display-mode-bar">
            <label>Affichage :</label>
            <select id="display-mode" onchange="switchDisplayMode()">
                <option value="grid">Icônes</option>
                <option value="list">Liste</option>
            </select>
        </div>
        <div id="groups-container"></div>
        <div class="list-table-wrap" id="list-table-wrap">
            <table class="list-table" id="list-table">
                <thead><tr><th>#</th><th>Image</th><th>Titre</th><th>Score</th><th>Pop.</th><th>Année</th><th>Épisodes</th><th>Censure</th><th>État</th><th>Éditeur</th></tr></thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
        <div id="no-result">Aucun anime trouvé pour cette recherche.</div>
    </div>

    <script type="module">
        // Le script original intégral, avec la fonction setBackground() et sans applyParallax().
        // On garde le script intact, seule la partie setBackground est modifiée pour ne plus faire de parallax.
        // Nous avons aussi retiré l'appel à applyParallax() dans init().

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let allAnimes = [];
        let currentFiltered = [];
        let currentDisplayMode = localStorage.getItem('alphaDisplayMode') || 'grid';

        document.getElementById('display-mode').value = currentDisplayMode;

        onAuthStateChanged(auth, async (user) => {});

        window.handleImgError = function(img, fileNameFromCSV) {
            if (!img.dataset.attempt) img.dataset.attempt = "1";
            const lastDotIndex = fileNameFromCSV.lastIndexOf('.');
            const base = lastDotIndex !== -1 ? fileNameFromCSV.substring(0, lastDotIndex) : fileNameFromCSV;
            if (img.dataset.attempt === "1") { img.dataset.attempt = "2"; img.src = `img/${base}.webp`; }
            else if (img.dataset.attempt === "2") { img.dataset.attempt = "3"; img.src = `img/${base}.png`; }
            else if (img.dataset.attempt === "3") { img.dataset.attempt = "4"; img.src = `img/${base}.jpg`; }
            else { img.onerror = null; img.src = 'img/logo.jpg'; }
        };

        function getGroupKey(name) {
            const first = name.trim()[0] || '';
            if (/[0-9]/.test(first)) return '#';
            const letter = first.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
            if (/[A-Z]/.test(letter)) return letter;
            return '★';
        }

        function buildAlphaNav(groups) {
            const nav = document.getElementById('alpha-nav');
            const allKeys = ['★', '#', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')];
            nav.innerHTML = allKeys.map(k => {
                const hasContent = groups[k] && groups[k].length > 0;
                return `<a href="${hasContent ? '#group-' + k : '#'}" class="${hasContent ? '' : 'disabled'}">${k}</a>`;
            }).join('');
        }

        function normalizeSearch(str) {
            return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[-_.:;,!?()'"&~#|]/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function sortAnimes(list, sortMode) {
            if (!sortMode) return [...list];
            const sorted = [...list];
            if (sortMode === 'score') {
                sorted.sort((a,b) => parseFloat((b.score||'0').replace(',','.')) - parseFloat((a.score||'0').replace(',','.')));
            } else if (sortMode === 'popularite') {
                sorted.sort((a,b) => (parseInt((a.pop||'').replace('#',''))||99999) - (parseInt((b.pop||'').replace('#',''))||99999));
            } else if (sortMode === 'sortie') {
                sorted.sort((a,b) => {
                    const ya = parseInt((a.sortie||'').match(/\d{4}/)?.[0]||'0');
                    const yb = parseInt((b.sortie||'').match(/\d{4}/)?.[0]||'0');
                    return yb - ya;
                });
            } else if (sortMode === 'episodes') {
                sorted.sort((a,b) => {
                    const ea = parseInt((a.ep||'').match(/\d+/g)?.pop()||'0');
                    const eb = parseInt((b.ep||'').match(/\d+/g)?.pop()||'0');
                    return eb - ea;
                });
            } else if (sortMode === 'nom') {
                sorted.sort((a,b) => a.nom.localeCompare(b.nom, 'fr'));
            } else if (sortMode === 'censure') {
                sorted.sort((a,b) => (a.censure||'').localeCompare(b.censure||''));
            } else if (sortMode === 'etat') {
                sorted.sort((a,b) => (a.etat||'').localeCompare(b.etat||''));
            } else if (sortMode === 'editeur') {
                sorted.sort((a,b) => (a.editeur||'').localeCompare(b.editeur||''));
            }
            return sorted;
        }

        function switchDisplayMode() {
            currentDisplayMode = document.getElementById('display-mode').value;
            localStorage.setItem('alphaDisplayMode', currentDisplayMode);
            render(document.getElementById('search').value, document.getElementById('sort-select').value);
        }
        window.switchDisplayMode = switchDisplayMode;

        function render(searchVal = '', sortMode = '') {
            const container = document.getElementById('groups-container');
            const noResult = document.getElementById('no-result');
            const tableWrap = document.getElementById('list-table-wrap');
            const listBody = document.getElementById('list-body');
            const query = normalizeSearch(searchVal);

            let filtered = allAnimes;
            if (query) {
                filtered = allAnimes.filter(a => normalizeSearch(a.nom).includes(query));
            }

            filtered = sortAnimes(filtered, sortMode);
            currentFiltered = filtered;

            const groups = {};
            for (const a of filtered) {
                const key = getGroupKey(a.nom);
                if (!groups[key]) groups[key] = [];
                groups[key].push(a);
            }

            for (const key in groups) {
                groups[key].sort((a, b) => a.nom.localeCompare(b.nom, 'fr', { sensitivity: 'base' }));
            }

            const orderedKeys = ['★', '#', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')].filter(k => groups[k]);
            const hl = (field) => sortMode === field ? 'class="highlight"' : '';

            if (orderedKeys.length === 0) {
                container.innerHTML = '';
                tableWrap.classList.remove('active');
                noResult.style.display = 'block';
                return;
            }
            noResult.style.display = 'none';

            const isGrid = currentDisplayMode === 'grid';

            if (isGrid) {
                tableWrap.classList.remove('active');
                container.style.display = '';

                container.innerHTML = orderedKeys.map(key => {
                    const label = key === '★' ? '★ Spéciaux' : key === '#' ? '# Chiffres' : key;
                    const cards = groups[key].map(a => `
                        <a href="video.html?name=${encodeURIComponent(a.nom)}" class="card">
                            <div class="img-container">
                                <img src="img/${a.img}" loading="lazy" onerror="handleImgError(this, '${a.img}')">
                            </div>
                            <div class="card-info">
                                <div class="card-title">${a.nom}</div>
                                <div class="card-meta-row">
                                    <span ${hl('sortie')}>📅${a.sortie}</span>
                                    <span ${hl('score')}>⭐${a.score}</span>
                                    <span ${hl('popularite')}>📈${a.pop}</span>
                                </div>
                                <div class="card-meta-row">
                                    <span ${hl('episodes')}>🎞️${a.ep}</span>
                                    <span ${hl('censure')}>🔞${a.censure}</span>
                                    <span ${hl('etat')}>🛠️${a.etat}</span>
                                </div>
                                ${a.editeur ? `<div class="card-meta-row"><span ${hl('editeur')} style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🏢${a.editeur}</span></div>` : ''}
                            </div>
                        </a>`).join('');

                    return `
                        <div id="group-${key}" class="letter-anchor">
                            <div class="letter-badge">${label}</div>
                            <div class="letter-line"></div>
                        </div>
                        <div class="anime-list">${cards}</div>`;
                }).join('');
            } else {
                container.innerHTML = '';
                tableWrap.classList.add('active');

                let globalIndex = 0;
                let rows = '';
                orderedKeys.forEach(key => {
                    const label = key === '★' ? '★ Spéciaux' : key === '#' ? '# Chiffres' : key;
                    rows += `<tr><td colspan="10" style="background:#1a1a1a; color:var(--primary); font-weight:bold; padding:10px 8px; font-size:1em;">${label}</td></tr>`;
                    groups[key].forEach(a => {
                        globalIndex++;
                        rows += `<tr>
                            <td>${globalIndex}</td>
                            <td><img src="img/${a.img}" class="table-img" loading="lazy" onerror="handleImgError(this, '${a.img}')"></td>
                            <td><a href="video.html?name=${encodeURIComponent(a.nom)}">${a.nom}</a></td>
                            <td ${hl('score')}>⭐${a.score}</td>
                            <td ${hl('popularite')}>📈${a.pop}</td>
                            <td ${hl('sortie')}>📅${a.sortie}</td>
                            <td ${hl('episodes')}>🎞️${a.ep}</td>
                            <td ${hl('censure')}>🔞${a.censure}</td>
                            <td ${hl('etat')}>🛠️${a.etat}</td>
                            <td ${hl('editeur')}>${a.editeur||'—'}</td>
                        </tr>`;
                    });
                });
                listBody.innerHTML = rows;
            }

            const navGroups = {};
            for (const a of filtered) {
                const k = getGroupKey(a.nom);
                if (!navGroups[k]) navGroups[k] = [];
                navGroups[k].push(a);
            }
            buildAlphaNav(navGroups);
        }

        function setBackground() {
            const isMobile = window.innerWidth <= 1000;
            const n = isMobile ? Math.floor(Math.random() * 14) + 1 : Math.floor(Math.random() * 64) + 1;
            document.getElementById('bg-layer').style.backgroundImage = `url('img/${isMobile ? 'mobile' + n : 'fond' + n}.webp')`;
        }

        // Pas de parallax

        async function init() {
            setBackground();

            try {
                const response = await fetch('animes.csv');
                const rawData = await response.text();
                allAnimes = rawData.split(/\r?\n/).slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0] || c.length < 9) return null;
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                    return {
                        nom: clean(c[0]), pop: clean(c[1]), score: clean(c[2]),
                        sortie: clean(c[3]), ep: clean(c[4]), censure: clean(c[5]),
                        etat: clean(c[6]), img: clean(c[8]),
                        tags: clean(c[12]), editeur: clean(c[14])
                    };
                }).filter(a => a !== null);

                const allGroups = {};
                for (const a of allAnimes) {
                    const k = getGroupKey(a.nom);
                    if (!allGroups[k]) allGroups[k] = [];
                    allGroups[k].push(a);
                }
                buildAlphaNav(allGroups);
                render();
            } catch (err) { console.error("Erreur CSV:", err); }
        }

        document.getElementById('search').oninput = (e) => render(e.target.value, document.getElementById('sort-select').value);
        document.getElementById('sort-select').onchange = () => render(document.getElementById('search').value, document.getElementById('sort-select').value);

        function toggleM() {
            const menu = document.getElementById('menu');
            const overlay = document.getElementById('overlay');
            const isOpen = menu.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = isOpen ? 'hidden' : '';
        }
        window.toggleM = toggleM;

        window.randomAnime = () => {
            if (allAnimes.length > 0) {
                const a = allAnimes[Math.floor(Math.random() * allAnimes.length)];
                window.location.href = `video.html?name=${encodeURIComponent(a.nom)}`;
            }
        };

        init();
    </script>
</body>
</html>
