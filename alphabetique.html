<!DOCTYPE html>
<html lang="fr">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-M65SBS3C');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Malicieux - Index Alphabétique</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --nav-bg: rgba(15, 15, 15, 0.85); }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            margin: 0;
            min-height: 100vh;
        }

        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-left { display: flex; flex-direction: column; align-items: flex-start; }
        .nav-brand { display: flex; align-items: center; gap: 12px; }
        .nav-logo-small { width: 35px; height: 35px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 1.1em; }

        .nav-center { display: flex; gap: 8px; align-items: center; }
        .nav-center input, .nav-center select, .nav-center button, .nav-center a {
            background: #222; border: 1px solid #444; color: white; padding: 6px 10px; border-radius: 4px; font-size: 0.85em; text-decoration: none;
        }
        .btn-red { background: var(--primary) !important; border: none !important; font-weight: bold; cursor: pointer; color: white !important; }

        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; }

        .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 7px 14px; border-radius: 5px; font-size: 0.85em; font-weight: bold; }
        .auth-status { font-size: 0.9em; color: #ccc; margin-right: 12px; }

        .burger { display: none; font-size: 28px; cursor: pointer; color: white; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }

        /* Page content */
        .content-area {
            background: linear-gradient(to top, rgba(0,0,0,1) 80%, transparent);
            padding: 30px 15px;
            min-height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 1.8em;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
            padding-left: 5px;
        }

        /* Lettre ancre */
        .letter-anchor {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 30px 0 12px 0;
        }
        .letter-badge {
            font-size: 2em;
            font-weight: 900;
            color: var(--primary);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,71,87,0.1);
            border: 2px solid var(--primary);
            border-radius: 10px;
            flex-shrink: 0;
        }
        .letter-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(255,71,87,0.4), transparent);
        }

        /* Grille d'animes */
        .anime-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 10px;
        }

        .card {
            background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s;
            border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.8em;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card .img-container { width: 100%; aspect-ratio: 2/3; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; height: 2.4em; overflow: hidden; font-size: 1.05em; line-height: 1.2; }
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 4px; font-size: 0.72em; color: #bbb; margin-top: 2px; }

        /* Navigation alphabétique rapide */
        .alpha-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 25px;
            padding: 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            border: 1px solid #333;
        }
        .alpha-nav a {
            color: #aaa;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9em;
            padding: 4px 8px;
            border-radius: 5px;
            transition: 0.2s;
            border: 1px solid #333;
        }
        .alpha-nav a:hover { color: white; border-color: var(--primary); background: rgba(255,71,87,0.1); }
        .alpha-nav a.disabled { color: #444; border-color: #222; pointer-events: none; }

        /* Barre de recherche */
        .search-bar-wrap {
            margin-bottom: 20px;
        }
        .search-bar-wrap input {
            width: 100%;
            box-sizing: border-box;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 1em;
        }
        .search-bar-wrap input:focus { outline: none; border-color: var(--primary); }

        #no-result {
            text-align: center;
            color: #555;
            padding: 40px;
            font-size: 1.1em;
            display: none;
        }

        @media (max-width: 1000px) {
            .burger { display: block; }
            .close-menu { display: block; }
            .nav-center {
                position: fixed; top: 0; left: -100%; width: 280px; height: 100vh;
                background: #0f0f0f; flex-direction: column; padding: 30px 20px;
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1100; align-items: stretch;
            }
            .nav-center.active { left: 0; }
            .nav-center * { margin: 8px 0; font-size: 1em !important; padding: 12px !important; }
            .mobile-overlay.active { display: block; }
            .anime-list { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .card-info { padding: 5px; }
            .card-title { font-size: 0.85em; }
            .card-meta-row { font-size: 0.65em; gap: 2px; }
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M65SBS3C"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="top-navbar">
        <div class="nav-left">
            <div class="nav-brand">
                <div class="burger" onclick="toggleM()">☰</div>
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX</span>
            </div>
        </div>

        <div class="mobile-overlay" id="overlay" onclick="toggleM()"></div>

        <div class="nav-center" id="menu">
            <div class="close-menu" onclick="toggleM()">← Retour</div>
            <a href="index.html" class="btn-red">🏠 Accueil</a>
            <a href="tags.html" class="btn-red">🏷️ Tags</a>
            <a href="playlist.html" class="btn-red">📂 Playlist</a>
            <button onclick="randomAnime()" class="btn-red">🎲 Random</button>
        </div>

        <div style="display:flex; align-items:center;">
            <div id="auth-ui" style="display:flex; align-items:center;">
                <button id="login-btn" class="btn-red" style="padding:7px 15px;">Connexion</button>
            </div>
            <a href="https://discord.gg/4DY3Zq4vW4" target="_blank" class="discord-btn" style="margin-left:10px;">Discord</a>
        </div>
    </div>

    <div class="content-area">
        <div class="page-title">📖 Index Alphabétique</div>

        <div class="search-bar-wrap">
            <input type="text" id="search" placeholder="Rechercher un anime...">
        </div>

        <div class="alpha-nav" id="alpha-nav"></div>

        <div id="groups-container"></div>
        <div id="no-result">Aucun anime trouvé pour cette recherche.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let allAnimes = [];

        onAuthStateChanged(auth, (user) => {
            const authUi = document.getElementById('auth-ui');
            if (user) {
                authUi.innerHTML = `<span class="auth-status">${user.displayName}</span><button id="logout-btn" class="discord-btn" style="background:#333; border:none; cursor:pointer;">Quitter</button>`;
                document.getElementById('logout-btn').onclick = () => signOut(auth);
            } else {
                authUi.innerHTML = `<button id="login-btn" class="btn-red" style="padding:7px 15px;">Connexion</button>`;
                document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        window.handleImgError = function(img, fileNameFromCSV) {
            if (!img.dataset.attempt) img.dataset.attempt = "1";
            const lastDotIndex = fileNameFromCSV.lastIndexOf('.');
            const base = lastDotIndex !== -1 ? fileNameFromCSV.substring(0, lastDotIndex) : fileNameFromCSV;
            if (img.dataset.attempt === "1") { img.dataset.attempt = "2"; img.src = `img/${base}.webp`; }
            else if (img.dataset.attempt === "2") { img.dataset.attempt = "3"; img.src = `img/${base}.png`; }
            else if (img.dataset.attempt === "3") { img.dataset.attempt = "4"; img.src = `img/${base}.jpg`; }
            else { img.onerror = null; img.src = 'img/logo.jpg'; }
        };

        function getGroupKey(name) {
            const first = name.trim()[0] || '';
            if (/[0-9]/.test(first)) return '#';
            const letter = first.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
            if (/[A-Z]/.test(letter)) return letter;
            return '★'; // caractères spéciaux
        }

        function buildAlphaNav(groups) {
            const nav = document.getElementById('alpha-nav');
            const allKeys = ['★', '#', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')];
            nav.innerHTML = allKeys.map(k => {
                const hasContent = groups[k] && groups[k].length > 0;
                return `<a href="${hasContent ? '#group-' + k : '#'}" class="${hasContent ? '' : 'disabled'}">${k}</a>`;
            }).join('');
        }

        function render(searchVal = '') {
            const container = document.getElementById('groups-container');
            const noResult = document.getElementById('no-result');
            const query = searchVal.toLowerCase().trim();

            // Grouper les animes filtrés
            const groups = {};
            for (const a of allAnimes) {
                if (query && !a.nom.toLowerCase().includes(query)) continue;
                const key = getGroupKey(a.nom);
                if (!groups[key]) groups[key] = [];
                groups[key].push(a);
            }

            // Trier les animes dans chaque groupe
            for (const key in groups) {
                groups[key].sort((a, b) => a.nom.localeCompare(b.nom, 'fr', { sensitivity: 'base' }));
            }

            // Ordre d'affichage : spéciaux → chiffres → A-Z
            const orderedKeys = ['★', '#', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')].filter(k => groups[k]);

            if (orderedKeys.length === 0) {
                container.innerHTML = '';
                noResult.style.display = 'block';
                return;
            }
            noResult.style.display = 'none';

            container.innerHTML = orderedKeys.map(key => {
                const label = key === '★' ? '★ Spéciaux' : key === '#' ? '# Chiffres' : key;
                const cards = groups[key].map(a => `
                    <a href="video.html?name=${encodeURIComponent(a.nom)}" class="card">
                        <div class="img-container">
                            <img src="img/${a.img}" loading="lazy" onerror="handleImgError(this, '${a.img}')">
                        </div>
                        <div class="card-info">
                            <div class="card-title">${a.nom}</div>
                            <div class="card-meta-row">
                                <span>📅${a.sortie}</span>
                                <span>⭐${a.score}</span>
                                <span>📈${a.pop}</span>
                            </div>
                            <div class="card-meta-row">
                                <span>🎞️${a.ep}</span>
                                <span>🔞${a.censure}</span>
                                <span>🛠️${a.etat}</span>
                            </div>
                        </div>
                    </a>`).join('');

                return `
                    <div id="group-${key}" class="letter-anchor">
                        <div class="letter-badge">${label}</div>
                        <div class="letter-line"></div>
                    </div>
                    <div class="anime-list">${cards}</div>`;
            }).join('');

            // Mettre à jour la nav (griser les lettres sans résultat dans la recherche)
            buildAlphaNav(groups);
        }

        async function init() {
            const isMobile = window.innerWidth <= 1000;
            let fileName = isMobile ? `mobile${Math.floor(Math.random() * 13) + 1}.webp` : `fond${Math.floor(Math.random() * 64) + 1}.webp`;
            document.body.style.backgroundImage = `url('img/${fileName}')`;

            try {
                const response = await fetch('animes.csv');
                const rawData = await response.text();
                allAnimes = rawData.split(/\r?\n/).slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0] || c.length < 9) return null;
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                    return {
                        nom: clean(c[0]), pop: clean(c[1]), score: clean(c[2]),
                        sortie: clean(c[3]), ep: clean(c[4]), censure: clean(c[5]),
                        etat: clean(c[6]), img: clean(c[8]),
                        tags: clean(c[12])
                    };
                }).filter(a => a !== null);

                // Construire la nav initiale avec tous les groupes
                const allGroups = {};
                for (const a of allAnimes) {
                    const k = getGroupKey(a.nom);
                    if (!allGroups[k]) allGroups[k] = [];
                    allGroups[k].push(a);
                }
                buildAlphaNav(allGroups);

                render();
            } catch (err) { console.error("Erreur CSV:", err); }
        }

        document.getElementById('search').oninput = (e) => render(e.target.value);

        window.toggleM = () => {
            document.getElementById('menu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        };

        window.randomAnime = () => {
            if (allAnimes.length > 0) {
                const a = allAnimes[Math.floor(Math.random() * allAnimes.length)];
                window.location.href = `video.html?name=${encodeURIComponent(a.nom)}`;
            }
        };

        init();
    </script>
</body>
</html>
