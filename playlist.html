<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Malicieux - Mes Playlists</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --nav-bg: rgba(15, 15, 15, 0.85); }
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); background-size: cover;
            background-attachment: fixed; background-position: center; color: var(--text); 
            margin: 0; min-height: 100vh;
        }
        
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        
        .search-wrapper {
            position: relative; flex: 1; min-width: 180px; max-width: 300px;
        }
        .search-wrapper input {
            width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; 
            padding: 6px 30px 6px 10px; border-radius: 5px; font-size: 0.85em;
            box-sizing: border-box; outline: none;
        }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: #888; font-size: 0.9em; pointer-events: none;
        }
        .search-suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #1a1a1a; border: 1px solid #333; border-radius: 0 0 5px 5px;
            max-height: 300px; overflow-y: auto; display: none; z-index: 2000;
        }
        .search-suggestions.active { display: block; }
        .search-suggestions .suggestion-item {
            padding: 6px 10px; cursor: pointer; color: #ccc; font-size: 0.8em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 8px;
        }
        .search-suggestions .suggestion-item:hover { background: #2a2a2a; }
        .search-suggestions .suggestion-item .sugg-img { width: 24px; height: 34px; border-radius: 3px; object-fit: cover; }
        
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links button { 
            background: #222; border: 1px solid #444; color: white; 
            padding: 5px 10px; border-radius: 4px; font-size: 0.8em; 
            text-decoration: none; cursor: pointer; white-space: nowrap;
        }
        .btn-red { background: var(--primary) !important; border: none !important; font-weight: bold; }
        
        .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; white-space: nowrap; }
        
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; }
        
        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .search-wrapper { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links {
                position: fixed; top: 0; left: -100%; width: 280px; height: 100vh;
                background: #0f0f0f; flex-direction: column; padding: 30px 20px;
                transition: 0.4s cubic-bezier(0.4,0,0.2,1); z-index: 1100; align-items: stretch;
            }
            .nav-links.active { left: 0; }
            .nav-links a, .nav-links button { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }

        .playlist-header { padding: 20px 20px 10px; text-align: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .controls-row { display: flex; justify-content: center; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .playlist-select { background: #222; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; outline: none; cursor: pointer; font-size: 0.8em; min-width: 130px; }
        .btn-delete-list { background: #333; color: #ff4757; border: 1px solid #ff4757; padding: 8px; border-radius: 5px; cursor: pointer; display: none; font-size: 0.8em; }
        .playlist-selector { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .select-card { background: var(--card-bg); border: 1px solid #333; padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .select-card.active { border-color: var(--primary); background: rgba(255, 71, 87, 0.2); }
        .select-card h3 { margin: 0; font-size: 0.8em; }
        .container { padding: 15px; max-width: 1300px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { position: relative; background: var(--card-bg); border-radius: 8px; overflow: hidden; transition: 0.3s; border: 1px solid #333; text-decoration: none; color: inherit; }
        .card:hover { transform: translateY(-6px); border-color: var(--primary); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-info { padding: 6px; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 3px; overflow: hidden; font-size: 0.9em; white-space: nowrap; text-overflow: ellipsis; }
        .delete-btn-overlay { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: #ff4757; border: none; border-radius: 4px; padding: 4px 6px; cursor: pointer; z-index: 10; opacity: 0; transition: 0.3s; font-size: 0.7em; }
        .card:hover .delete-btn-overlay { opacity: 1; }
        .list-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow: hidden; display: none; font-size: 0.8em; }
        .list-table th { background: #111; padding: 8px; text-align: left; color: var(--primary); border-bottom: 2px solid #333; font-size: 0.75em; }
        .list-table td { padding: 8px; border-bottom: 1px solid #222; }
        .status-bar { width: 5px; padding: 0 !important; }
        .status-watching-bg { background: #2ecc71; }
        .status-completed-bg { background: #3498db; }
        .status-waiting-bg { background: #f1c40f; }
        .list-img { width: 35px; height: 50px; object-fit: cover; border-radius: 3px; vertical-align: middle; margin-right: 8px; }
        .empty-msg { text-align: center; font-size: 1.1em; color: #888; margin-top: 40px; grid-column: 1 / -1; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: #1a1a1a; border: 1px solid #444; border-radius: 12px; padding: 20px; max-width: 320px; width: 90%; text-align: center; }
        .modal-box p { margin: 0 0 18px; font-size: 0.9em; color: #ddd; }
        .modal-actions { display: flex; gap: 8px; justify-content: center; }
        .modal-btn { padding: 8px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 0.85em; }
        .modal-btn-cancel { background: #333; color: #ccc; border: 1px solid #555; }
        .modal-btn-confirm { background: var(--primary); color: white; }
        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } .status-bar { display: none; } }
    </style>
</head>
<body>
    <nav class="top-navbar">
        <div class="burger" onclick="toggleM()">☰</div>
        <div class="nav-left">
            <a href="index.html" class="nav-brand">
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX <small style="color:white;">• Playlist</small></span>
            </a>
        </div>
        
        <div class="search-wrapper">
            <input type="text" id="playlist-search" placeholder="Rechercher un anime..." autocomplete="off">
            <span class="search-icon">🔍</span>
            <div class="search-suggestions" id="search-suggestions"></div>
        </div>

        <div class="mobile-overlay" id="overlay" onclick="toggleM()"></div>
        <div class="nav-links" id="menu">
            <div class="close-menu" onclick="toggleM()">← Retour</div>
            <a href="index.html" class="btn-red">🏠 Accueil</a>
            <a href="tags.html">🏷️ Tags</a>
            <a href="alphabetique.html">📖 A-Z</a>
            <a href="editeurs.html">🏢 Studios</a>
            <a href="index_old.html">🕰️ Ancien Index</a>
            <a href="share.html">🔗 Partager</a>
            <a href="https://discord.gg/4DY3Zq4vW4" target="_blank" class="discord-btn">Discord</a>
        </div>
        <a href="profil.html" id="nav-profil-link" style="display:flex; align-items:center; gap:5px; text-decoration:none; color:#ccc; font-size:0.75em; flex-shrink:0;">
            <img id="nav-avatar" src="img/logo.jpg" style="width:26px; height:26px; border-radius:50%; border:2px solid var(--primary); object-fit:cover; display:none;">
            <span id="nav-pseudo" style="display:none;"></span>
        </a>
    </nav>

    <div class="playlist-header">
        <div class="controls-row">
            <select id="custom-selector" class="playlist-select"><option value="all">Toutes mes playlists</option></select>
            <button id="btn-del-playlist" class="btn-delete-list" title="Supprimer cette playlist">🗑️</button>
            <select id="display-mode" class="playlist-select"><option value="grid">Affichage : Icônes</option><option value="list">Affichage : Liste</option></select>
            <select id="sort-selector" class="playlist-select">
                <option value="date">Trier par : Ajout</option><option value="nom">Nom (A-Z)</option>
                <option value="score_mal">Score MAL</option><option value="popularite">Popularité</option>
                <option value="sortie">Année</option><option value="episodes">Épisodes</option>
                <option value="note_perso">Ma Note (⭐)</option><option value="editeur">Éditeur</option>
            </select>
        </div>
        <div class="playlist-selector">
            <div class="select-card" data-status="watching"><h3>En cours</h3></div>
            <div class="select-card" data-status="completed"><h3>Terminés</h3></div>
            <div class="select-card" data-status="waiting"><h3>En attente</h3></div>
        </div>
    </div>

    <div class="container">
        <div id="playlist-grid" class="grid"></div>
        <table id="playlist-table" class="list-table">
            <thead><tr><th class="status-bar"></th><th>#</th><th>Image</th><th>Titre</th><th>Ma Note</th><th>Progrès</th><th>Score MAL</th><th>Pop.</th><th>Année</th><th>Censure</th><th>Éditeur</th><th>Action</th></tr></thead>
            <tbody id="list-body"></tbody>
        </table>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-box"><p id="modal-msg"></p><div class="modal-actions"><button class="modal-btn modal-btn-cancel" id="modal-cancel">Annuler</button><button class="modal-btn modal-btn-confirm" id="modal-confirm">Supprimer</button></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, doc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let userAnimes = [];
        let csvDataMap = {};
        let searchQuery = '';

        function normalize(str) {
            return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[-_.:;,!?()'"&~#|]/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function getRealImgPath(firebaseImgName) {
            if(!firebaseImgName) return "img/logo.jpg";
            const match = firebaseImgName.match(/\d+/);
            const num = match ? match[0] : "0";
            return `img/anime-${num}.jpg`;
        }

        window.handleImgErr = function(img, firebaseImgName) {
            if (!img.dataset.step) { img.dataset.step = "1"; const match = firebaseImgName.match(/\d+/); const num = match ? match[0] : "0"; img.src = `img/anime-${num}.png`; } 
            else { img.onerror = null; img.src = 'img/logo.jpg'; }
        };
        
        let currentStatus = localStorage.getItem('playlistTab') || 'watching';
        const savedDisplay = localStorage.getItem('playlistDisplayMode') || 'grid';
        document.getElementById('display-mode').value = savedDisplay;

        const savePos = () => sessionStorage.setItem('playlistScrollPos', window.scrollY);
        window.addEventListener('beforeunload', savePos);

        function restoreScroll() { const scrollPos = sessionStorage.getItem('playlistScrollPos'); if (scrollPos) { window.scrollTo(0, parseInt(scrollPos)); sessionStorage.removeItem('playlistScrollPos'); } }

        function setRandomBackground() { const isMobile = window.innerWidth <= 1000; let fileName = isMobile ? `mobile${Math.floor(Math.random() * 13) + 1}.webp` : `fond${Math.floor(Math.random() * 64) + 1}.webp`; document.body.style.backgroundImage = `url('img/${fileName}')`; }

        async function loadCSV() {
            const resp = await fetch('animes.csv');
            const text = await resp.text();
            text.split(/\r?\n/).slice(1).forEach(line => {
                const c = line.split(';');
                const cl = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                if(c[0]) { csvDataMap[cl(c[0])] = { pop: cl(c[1]), score: cl(c[2]), sortie: cl(c[3]), epMax: cl(c[4]), censure: cl(c[5]), editeur: cl(c[14]) }; }
            });
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                setRandomBackground();
                await loadCSV();
                updateTabUI();
                const cachedPseudo = sessionStorage.getItem('userPseudo');
                const cachedAvatar = sessionStorage.getItem('userAvatar');
                if (cachedPseudo) { document.getElementById('nav-pseudo').textContent = cachedPseudo; document.getElementById('nav-pseudo').style.display = 'inline'; }
                if (cachedAvatar || user.photoURL) { const av = document.getElementById('nav-avatar'); av.src = cachedAvatar || user.photoURL; av.style.display = 'inline-block'; }

                onSnapshot(query(collection(db, "playlists_custom"), where("uid", "==", user.uid)), (snap) => {
                    const selector = document.getElementById('custom-selector');
                    const currentVal = selector.value;
                    let myOpts = '', sharedOpts = '';
                    snap.forEach(d => { const data = d.data(); const opt = `<option value="${data.name}">${data.name}</option>`; if (data.shared) sharedOpts += opt; else myOpts += opt; });
                    let html = '<option value="all">Toutes mes playlists</option>';
                    if (myOpts) html += myOpts;
                    if (sharedOpts) html += `<optgroup label="── Playlists reçues ──">${sharedOpts}</optgroup>`;
                    selector.innerHTML = html;
                    selector.value = currentVal || 'all';
                    toggleDeleteBtn();
                });

                onSnapshot(query(collection(db, "playlists"), where("uid", "==", user.uid)), (snap) => {
                    userAnimes = [];
                    snap.forEach(d => { const data = d.data(); const csv = csvDataMap[data.anime] || {}; userAnimes.push({ id: d.id, ...data, ...csv }); });
                    refreshDisplay();
                });
            }
        });

        function updateTabUI() { document.querySelectorAll('.select-card').forEach(card => { card.classList.toggle('active', card.dataset.status === currentStatus); }); }

        function showConfirm(msg, onConfirm) { const overlay = document.getElementById('confirm-modal'); document.getElementById('modal-msg').innerHTML = msg; overlay.classList.add('active'); document.getElementById('modal-confirm').onclick = () => { overlay.classList.remove('active'); onConfirm(); }; document.getElementById('modal-cancel').onclick = () => { overlay.classList.remove('active'); }; }

        window.removeAnime = async (e, id) => { e.preventDefault(); e.stopPropagation(); showConfirm('Supprimer cet anime ?', async () => await deleteDoc(doc(db, "playlists", id))); };

        document.getElementById('btn-del-playlist').onclick = () => { const name = document.getElementById('custom-selector').value; if(name === "all") return; showConfirm(`Supprimer la playlist <strong>${name}</strong> et tout son contenu ?`, async () => { const qCustom = query(collection(db, "playlists_custom"), where("uid", "==", currentUser.uid), where("name", "==", name)); const snapCustom = await getDocs(qCustom); snapCustom.forEach(async (d) => await deleteDoc(doc(db, "playlists_custom", d.id))); const qAnimes = query(collection(db, "playlists"), where("uid", "==", currentUser.uid), where("playlistTarget", "==", name)); const snapAnimes = await getDocs(qAnimes); snapAnimes.forEach(async (d) => await deleteDoc(doc(db, "playlists", d.id))); document.getElementById('custom-selector').value = "all"; toggleDeleteBtn(); }); };

        function toggleDeleteBtn() { const sel = document.getElementById('custom-selector'); document.getElementById('btn-del-playlist').style.display = (sel.value === "all") ? "none" : "inline-block"; }

        document.querySelectorAll('.select-card').forEach(card => { card.onclick = () => { currentStatus = card.dataset.status; localStorage.setItem('playlistTab', currentStatus); updateTabUI(); refreshDisplay(); }; });

        document.getElementById('custom-selector').onchange = () => { toggleDeleteBtn(); refreshDisplay(); };
        document.getElementById('display-mode').onchange = (e) => { localStorage.setItem('playlistDisplayMode', e.target.value); refreshDisplay(); };
        document.getElementById('sort-selector').onchange = refreshDisplay;
        
        const searchInput = document.getElementById('playlist-search');
        const searchSuggestions = document.getElementById('search-suggestions');
        searchInput.addEventListener('input', function() {
            searchQuery = this.value.trim();
            refreshDisplay();
            if (searchQuery.length >= 2) {
                const results = userAnimes.filter(a => normalize(a.anime).includes(normalize(searchQuery))).slice(0, 8);
                if (results.length === 0) { searchSuggestions.innerHTML = '<div class="no-result" style="padding:10px;color:#888;">Aucun résultat</div>'; } 
                else { searchSuggestions.innerHTML = results.map(a => '<div class="suggestion-item" data-name="'+a.anime.replace(/"/g,'&quot;')+'"><img src="'+getRealImgPath(a.img)+'" class="sugg-img" onerror="this.src=\'img/logo.jpg\'"><span>'+a.anime+'</span></div>').join(''); }
                searchSuggestions.classList.add('active');
            } else { searchSuggestions.classList.remove('active'); }
        });
        searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); searchSuggestions.classList.remove('active'); this.blur(); } });
        searchSuggestions.addEventListener('click', function(e) { const item = e.target.closest('.suggestion-item'); if (item && item.dataset.name) { window.location.href = 'video.html?name=' + encodeURIComponent(item.dataset.name); } });
        document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrapper')) searchSuggestions.classList.remove('active'); });

        function refreshDisplay() {
            const selectedList = document.getElementById('custom-selector').value;
            const mode = document.getElementById('display-mode').value;
            const sortVal = document.getElementById('sort-selector').value;
            const sharedPlaylistNames = new Set(Array.from(document.getElementById('custom-selector').querySelectorAll('optgroup option')).map(o => o.value));
            let filtered = userAnimes.filter(a => a.status === currentStatus);
            if (searchQuery) { filtered = filtered.filter(a => normalize(a.anime).includes(normalize(searchQuery))); }
            if (selectedList === 'all') { filtered = filtered.filter(a => !a.playlistTarget || !sharedPlaylistNames.has(a.playlistTarget)); } 
            else { filtered = filtered.filter(a => a.playlistTarget === selectedList); }
            filtered.sort((a, b) => {
                if (sortVal === "nom") return a.anime.localeCompare(b.anime);
                if (sortVal === "score_mal") return parseFloat((b.score||'0').replace(',','.')) - parseFloat((a.score||'0').replace(',','.'));
                if (sortVal === "popularite") return (parseInt((a.pop||'').replace('#',''))||99999) - (parseInt((b.pop||'').replace('#',''))||99999);
                if (sortVal === "sortie") { const ya = parseInt((a.sortie||'').match(/\d{4}/)?.[0]||'0'); const yb = parseInt((b.sortie||'').match(/\d{4}/)?.[0]||'0'); return yb - ya; }
                if (sortVal === "episodes") { const ea = parseInt((a.epMax||'').toString().match(/\d+/g)?.pop()||'0'); const eb = parseInt((b.epMax||'').toString().match(/\d+/g)?.pop()||'0'); return eb - ea; }
                if (sortVal === "note_perso") return (b.rating || 0) - (a.rating || 0);
                if (sortVal === "editeur") return (a.editeur || '').localeCompare(b.editeur || '');
                return 0;
            });
            const grid = document.getElementById('playlist-grid'); const table = document.getElementById('playlist-table'); const listBody = document.getElementById('list-body');
            if(filtered.length === 0) { grid.innerHTML = '<div class="empty-msg">Aucun anime trouvé.</div>'; grid.style.display = "grid"; table.style.display = "none"; return; }
            const hl = (val) => sortVal === val ? 'style="color:var(--primary);font-weight:bold;"' : '';
            if (mode === "grid") {
                grid.style.display = "grid"; table.style.display = "none";
                grid.innerHTML = filtered.map(a => {
                    let hlLine = '';
                    if (sortVal === 'score_mal') hlLine = `<div style="font-size:0.7em;color:var(--primary);margin-top:2px;">⭐ ${a.score||'N/A'}</div>`;
                    else if (sortVal === 'popularite') hlLine = `<div style="font-size:0.7em;color:var(--primary);margin-top:2px;">📈 ${a.pop||'N/A'}</div>`;
                    else if (sortVal === 'sortie') hlLine = `<div style="font-size:0.7em;color:var(--primary);margin-top:2px;">📅 ${a.sortie||'?'}</div>`;
                    else if (sortVal === 'episodes') hlLine = `<div style="font-size:0.7em;color:var(--primary);margin-top:2px;">🎞️ ${a.epMax||'?'} ep</div>`;
                    else if (sortVal === 'editeur') hlLine = `<div style="font-size:0.7em;color:var(--primary);margin-top:2px;">🏢 ${a.editeur||'—'}</div>`;
                    return `<div class="card"><button class="delete-btn-overlay" onclick="removeAnime(event, '${a.id}')">🗑️</button><a href="video.html?name=${encodeURIComponent(a.anime)}"><img src="${getRealImgPath(a.img)}" onerror="handleImgErr(this, '${a.img}')"><div class="card-info"><div class="card-title">${a.anime}</div><div>⭐ ${a.rating}/10 • Ep: ${a.epSeen}</div>${hlLine}</div></a></div>`;
                }).join('');
            } else {
                grid.style.display = "none"; table.style.display = "table";
                listBody.innerHTML = filtered.map((a, i) => `<tr><td class="status-bar status-${a.status}-bg"></td><td>${i+1}</td><td><img src="${getRealImgPath(a.img)}" class="list-img" onerror="handleImgErr(this, '${a.img}')"></td><td><a href="video.html?name=${encodeURIComponent(a.anime)}" style="color:white;">${a.anime}</a></td><td style="color:#f1c40f;">⭐ ${a.rating || 0}</td><td ${hl('episodes')}>${a.epSeen} / ${a.epMax || '?'}</td><td ${hl('score_mal')}>${a.score || 'N/A'}</td><td ${hl('popularite')}>${a.pop || 'N/A'}</td><td ${hl('sortie')}>${a.sortie || '?'}</td><td><span style="font-size:0.75em; background:#333; padding:2px 4px; border-radius:3px;">${a.censure || ''}</span></td><td ${hl('editeur')} style="font-size:0.75em;">${a.editeur || '—'}</td><td><button style="background:none; border:none; color:#ff4757; cursor:pointer;" onclick="removeAnime(event, '${a.id}')">🗑️</button></td></tr>`).join('');
            }
            requestAnimationFrame(restoreScroll);
        }
        
        function toggleM() { const menu = document.getElementById('menu'); const overlay = document.getElementById('overlay'); const isOpen = menu.classList.toggle('active'); overlay.classList.toggle('active'); document.body.style.overflow = isOpen ? 'hidden' : ''; }
        window.toggleM = toggleM;
    </script>
</body>
</html>
