<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="img/logo.jpg" type="image/jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="mobile.css">
    <title>Le Malicieux - Mes Playlists</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --nav-bg: rgba(15, 15, 15, 0.85); }
        #bg-layer {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: -1; pointer-events: none;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 52px;
        }
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 5px; order: -1; }
        .search-wrapper { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
        .search-wrapper input { width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; padding: 6px 30px 6px 10px; border-radius: 5px; font-size: 0.85em; outline: none; }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #888; font-size: 0.9em; pointer-events: none; }
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links .nav-btn { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8em; text-decoration: none; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .nav-links .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; white-space: nowrap; border: 2px solid rgba(255,255,255,0.15); display: inline-flex; align-items: center; gap: 5px; }
        .nav-links .discord-btn::before { content: '💬'; font-size: 0.9em; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }
        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .search-wrapper { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links {
                position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
                background: #0f0f0f; flex-direction: column; padding: 30px 20px;
                transition: 0.4s; z-index: 1100; align-items: stretch; overflow-y: auto;
                left: auto; right: -100%;
            }
            .nav-links.active { right: 0; left: auto; }
            .nav-links a, .nav-links .nav-btn, .nav-links .discord-btn { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .nav-links .discord-btn { margin-top: auto; border-radius: 20px; justify-content: center; }
            body { padding-top: 106px; }
        }
        /* Bannière de visualisation publique */
        .view-banner {
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            text-align: center;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .view-banner .back-btn {
            background: #333;
            color: #ff4757;
            border: 1px solid #ff4757;
            padding: 5px 12px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85em;
        }
        .playlist-header { padding: 20px 20px 10px; text-align: center; }
        .controls-row { display: flex; justify-content: center; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .playlist-select { background: #222; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; font-size: 0.8em; min-width: 130px; }
        .btn-delete-list { background: #333; color: #ff4757; border: 1px solid #ff4757; padding: 8px; border-radius: 5px; cursor: pointer; display: none; font-size: 0.8em; }
        .playlist-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .select-card { background: var(--card-bg); border: 1px solid #333; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .select-card.active { border-color: var(--primary); background: rgba(255,71,87,0.2); }
        .select-card h3 { margin: 0; font-size: 0.8em; }
        .container { padding: 15px; max-width: 1300px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { position: relative; background: var(--card-bg); border-radius: 8px; overflow: hidden; transition: 0.3s; border: 1px solid #333; text-decoration: none; color: inherit; }
        .card:hover { transform: translateY(-6px); border-color: var(--primary); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .card-info { padding: 6px; text-align: left; }
        .card-title { font-weight: bold; color: var(--primary); font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-btn-overlay { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: #ff4757; border: none; border-radius: 4px; padding: 4px 6px; cursor: pointer; opacity: 0; font-size: 0.7em; }
        .card:hover .delete-btn-overlay { opacity: 1; }
        .list-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow-x: auto; display: none; font-size: 0.8em; }
        .list-table.active { display: table; }
        .list-table th, .list-table td { padding: 8px; border-bottom: 1px solid #222; }
        .status-bar { width: 5px; padding: 0 !important; }
        .status-watching-bg { background: #2ecc71; }
        .status-completed-bg { background: #3498db; }
        .status-waiting-bg { background: #f1c40f; }
        .list-img { width: 35px; height: 50px; object-fit: cover; border-radius: 3px; margin-right: 8px; }
        .empty-msg { text-align: center; padding: 40px; color: #888; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: #1a1a1a; border: 1px solid #444; border-radius: 12px; padding: 20px; max-width: 320px; text-align: center; }
        .modal-actions { display: flex; gap: 8px; justify-content: center; margin-top: 18px; }
        .modal-btn { padding: 8px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .modal-btn-cancel { background: #333; color: #ccc; }
        .modal-btn-confirm { background: var(--primary); color: white; }
        .highlight { background: var(--primary); color: white; padding: 0 2px; border-radius: 3px; font-weight: bold; }
        img { image-rendering: auto; }
        html { zoom: 0.8; }
        body { width: 100%; margin-left: auto; margin-right: auto; }
        .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)) !important; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <nav class="top-navbar">
        <div class="burger" onclick="toggleM()">☰</div>
        <div class="nav-left">
            <a href="index.html" class="nav-brand">
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX <small style="color:white;">• Playlist</small></span>
            </a>
        </div>
        <div class="search-wrapper">
            <input type="text" id="playlist-search" placeholder="Rechercher dans la playlist..." autocomplete="off">
            <span class="search-icon">🔍</span>
        </div>
        <div class="mobile-overlay" id="overlay" onclick="toggleM()"></div>
        <div class="nav-links" id="menu">
            <div class="close-menu" onclick="toggleM()">← Retour</div>
            <a href="index.html">🏠 Accueil</a>
            <a href="tags.html">🏷️ Tags</a>
            <a href="alphabetique.html">📖 A-Z</a>
            <a href="playlist.html">📂 Playlist</a>
            <a href="editeurs.html">🏢 Studios</a>
            <a href="share.html">🔗 Partager</a>
            <a href="profil.html">👤 Profil</a>
            <a href="index_old.html">🕰️ Ancien Index</a>
            <a href="https://discord.gg/4DY3Zq4vW4" target="_blank" class="discord-btn">Discord</a>
        </div>
        <a href="profil.html" id="nav-profil-link" style="display:flex; align-items:center; gap:5px; text-decoration:none; color:#ccc; font-size:0.75em; flex-shrink:0;">
            <img id="nav-avatar" src="img/logo.jpg" style="width:26px; height:26px; border-radius:50%; border:2px solid var(--primary); object-fit:cover; display:none;">
            <span id="nav-pseudo" style="display:none;"></span>
        </a>
    </nav>

    <!-- Bannière si visualisation d'une playlist publique -->
    <div id="view-mode-banner" class="view-banner" style="display:none;">
        <span id="viewer-info">Visualisation de la playlist de <strong id="viewer-name"></strong></span>
        <a id="back-to-profile-btn" class="back-btn" href="#">← Retour au profil</a>
    </div>

    <div class="playlist-header">
        <div class="controls-row">
            <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <label style="font-size:0.65em;color:#888;text-transform:uppercase;letter-spacing:0.05em;">Playlist</label>
                <select id="custom-selector" class="playlist-select"><option value="all">Toutes mes playlists</option></select>
            </div>
            <button id="btn-del-playlist" class="btn-delete-list">🗑️</button>
            <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <label style="font-size:0.65em;color:#888;text-transform:uppercase;letter-spacing:0.05em;">Affichage</label>
                <select id="display-mode" class="playlist-select"><option value="grid">Icônes</option><option value="list">Liste</option></select>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <label style="font-size:0.65em;color:#888;text-transform:uppercase;letter-spacing:0.05em;">Trier par</label>
                <select id="sort-selector" class="playlist-select">
                    <option value="date">Ajout</option><option value="nom">Nom (A-Z)</option>
                    <option value="score_mal">Score MAL</option><option value="popularite">Popularité</option>
                    <option value="sortie">Année</option><option value="episodes">Épisodes</option>
                    <option value="note_perso">Ma Note</option><option value="editeur">Éditeur</option>
                </select>
            </div>
        </div>
        <div class="playlist-selector">
            <div class="select-card" data-status="watching"><h3>En cours</h3></div>
            <div class="select-card" data-status="completed"><h3>Terminés</h3></div>
            <div class="select-card" data-status="waiting"><h3>En attente</h3></div>
        </div>
    </div>

    <div class="container">
        <div id="playlist-grid" class="grid"></div>
        <table id="playlist-table" class="list-table">
            <thead><tr><th class="status-bar"></th><th>#</th><th>Image</th><th>Titre</th><th>Note</th><th>Progrès</th><th>Score MAL</th><th>Pop.</th><th>Année</th><th>Censure</th><th>Éditeur</th><th>Ajouté le</th><th>Modifié le</th><th>Action</th></tr></thead>
            <tbody id="list-body"></tbody>
        </table>
    </div>
    <div class="modal-overlay" id="confirm-modal"><div class="modal-box"><p id="modal-msg"></p><div class="modal-actions"><button class="modal-btn modal-btn-cancel" id="modal-cancel">Annuler</button><button class="modal-btn modal-btn-confirm" id="modal-confirm">Supprimer</button></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, doc, deleteDoc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);
        
        // Récupération de l'UID depuis l'URL (mode visualisation publique)
        const urlParams = new URLSearchParams(window.location.search);
        const targetUid = urlParams.get('uid');
        let isViewMode = !!targetUid;
        let targetUserPseudo = '';
        
        let currentUser = null;
        let userAnimes = [];
        let csvDataMap = {};
        let searchQuery = '';
        
        function normalize(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[-_.:;,!?()'"&~#|]/g,' ').replace(/\s+/g,' ').trim(); }
        function getRealImgPath(n){ if(!n) return "img/logo.jpg"; const m=n.match(/\d+/); return m?`img/anime-${m[0]}.jpg`:"img/logo.jpg"; }
        window.handleImgErr=function(img,n){ if(!img.dataset.step){ img.dataset.step="1"; const m=n.match(/\d+/); img.src=m?`img/anime-${m[0]}.png`:"img/logo.jpg"; } else img.onerror=null; };
        
        function dateToTs(s){
            if(!s) return 0;
            s = s.trim();
            const mois={'janv.':1,'févr.':2,'mars':3,'avr.':4,'mai':5,'juin':6,'juil.':7,'août':8,'sept.':9,'oct.':10,'nov.':11,'déc.':12,
                        'Jan':1,'Feb':2,'Mar':3,'Apr':4,'May':5,'Jun':6,'Jul':7,'Aug':8,'Sep':9,'Oct':10,'Nov':11,'Dec':12};
            const parts = s.split(' au ');
            const last = parts[parts.length-1].trim();
            const m1 = last.match(/(\d{1,2})\s+([a-zéûôA-Z.]+)\s+(\d{4})/);
            if(m1){ const mo=mois[m1[2]]||1; return new Date(+m1[3], mo-1, +m1[1]).getTime(); }
            const m2 = last.match(/([A-Za-z]{3})\s+(\d{1,2}),\s*(\d{4})/);
            if(m2){ const mo=mois[m2[1]]||1; return new Date(+m2[3], mo-1, +m2[2]).getTime(); }
            const m3 = (last.match(/\d{4}/g)||[]);
            if(m3.length){ return new Date(+m3[m3.length-1], 0, 1).getTime(); }
            return 0;
        }

        function formatAddedAt(ts){
            if(!ts) return '';
            const moisFR=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
            const d=ts.toDate?ts.toDate():(ts.seconds?new Date(ts.seconds*1000):new Date(ts));
            return `${d.getDate()} ${moisFR[d.getMonth()]} ${d.getFullYear()} à ${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
        }
        function getLastModified(a){
            const candidates=[a.epUpdatedAt, a.ratedAt, a.completedAt].filter(Boolean);
            if(!candidates.length) return null;
            return candidates.reduce((best,ts)=>{
                const s=ts.seconds||0, bs=best.seconds||0;
                return s>bs?ts:best;
            });
        }
        let currentStatus=localStorage.getItem('playlistTab')||'watching', savedDisplay=localStorage.getItem('playlistDisplayMode')||'grid';
        document.getElementById('display-mode').value=savedDisplay;
        const savePos=()=>sessionStorage.setItem('playlistScrollPos',window.scrollY); window.addEventListener('beforeunload',savePos);
        function restoreScroll(){ const p=sessionStorage.getItem('playlistScrollPos'); if(p){ window.scrollTo(0,parseInt(p)); sessionStorage.removeItem('playlistScrollPos'); } }
        async function setBackground(){ const isMobile=window.innerWidth<=1000; try{ const res=await fetch('backgrounds.json'); const data=await res.json(); const list=isMobile?data.mobile:data.desktop; if(!list||!list.length)return; const file=list[Math.floor(Math.random()*list.length)]; document.getElementById('bg-layer').style.backgroundImage=`url('img/${file}')`; }catch(e){} }
        setBackground();

        async function loadCSV(){ const r=await fetch('animes.csv'); const t=await r.text(); t.split(/\r?\n/).slice(1).forEach(l=>{ const c=l.split(';'); const cl=s=>s?s.trim().replace(/^"|"$/g,''):""; if(c[0]) csvDataMap[cl(c[0])]={ pop:cl(c[1]), score:cl(c[2]), sortie:cl(c[3]), epMax:cl(c[4]), censure:cl(c[5]), editeur:cl(c[14]) }; }); }
        
        // Chargement des données en mode visualisation publique ou mode perso
        async function loadPlaylistForUid(uid) {
            // Récupérer le pseudo de l'utilisateur
            const userDoc = await getDoc(doc(db, "users", uid));
            if (userDoc.exists()) {
                targetUserPseudo = userDoc.data().pseudo || userDoc.data().displayName || 'Utilisateur';
                document.getElementById('viewer-name').textContent = targetUserPseudo;
                document.title = `Playlist de ${targetUserPseudo} - Le Malicieux`;
            } else {
                targetUserPseudo = 'Utilisateur inconnu';
                document.getElementById('viewer-name').textContent = targetUserPseudo;
            }
            document.getElementById('view-mode-banner').style.display = 'flex';
            // Cacher les contrôles d'édition
            document.getElementById('btn-del-playlist').style.display = 'none';
            // Désactiver les sélecteurs de playlist custom (on affiche toutes ses playlists)
            const customSelect = document.getElementById('custom-selector');
            customSelect.innerHTML = '<option value="all">Toutes ses playlists</option>';
            customSelect.disabled = true;
            
            // Récupérer les animes de l'utilisateur (playlists collection)
            const playlistSnap = await getDocs(query(collection(db, "playlists"), where("uid", "==", uid)));
            // Récupérer les noms des playlists partagées (pour les exclure ? on affiche tout)
            const sharedCustomSnap = await getDocs(query(collection(db, "playlists_custom"), where("uid", "==", uid), where("shared", "==", true)));
            const sharedNames = new Set();
            sharedCustomSnap.forEach(d => sharedNames.add(d.data().name));
            
            userAnimes = [];
            playlistSnap.forEach(d => {
                const data = d.data();
                const csv = csvDataMap[data.anime] || {};
                // On inclut tous les animes (même ceux partagés ? pour la vue publique on les affiche)
                userAnimes.push({ id: d.id, ...data, ...csv });
            });
            refreshDisplay();
        }
        
        async function initPlaylist() {
            await loadCSV();
            if (isViewMode) {
                await loadPlaylistForUid(targetUid);
                // Désactiver l'ajout/suppression
                // Le bouton retour
                const backBtn = document.getElementById('back-to-profile-btn');
                backBtn.href = `profil.html?uid=${targetUid}`;
                backBtn.onclick = (e) => { e.preventDefault(); window.location.href = backBtn.href; };
                // Masquer le profil utilisateur dans la navbar
                document.getElementById('nav-profil-link').style.display = 'none';
            } else {
                // Mode normal : connecté
                onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        currentUser = u;
                        updateTabUI();
                        const cp = sessionStorage.getItem('userPseudo'), ca = sessionStorage.getItem('userAvatar');
                        if(cp) document.getElementById('nav-pseudo').textContent = cp, document.getElementById('nav-pseudo').style.display = 'inline';
                        if(ca || u.photoURL) document.getElementById('nav-avatar').src = ca || u.photoURL, document.getElementById('nav-avatar').style.display = 'inline-block';
                        
                        onSnapshot(query(collection(db, "playlists_custom"), where("uid", "==", u.uid)), (snap) => {
                            const sel = document.getElementById('custom-selector'), cur = sel.value;
                            let my = '', shared = '';
                            snap.forEach(d => {
                                const opt = `<option value="${d.data().name}">${d.data().name}</option>`;
                                d.data().shared ? shared += opt : my += opt;
                            });
                            let html = '<option value="all">Toutes mes playlists</option>';
                            if (my) html += my;
                            if (shared) html += `<optgroup label="── Playlists reçues ──">${shared}</optgroup>`;
                            sel.innerHTML = html;
                            sel.value = cur || 'all';
                            toggleDeleteBtn();
                        });
                        
                        onSnapshot(query(collection(db, "playlists"), where("uid", "==", u.uid)), (snap) => {
                            userAnimes = [];
                            snap.forEach(d => {
                                const data = d.data(), csv = csvDataMap[data.anime] || {};
                                userAnimes.push({ id: d.id, ...data, ...csv });
                            });
                            refreshDisplay();
                        });
                    } else {
                        // Non connecté, rediriger vers index pour connexion
                        window.location.href = 'index.html';
                    }
                });
            }
        }
        
        function updateTabUI(){ document.querySelectorAll('.select-card').forEach(c=>c.classList.toggle('active',c.dataset.status===currentStatus)); }
        function showConfirm(msg,onConfirm){ const ov=document.getElementById('confirm-modal'); document.getElementById('modal-msg').innerHTML=msg; ov.classList.add('active'); document.getElementById('modal-confirm').onclick=()=>{ ov.classList.remove('active'); onConfirm(); }; document.getElementById('modal-cancel').onclick=()=>ov.classList.remove('active'); }
        window.removeAnime=async(e,id)=>{ if(isViewMode) return; e.preventDefault(); showConfirm('Supprimer cet anime ?',async()=>await deleteDoc(doc(db,"playlists",id))); };
        
        function toggleDeleteBtn(){ if(isViewMode) return; const sel=document.getElementById('custom-selector'); document.getElementById('btn-del-playlist').style.display=(sel.value==="all")?"none":"inline-block"; }
        
        document.querySelectorAll('.select-card').forEach(c=>{ c.onclick=()=>{ currentStatus=c.dataset.status; localStorage.setItem('playlistTab',currentStatus); updateTabUI(); refreshDisplay(); }; });
        
        if (!isViewMode) {
            document.getElementById('custom-selector').onchange=()=>{ toggleDeleteBtn(); refreshDisplay(); };
            document.getElementById('btn-del-playlist').onclick=()=>{ const n=document.getElementById('custom-selector').value; if(n==="all") return; showConfirm(`Supprimer la playlist <strong>${n}</strong> ?`,async()=>{ const qC=query(collection(db,"playlists_custom"),where("uid","==",currentUser.uid),where("name","==",n)); (await getDocs(qC)).forEach(async d=>await deleteDoc(doc(db,"playlists_custom",d.id))); const qA=query(collection(db,"playlists"),where("uid","==",currentUser.uid),where("playlistTarget","==",n)); (await getDocs(qA)).forEach(async d=>await deleteDoc(doc(db,"playlists",d.id))); document.getElementById('custom-selector').value="all"; toggleDeleteBtn(); }); };
        }
        
        document.getElementById('display-mode').onchange=e=>{ localStorage.setItem('playlistDisplayMode',e.target.value); refreshDisplay(); };
        document.getElementById('sort-selector').onchange=refreshDisplay;
        const searchInput=document.getElementById('playlist-search');
        searchInput.addEventListener('input',function(){ searchQuery=this.value.trim(); refreshDisplay(); });
        
        function refreshDisplay(){
            const selectedList = isViewMode ? 'all' : document.getElementById('custom-selector').value;
            const mode = document.getElementById('display-mode').value;
            const sortVal = document.getElementById('sort-selector').value;
            
            let filtered = userAnimes.filter(a=>a.status===currentStatus);
            if(searchQuery) filtered=filtered.filter(a=>normalize(a.anime).includes(normalize(searchQuery)));
            if(!isViewMode && selectedList!=='all') filtered=filtered.filter(a=>a.playlistTarget===selectedList);
            
            filtered.sort((a,b)=>{
                if(sortVal==="nom") return a.anime.localeCompare(b.anime);
                if(sortVal==="date"){ const ta=a.addedAt?.seconds||0, tb=b.addedAt?.seconds||0; return tb-ta; }
                if(sortVal==="score_mal") return parseFloat((b.score||'0').replace(',','.'))-parseFloat((a.score||'0').replace(',','.'));
                if(sortVal==="popularite") return (parseInt((a.pop||'').replace('#',''))||99999)-(parseInt((b.pop||'').replace('#',''))||99999);
                if(sortVal==="sortie") return dateToTs(b.sortie)-dateToTs(a.sortie);
                if(sortVal==="episodes"){ const ea=parseInt((a.epMax||'').toString().match(/\d+/g)?.pop()||0), eb=parseInt((b.epMax||'').toString().match(/\d+/g)?.pop()||0); return eb-ea; }
                if(sortVal==="note_perso") return (b.rating||0)-(a.rating||0);
                if(sortVal==="editeur") return (a.editeur||'').localeCompare(b.editeur||'');
                return 0;
            });
            
            const grid=document.getElementById('playlist-grid'), table=document.getElementById('playlist-table'), listBody=document.getElementById('list-body');
            if(filtered.length===0){
                grid.innerHTML='<div class="empty-msg">Aucun anime trouvé.</div>';
                grid.style.display="grid"; table.classList.remove('active'); return;
            }
            const hl=v=>sortVal===v?'class="highlight"':'';
            if(mode==="grid"){
                grid.style.display="grid"; table.classList.remove('active'); listBody.innerHTML='';
                grid.innerHTML=filtered.map(a=>{
                    let hlLine='';
                    if(sortVal==='score_mal') hlLine=`<div style="font-size:0.7em;color:var(--primary);">⭐ ${a.score||'N/A'}</div>`;
                    else if(sortVal==='popularite') hlLine=`<div style="font-size:0.7em;color:var(--primary);">📈 ${a.pop||'N/A'}</div>`;
                    else if(sortVal==='sortie') hlLine=`<div class="highlight" style="font-size:0.7em;">📅 ${a.sortie||'?'}</div>`;
                    else if(sortVal==='episodes') hlLine=`<div style="font-size:0.7em;color:var(--primary);">🎞️ ${a.epMax||'?'}</div>`;
                    else if(sortVal==='editeur') hlLine=`<div style="font-size:0.7em;color:var(--primary);">🏢 ${a.editeur||'—'}</div>`;
                    const addedStr=formatAddedAt(a.addedAt), modifStr=formatAddedAt(getLastModified(a));
                    const deleteBtn = isViewMode ? '' : `<button class="delete-btn-overlay" onclick="removeAnime(event,'${a.id}')">🗑️</button>`;
                    return `<div class="card">${deleteBtn}<a href="video.html?name=${encodeURIComponent(a.anime)}" style="text-decoration:none; color:inherit;"><img src="${getRealImgPath(a.img)}" onerror="handleImgErr(this,'${a.img}')"><div class="card-info"><div class="card-title">${a.anime}</div><div style="font-size:0.75em; color:#ccc;">⭐ ${a.rating}/10 • Ep: ${a.epSeen}</div>${hlLine}${addedStr?`<div style="font-size:0.62em;color:#555;margin-top:3px;">➕ ${addedStr}</div>`:''}${modifStr?`<div style="font-size:0.62em;color:#555;margin-top:1px;">✏️ ${modifStr}</div>`:''}</div></a></div>`;
                }).join('');
            }else{
                grid.style.display="none"; grid.innerHTML=''; table.classList.add('active');
                listBody.innerHTML=filtered.map((a,i)=>`<tr><td class="status-bar status-${a.status}-bg"></td><td>${i+1}</td><td><img src="${getRealImgPath(a.img)}" class="list-img" onerror="handleImgErr(this,'${a.img}')"></td><td><a href="video.html?name=${encodeURIComponent(a.anime)}" style="color:white; text-decoration:none;">${a.anime}</a></td><td>⭐ ${a.rating||0}</td><td ${hl('episodes')}>${a.epSeen}/${a.epMax||'?'}</td><td ${hl('score_mal')}>${a.score||'N/A'}</td><td ${hl('popularite')}>${a.pop||'N/A'}</td><td ${hl('sortie')}>${sortVal==='sortie'?(a.sortie||'?'):((a.sortie||'').match(/\d{4}/g)?.pop()||a.sortie||'?')}</td><td>${a.censure||''}</td><td ${hl('editeur')}>${a.editeur||'—'}<td><td style="color:#666;font-size:0.75em;white-space:nowrap;">${formatAddedAt(a.addedAt)||'—'}</td><td style="color:#666;font-size:0.75em;white-space:nowrap;">${formatAddedAt(getLastModified(a))||'—'}</td>
                    ${isViewMode ? '' : `<td><button onclick="removeAnime(event,'${a.id}')" style="background:none;border:none;color:#ff4757;cursor:pointer;">🗑️</button></td>`}
                </tr>`).join('');
            }
            requestAnimationFrame(restoreScroll);
        }
        
        function toggleM(){ const m=document.getElementById('menu'), ov=document.getElementById('overlay'); const isOpen=m.classList.toggle('active'); ov.classList.toggle('active'); document.body.style.overflow=isOpen?'hidden':''; }
        window.toggleM=toggleM;
        window.removeAnime = window.removeAnime;
        
        initPlaylist();
    </script>
    <script>
    (function() {
        var KEY = 'sortmem_playlist';
        var IDS = ['sort-selector'];
        function save() {
            var d = {};
            IDS.forEach(function(id) {
                var el = document.getElementById(id);
                if (el) d[id] = el.value;
            });
            try { sessionStorage.setItem(KEY, JSON.stringify(d)); } catch(e) {}
        }
        function restore() {
            try {
                var raw = sessionStorage.getItem(KEY);
                if (!raw) return;
                var d = JSON.parse(raw);
                IDS.forEach(function(id) {
                    var el = document.getElementById(id);
                    if (el && d[id] !== undefined) el.value = d[id];
                });
            } catch(e) {}
        }
        document.addEventListener('DOMContentLoaded', function() {
            restore();
            IDS.forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.addEventListener('change', save);
            });
        });
    })();
    </script>
</body>
