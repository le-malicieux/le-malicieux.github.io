name: Simulation de vues (tous les 29 jours)

on:
  schedule:
    - cron: '0 3 1,29 * *'
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer yt-dlp et curl
        run: |
          sudo apt-get update
          sudo apt-get install -y curl python3 python3-pip
          pip3 install yt-dlp
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Exécuter la simulation de vues
        run: |
          # Télécharger le fichier stream.csv depuis le dépôt (il est déjà checkout)
          cp stream.csv /tmp/stream.csv
          chmod +x simulate-views.sh
          ./simulate-views.sh
        shell: bash
