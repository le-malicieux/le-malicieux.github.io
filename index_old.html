    <meta charset="UTF-8">
    <link rel="icon" href="img/logo.jpg" type="image/jpeg">

    <title>Le Malicieux - Catalogue d'Animes (version classique)</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --nav-bg: rgba(15, 15, 15, 0.85); }
        
        #bg-layer {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat;
        }
        #bg-overlay {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background: black; opacity: 0;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 5px; order: -1; }

        .search-wrapper {
            position: relative; flex: 1; min-width: 180px; max-width: 300px;
        }
        .search-wrapper input {
            width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; 
            padding: 6px 30px 6px 10px; border-radius: 5px; font-size: 0.85em;
            box-sizing: border-box; outline: none;
        }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: #888; font-size: 0.9em; pointer-events: none;
        }
        .search-suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #1a1a1a; border: 1px solid #333; border-radius: 0 0 5px 5px;
            max-height: 300px; overflow-y: auto; display: none; z-index: 2000;
        }
        .search-suggestions.active { display: block; }
        .search-suggestions .suggestion-item {
            padding: 8px 12px; cursor: pointer; color: #ccc; font-size: 0.85em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 10px;
        }
        .search-suggestions .suggestion-item:hover { background: #2a2a2a; color: white; }
        .search-suggestions .suggestion-item .sugg-img {
            width: 28px; height: 40px; border-radius: 4px; object-fit: cover;
            flex-shrink: 0;
        }

        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links button { 
            background: var(--primary); border: none; color: white; 
            padding: 5px 10px; border-radius: 4px; font-size: 0.8em; 
            text-decoration: none; cursor: pointer; white-space: nowrap;
            font-weight: bold;
        }
        .nav-links .discord-btn {
            background: #5865F2; color: white; text-decoration: none;
            padding: 5px 10px; border-radius: 20px; font-size: 0.8em;
            font-weight: bold; white-space: nowrap;
            border: 2px solid rgba(255,255,255,0.15);
            display: inline-flex; align-items: center; gap: 5px;
        }
        .nav-links .discord-btn::before { content: '💬'; font-size: 0.9em; }
        .nav-links .discord-btn:hover { background: #4752c4; border-color: rgba(255,255,255,0.3); }

        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }
        
        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .search-wrapper { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links {
                position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
                background: #0f0f0f; flex-direction: column; padding: 30px 20px;
                transition: 0.4s cubic-bezier(0.4,0,0.2,1); z-index: 1100; align-items: stretch;
                overflow-y: auto;
                left: auto;
                right: -100%;
            }
            .nav-links.active { right: 0; left: auto; }
            .nav-links a, .nav-links button { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .card-info { padding: 5px; }
            .card-title { font-size: 0.85em; }
        }

        .hero-section {
            height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .main-logo { width: 110px; height: 110px; border-radius: 20px; border: 3px solid var(--primary); margin-bottom: 15px; object-fit: cover; }
        .main-title { font-size: 2.5em; margin: 0; color: white; text-shadow: 2px 2px 12px rgba(0,0,0,0.9); font-weight: 800; }
        .main-slogan { font-size: 1.2em; font-weight: bold; margin-top: 10px; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }

        .content-area { padding: 20px 15px; min-height: 500px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1400px; margin: 0 auto; }
        
        .card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; 
            border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.75em;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-6px); border-color: var(--primary); }
        .card .img-container { width: 100%; aspect-ratio: 2/3; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 6px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 3px; height: 2.2em; overflow: hidden; font-size: 0.95em; line-height: 1.2; }
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 3px; font-size: 0.65em; color: #bbb; margin-top: 2px; }
        .highlight { background: var(--primary); color: white; padding: 0 2px; border-radius: 3px; font-weight: bold; }
        .mal-updated { color: #5dade2; }
        
        .sort-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .sort-select { background: #1e1e1e; border: 1px solid #3a3a3a; color: white; padding: 6px 10px; border-radius: 5px; font-size: 0.85em; cursor: pointer; }
        
        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; } .card-title { font-size: 0.85em; } }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M65SBS3C"

    <div class="hero-section">

    <div class="content-area">
        <div class="sort-controls">
            <select id="sort" class="sort-select">
                <option value="">🔀 Aléatoire</option>
                <option value="ordre_ajout">🆕 Ajout récent</option>
                <option value="popularite">📈 Popularité</option>
                <option value="score">⭐ Score</option>
                <option value="nom">📝 Nom (A-Z)</option>
                <option value="sortie">📅 Année</option>
                <option value="episodes">🎞️ Épisodes</option>
                <option value="etat">🛠️ État</option>
                <option value="censure">🔞 Censure</option>
                <option value="editeur">🏢 Éditeur</option>
            </select>
        </div>
        <div id="anime-container" class="grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);

        let allAnimes = [];
        let shuffledAnimes = [];
        let currentSearch = '';

        const MAL_TTL = 60 * 60 * 1000;
        function malCacheGet(nom) { try { const raw = sessionStorage.getItem('mal_cache_' + nom); if (!raw) return null; const obj = JSON.parse(raw); if (Date.now() - obj.ts > MAL_TTL) { sessionStorage.removeItem('mal_cache_' + nom); return null; } return obj; } catch { return null; } }
        function malCacheSet(nom, data) { try { sessionStorage.setItem('mal_cache_' + nom, JSON.stringify({ ...data, ts: Date.now() })); } catch {} }

        let jikanQueue = [], jikanRunning = false;
        function jikanEnqueue(task) { jikanQueue.push(task); if (!jikanRunning) jikanDrain(); }
        async function jikanDrain() { jikanRunning = true; while (jikanQueue.length > 0) { const task = jikanQueue.shift(); await task(); await new Promise(r => setTimeout(r, 400)); } jikanRunning = false; }
        
        function fetchMALForCard(nom, malId, scoreEl, popEl) {
            const cached = malCacheGet(nom);
            if (cached) { applyCardMAL(scoreEl, popEl, cached); return; }
            jikanEnqueue(async () => {
                try {
                    let item = null;
                    if (malId && malId.trim() !== '') {
                        const resp = await fetch(`https://api.jikan.moe/v4/anime/${malId.trim()}`);
                        if (resp.ok) { const j = await resp.json(); item = j.data || null; }
                    } else {
                        const q = nom.split('/')[0].trim();
                        const resp = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=1&sfw=false`);
                        if (resp.ok) { const j = await resp.json(); item = j.data?.[0] || null; }
                    }
                    if (item) { const data = { score: item.score, popularity: item.popularity }; malCacheSet(nom, data); applyCardMAL(scoreEl, popEl, data); }
                } catch(e) {}
            });
        }

        function applyCardMAL(scoreEl, popEl, data) {
            if (!scoreEl || !popEl) return;
            if (data.score != null) { scoreEl.textContent = '⭐' + parseFloat(data.score).toFixed(2); scoreEl.classList.add('mal-updated'); }
            if (data.popularity != null) { popEl.textContent = '📈#' + data.popularity.toLocaleString('fr-FR'); popEl.classList.add('mal-updated'); }
        }

        const cardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const nom = card.dataset.nom;
                    const malId = card.dataset.malid || '';
                    const scoreEl = card.querySelector('.mal-score');
                    const popEl = card.querySelector('.mal-pop');
                    if (nom && scoreEl && popEl) { fetchMALForCard(nom, malId, scoreEl, popEl); }
                    cardObserver.unobserve(card);
                }
            });
        }, { rootMargin: '200px' });

        function normalize(str) {
            return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[-_.:;,!?()'"&~#|]/g, ' ').replace(/\s+/g, ' ').trim();
        }

        window.handleImgError = function(img, fileNameFromCSV) {
            if (!img.dataset.attempt) img.dataset.attempt = "1";
            const lastDotIndex = fileNameFromCSV.lastIndexOf('.');
            const base = lastDotIndex !== -1 ? fileNameFromCSV.substring(0, lastDotIndex) : fileNameFromCSV;
            if (img.dataset.attempt === "1") { img.dataset.attempt = "2"; img.src = `img/${base}.webp`; } 
            else if (img.dataset.attempt === "2") { img.dataset.attempt = "3"; img.src = `img/${base}.png`; } 
            else if (img.dataset.attempt === "3") { img.dataset.attempt = "4"; img.src = `img/${base}.jpg`; } 
            else { img.onerror = null; img.src = 'img/logo.jpg'; }
        };

        function highlightTitle(title, query) {
            if (!query) return title;
            const normTitle = normalize(title);
            const normQuery = normalize(query);
            const index = normTitle.indexOf(normQuery);
            if (index === -1) return title;
            let charCount = 0, origIndex = -1;
            for (let i = 0; i < title.length; i++) {
                if (normalize(title[i]).length > 0) charCount++;
                if (charCount > index && origIndex === -1) origIndex = i;
            }
            if (origIndex === -1) return title;
            const endIndex = origIndex + query.length;
            return title.substring(0, origIndex) + '<span class="highlight">' + title.substring(origIndex, Math.min(endIndex, title.length)) + '</span>' + title.substring(Math.min(endIndex, title.length));
        }

        async function setBackground() {
            const isMobile = window.innerWidth <= 1000;
            try {
                const res = await fetch('backgrounds.json');
                const data = await res.json();
                const list = isMobile ? data.mobile : data.desktop;
                if (!list || !list.length) return;
                const file = list[Math.floor(Math.random() * list.length)];
                document.getElementById('bg-layer').style.backgroundImage = `url('img/${file}')`;
            } catch(e) {}
        }

        function updateOverlayOpacity() {
            const scrollY = window.scrollY;
            const maxScroll = document.body.scrollHeight - window.innerHeight || 1;
            const opacity = Math.min(scrollY / 600, 0.65);
            document.getElementById('bg-overlay').style.opacity = opacity;
        }

        async function init() {
            setBackground();
            window.addEventListener('scroll', updateOverlayOpacity);

            try {
                const response = await fetch('animes.csv');
                const rawData = await response.text();
                allAnimes = rawData.split(/\r?\n/).slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0] || c.length < 9) return null;
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                    return { 
                        nom: clean(c[0]), pop: clean(c[1]), score: clean(c[2]), 
                        sortie: clean(c[3]), ep: clean(c[4]), censure: clean(c[5]), 
                        etat: clean(c[6]), img: clean(c[8]),
                        tags: clean(c[12]), malId: clean(c[13]), editeur: clean(c[14]),
                        ordreAjout: parseInt(clean(c[17])) || 0
                    };
                }).filter(a => a !== null);

                shuffledAnimes = [...allAnimes];
                for (let i = shuffledAnimes.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledAnimes[i], shuffledAnimes[j]] = [shuffledAnimes[j], shuffledAnimes[i]];
                }

                const urlParams = new URLSearchParams(window.location.search);
                const searchParam = urlParams.get('search');
                if (searchParam) {
                    document.getElementById('search').value = searchParam;
                    currentSearch = searchParam;
                }

                runFilterAndSort();
                
                const searchInput = document.getElementById('search');
                const searchSuggestions = document.getElementById('search-suggestions');
                
                searchInput.addEventListener('input', function() {
                    currentSearch = this.value.trim();
                    runFilterAndSort();
                    
                    if (currentSearch.length >= 2) {
                        const results = allAnimes.filter(a => normalize(a.nom).includes(normalize(currentSearch))).slice(0, 8);
                        if (results.length === 0) {
                            searchSuggestions.innerHTML = '<div class="no-result" style="padding:12px;color:#888;">Aucun résultat</div>';
                        } else {
                            searchSuggestions.innerHTML = results.map(a => 
                                '<div class="suggestion-item" data-name="'+a.nom.replace(/"/g,'&quot;')+'"><img src="img/'+a.img+'" class="sugg-img" onerror="this.src=\'img/logo.jpg\'"><span>'+a.nom+'</span></div>'
                            ).join('');
                        }
                        searchSuggestions.classList.add('active');
                    } else {
                        searchSuggestions.classList.remove('active');
                    }
                });
                
                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        searchSuggestions.classList.remove('active');
                        this.blur();
                        if (currentSearch) {
                            window.history.pushState({}, '', `index_old.html?search=${encodeURIComponent(currentSearch)}`);
                        } else {
                            window.history.pushState({}, '', `index_old.html`);
                        }
                    }
                });
                
                searchSuggestions.addEventListener('click', function(e) {
                    const item = e.target.closest('.suggestion-item');
                    if (item && item.dataset.name) {
                        window.location.href = 'video.html?name=' + encodeURIComponent(item.dataset.name);
                    }
                });
                
                document.addEventListener('click', function(e) {
                    if (!e.target.closest('.search-wrapper')) {
                        searchSuggestions.classList.remove('active');
                    }
                });
                
            } catch (err) { console.error("Erreur CSV:", err); }
        }

        function runFilterAndSort() {
            const searchVal = currentSearch;
            const sortMode = document.getElementById('sort').value;
            
            let base = (searchVal === "" && sortMode === "") ? shuffledAnimes : allAnimes;
            
            let filtered = base.filter(a => {
                const matchSearch = searchVal ? normalize(a.nom).includes(normalize(searchVal)) : true;
                return matchSearch;
            });

            if (sortMode) {
                filtered.sort((a, b) => {
                    if (sortMode === "ordre_ajout") return (b.ordreAjout || 0) - (a.ordreAjout || 0);
                    if (sortMode === "score") return parseFloat((b.score||'0').replace(',', '.')) - parseFloat((a.score||'0').replace(',', '.'));
                    if (sortMode === "episodes") {
                        const numA = parseInt((a.ep||'').match(/\d+/g)?.pop() || '0');
                        const numB = parseInt((b.ep||'').match(/\d+/g)?.pop() || '0');
                        return numB - numA;
                    }
                    if (sortMode === "popularite") return (parseInt((a.pop||'').replace('#','')) || 99999) - (parseInt((b.pop||'').replace('#','')) || 99999);
                    if (sortMode === "sortie") return (parseInt((b.sortie||'').match(/\d{4}/g)?.pop()||0)) - (parseInt((a.sortie||'').match(/\d{4}/g)?.pop()||0));
                    if (sortMode === "editeur") return (a.editeur || '').localeCompare(b.editeur || '');
                    if (sortMode === "nom") return a.nom.localeCompare(b.nom);
                    if (sortMode === "censure") return (a.censure || '').localeCompare(b.censure || '');
                    if (sortMode === "etat") return (a.etat || '').localeCompare(b.etat || '');
                    return 0;
                });
            }
            displayAnimes(filtered, sortMode);
        }

        function displayAnimes(list, sortMode) {
            const container = document.getElementById('anime-container');
            container.querySelectorAll('.card[data-nom]').forEach(c => cardObserver.unobserve(c));
            const hl = (m) => (sortMode === m) ? 'class="highlight"' : '';
            
            container.innerHTML = list.map(a => {
                const titleHtml = highlightTitle(a.nom, currentSearch);
                return `
                <a href="video.html?name=${encodeURIComponent(a.nom)}" class="card" data-nom="${a.nom.replace(/"/g,'&quot;')}" data-malid="${a.malId || ''}">
                    <div class="img-container">
                        <img src="img/${a.img}" loading="lazy" onerror="handleImgError(this, '${a.img}')">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${titleHtml}</div>
                        <div class="card-meta-row">
                            <span ${hl('sortie')}>📅${(a.sortie||'').match(/\d{4}/g)?.pop()||a.sortie}</span>
                            <span ${hl('score')} class="mal-score">⭐${a.score}</span>
                            <span ${hl('popularite')} class="mal-pop">📈${a.pop}</span>
                        </div>
                        <div class="card-meta-row">
                            <span ${hl('episodes')}>🎞️${a.ep}</span>
                            <span ${hl('censure')}>🔞${a.censure}</span>
                            <span ${hl('etat')}>🛠️${a.etat}</span>
                        </div>
                        ${a.editeur ? `<div class="card-meta-row"><span ${hl('editeur')} style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🏢${a.editeur}</span></div>` : ''}
                    </div>
                </a>`;
            }).join('');
            container.querySelectorAll('.card[data-nom]').forEach(c => cardObserver.observe(c));
        }

        window.randomAnime = () => {
            if(allAnimes.length > 0) {
                const a = allAnimes[Math.floor(Math.random()*allAnimes.length)];
                window.location.href = `video.html?name=${encodeURIComponent(a.nom)}`;
            }
        };
        
        function toggleM() {
            const menu = document.getElementById('menu');
            const overlay = document.getElementById('overlay');
            const isOpen = menu.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = isOpen ? 'hidden' : '';
        }
        window.toggleM = toggleM;
        
        document.getElementById('sort').onchange = runFilterAndSort;

        init();
    </script>
</body>
</html>
