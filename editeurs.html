<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="mobile.css">
    <title>Éditeurs & Studios - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20,20,20,0.9); --text: #eee; --nav-bg: rgba(15,15,15,0.85); --blue: #2e86de; }
        * { box-sizing: border-box; }
        #bg-layer {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat;
        }
        /* Overlay fixe sombre */
        body::after {
            content: ''; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: -1; pointer-events: none;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 5px; order: -1; }
        .search-wrapper { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
        .search-wrapper input { width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; padding: 6px 30px 6px 10px; border-radius: 5px; font-size: 0.85em; outline: none; }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #888; font-size: 0.9em; pointer-events: none; }
        
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links button { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8em; text-decoration: none; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; white-space: nowrap; }
        
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }
        
        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .search-wrapper { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: #0f0f0f; flex-direction: column; padding: 30px 20px; transition: 0.4s; z-index: 1100; align-items: stretch; overflow-y: auto; left: auto; right: -100%; }
            .nav-links.active { right: 0; left: auto; }
            .nav-links a, .nav-links button { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .studios-grid { grid-template-columns: 1fr 1fr; }
            /* Fix chevauchement producteur */
            .producer-banner { height: auto; padding: 0; flex-direction: column; align-items: flex-start; }
            .producer-avatar { width: 60px; height: 60px; margin: 0 0 10px 15px; }
            .producer-info-wrap { padding: 10px 15px 15px; }
            .producer-name { font-size: 1.2em; }
        }

        .page-wrap { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 20px 20px 60px; }
        #view-list { display: block; }
        #view-producer { display: none; }
        .list-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 20px; }
        .list-header h1 { font-size: 1.5em; font-weight: 900; color: var(--primary); margin: 0; }
        .list-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .sort-select { background: #1a1a1a; border: 1px solid #444; color: white; padding: 6px 10px; border-radius: 6px; font-size: 0.85em; cursor: pointer; }
        .studios-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
        .studio-card { background: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: 0.2s; display: flex; gap: 12px; align-items: flex-start; }
        .studio-card:hover { border-color: var(--primary); transform: translateY(-4px); }
        .studio-logo-wrap { flex-shrink: 0; width: 64px; height: 64px; border-radius: 10px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        .studio-logo { width: 100%; height: 100%; object-fit: contain; }
        .studio-logo-fallback { font-size: 1.4em; font-weight: 900; color: var(--primary); text-transform: uppercase; }
        .studio-card-body { flex: 1; min-width: 0; }
        .studio-name { font-weight: 800; font-size: 0.9em; color: white; word-break: break-word; }
        .studio-count { font-size: 0.75em; color: #888; margin-top: 4px; }
        .studio-count span { color: var(--primary); font-weight: bold; }
        .studio-preview { display: flex; gap: 4px; margin-top: 6px; }
        .studio-preview img { width: 32px; height: 46px; object-fit: cover; border-radius: 4px; }
        .producer-header { background: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
        .producer-banner { height: 120px; background: linear-gradient(135deg, #1a0008 0%, #2d0014 40%, #0a000f 100%); position: relative; display: flex; align-items: flex-end; padding: 0 20px; }
        .producer-avatar { width: 80px; height: 80px; border-radius: 14px; background: linear-gradient(135deg, #ff4757, #c0392b); border: 3px solid var(--bg); display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: 900; color: white; position: relative; z-index: 1; transform: translateY(40px); flex-shrink: 0; overflow: hidden; }
        .producer-info-wrap { padding: 50px 20px 15px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .producer-name { font-size: 1.6em; font-weight: 900; color: white; margin: 0; }
        .producer-stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .pstat { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 6px 12px; text-align: center; }
        .pstat-val { font-size: 1.2em; font-weight: 800; color: var(--primary); display: block; }
        .pstat-lbl { font-size: 0.65em; color: #666; text-transform: uppercase; }
        .btn-back-list { display: inline-flex; align-items: center; gap: 6px; color: #aaa; font-size: 0.85em; cursor: pointer; border: 1px solid #333; background: #1a1a1a; padding: 5px 12px; border-radius: 6px; margin-bottom: 15px; }
        .btn-back-list:hover { color: var(--primary); border-color: var(--primary); }
        .producer-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
        .ctrl-select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 6px 10px; border-radius: 6px; font-size: 0.85em; cursor: pointer; }
        .result-count { font-size: 0.8em; color: #666; margin-left: auto; }
        .producer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .anime-card { background: var(--card-bg); border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; transition: 0.2s; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .anime-card:hover { border-color: var(--primary); transform: translateY(-4px); }
        .anime-card .img-wrap { width: 100%; aspect-ratio: 2/3; background: #111; position: relative; }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; }
        .ac-info { padding: 6px; flex: 1; }
        .ac-title { font-weight: 700; color: var(--primary); font-size: 0.9em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .ac-meta { font-size: 0.7em; color: #888; display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
        .score-badge { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.7); color: #f1c40f; font-size: 0.7em; padding: 2px 5px; border-radius: 4px; }
        .empty-state { text-align: center; color: #555; padding: 40px 20px; grid-column: 1/-1; }
        @media (max-width: 700px) { .producer-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; } .producer-name { font-size: 1.2em; } }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <nav class="top-navbar">
        <div class="burger" onclick="toggleM()">☰</div>
        <div class="nav-left">
            <a href="index.html" class="nav-brand">
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX <small style="color:white;">• Studios</small></span>
            </a>
        </div>
        <div class="search-wrapper">
            <input type="text" id="studio-search" placeholder="Rechercher un studio..." autocomplete="off">
            <span class="search-icon">🔍</span>
        </div>
        <div class="mobile-overlay" id="overlay" onclick="toggleM()"></div>
        <div class="nav-links" id="menu">
            <div class="close-menu" onclick="toggleM()">← Retour</div>
            <a href="index.html">🏠 Accueil</a>
            <a href="tags.html">🏷️ Tags</a>
            <a href="alphabetique.html">📖 A-Z</a>
            <a href="playlist.html">📂 Playlist</a>
            <a href="editeurs.html">🏢 Studios</a>
            <a href="share.html">🔗 Partager</a>
            <a href="profil.html">👤 Profil</a>
            <a href="index_old.html">🕰️ Ancien Index</a>
            <a href="https://discord.gg/4DY3Zq4vW4" target="_blank" class="discord-btn">Discord</a>
        </div>
    </nav>

    <div class="page-wrap">
        <div id="view-list">
            <div class="list-header">
                <h1>🏢 Éditeurs & Studios</h1>
                <div class="list-controls">
                    <select class="sort-select" id="studio-sort">
                        <option value="count">Trier : Nb titres ↓</option>
                        <option value="nom">Trier : A → Z</option>
                        <option value="nom-desc">Trier : Z → A</option>
                        <option value="score">Trier : Score ↓</option>
                    </select>
                </div>
            </div>
            <div class="studios-grid" id="studios-grid"><div class="empty-state">Chargement…</div></div>
        </div>

        <div id="view-producer">
            <a class="btn-back-list" onclick="showList()">← Tous les éditeurs</a>
            <div class="producer-header">
                <div class="producer-banner"><div class="producer-avatar" id="prod-avatar">?</div></div>
                <div class="producer-info-wrap">
                    <div><div class="producer-name" id="prod-name">—</div><div class="producer-sub">Éditeur / Label</div></div>
                    <div class="producer-stats-row">
                        <div class="pstat"><span class="pstat-val" id="prod-total">—</span><span class="pstat-lbl">Titres</span></div>
                        <div class="pstat"><span class="pstat-val" id="prod-avg">—</span><span class="pstat-lbl">Score moy.</span></div>
                        <div class="pstat"><span class="pstat-val" id="prod-best">—</span><span class="pstat-lbl">Meilleur</span></div>
                    </div>
                </div>
            </div>
            <div class="producer-controls">
                <select class="ctrl-select" id="prod-sort"><option value="score">Trier : Score</option><option value="pop">Trier : Popularité</option><option value="année">Trier : Année</option><option value="nom">Trier : Nom (A-Z)</option></select>
                <select class="ctrl-select" id="prod-filter"><option value="">Tout afficher</option><option value="en cours">🟢 En cours</option><option value="terminé">✅ Terminés</option><option value="oui">🔞 Censuré</option><option value="non">✔️ Non censuré</option></select>
                <span class="result-count" id="prod-count"></span>
            </div>
            <div class="producer-grid" id="producer-grid"></div>
        </div>
    </div>

    <script>
        (function(){ 
            const isMobile = window.innerWidth <= 1000;
            const n = isMobile ? Math.floor(Math.random() * 13) + 1 : Math.floor(Math.random() * 64) + 1;
            document.getElementById('bg-layer').style.backgroundImage = `url('img/${isMobile?'mobile'+n:'fond'+n}.webp')`;
        })();
        
        // plus de parallax
        window.addEventListener('scroll', function(){});

        let allAnimes=[], currentStudio=null;
        async function init(){ const resp=await fetch('animes.csv'); const text=await resp.text(); allAnimes=text.split(/\r?\n/).slice(1).map(line=>{ const c=line.split(';'); if(!c[0]||c.length<9)return null; const cl=s=>s?s.trim().replace(/^"|"$/g,''):''; return{ nom:cl(c[0]), pop:cl(c[1]), score:cl(c[2]), sortie:cl(c[3]), ep:cl(c[4]), censure:cl(c[5]), etat:cl(c[6]), img:cl(c[8]), editeur:cl(c[14]) }; }).filter(a=>a&&a.editeur);
            const param=new URLSearchParams(window.location.search).get('studio'); if(param) showProducer(decodeURIComponent(param)); else renderList('');
            document.getElementById('studio-search').addEventListener('input',e=>renderList(e.target.value));
        }
        function buildStudioMap(){ const m={}; allAnimes.forEach(a=>{ a.editeur.split(',').map(e=>e.trim()).filter(Boolean).forEach(ed=>{ if(!m[ed]) m[ed]=[]; m[ed].push(a); }); }); return m; }
        function renderList(f=''){ document.getElementById('view-list').style.display='block'; document.getElementById('view-producer').style.display='none'; document.title='Éditeurs & Studios - Le Malicieux'; history.replaceState(null,'','editeurs.html'); const map=buildStudioMap(), grid=document.getElementById('studios-grid'), q=f.toLowerCase(), sortMode=document.getElementById('studio-sort')?.value||'count'; let studios=Object.keys(map).filter(s=>!q||s.toLowerCase().includes(q));
            studios.sort((a,b)=>{ if(sortMode==='nom')return a.localeCompare(b,'fr'); if(sortMode==='nom-desc')return b.localeCompare(a,'fr'); if(sortMode==='score'){ const avg=arr=>{ const sc=arr.map(x=>parseFloat(x.score.replace(',','.'))).filter(Boolean); return sc.length?sc.reduce((s,v)=>s+v,0)/sc.length:0; }; return avg(map[b])-avg(map[a]); } return map[b].length-map[a].length; });
            if(studios.length===0){ grid.innerHTML='<div class="empty-state">Aucun éditeur trouvé.</div>'; return; }
            grid.innerHTML=studios.map(studio=>{ const animes=map[studio], slug=studio.replace(/\s+/g,'-'), avgSc=(()=>{ const sc=animes.map(x=>parseFloat(x.score.replace(',','.'))).filter(Boolean); return sc.length?(sc.reduce((s,v)=>s+v,0)/sc.length).toFixed(1):null; })(); const previews=animes.slice(0,3).map(a=>`<img src="img/${a.img}" onerror="this.src='img/logo.jpg'" title="${a.nom}">`).join(''); return `<div class="studio-card" onclick="showProducer('${studio.replace(/'/g,"\\'")}')"><div class="studio-logo-wrap"><img class="studio-logo" src="img/${slug}.jpg" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"><div class="studio-logo-fallback" style="display:none;">${studio.split(/[\s\-_]+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase()}</div></div><div class="studio-card-body"><div class="studio-name">${studio}</div><div class="studio-count"><span>${animes.length}</span> titre${animes.length>1?'s':''}${avgSc?` · ⭐ ${avgSc}`:''}</div><div class="studio-preview">${previews}</div></div></div>`; }).join('');
        }
        document.getElementById('studio-sort').onchange=()=>renderList(document.getElementById('studio-search').value);
        function showProducer(studio){ currentStudio=studio; document.getElementById('view-list').style.display='none'; document.getElementById('view-producer').style.display='block'; document.title=studio+' - Le Malicieux'; history.pushState({studio},'',`editeurs.html?studio=${encodeURIComponent(studio)}`); const slug=studio.replace(/\s+/g,'-'); const avatarEl=document.getElementById('prod-avatar'); avatarEl.innerHTML=`<img src="img/${slug}.jpg" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='<span class=\'avatar-initials\' style=\'display:flex;align-items:center;justify-content:center;width:100%;height:100%;\'>'+studio.split(/[\\s\\-_]+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase()+'</span>'">`; document.getElementById('prod-name').textContent=studio; renderProducerGrid(); }
        function renderProducerGrid(){ const map=buildStudioMap(); let animes=map[currentStudio]||[]; const filterVal=document.getElementById('prod-filter').value; if(filterVal==='oui'||filterVal==='non') animes=animes.filter(a=>a.censure.toLowerCase()===filterVal); else if(filterVal==='terminé') animes=animes.filter(a=>a.etat.toLowerCase().includes('termin')||a.etat.toLowerCase().includes('fini')); else if(filterVal==='en cours') animes=animes.filter(a=>a.etat.toLowerCase().includes('cours')||a.etat.toLowerCase().includes('airing')); const sortVal=document.getElementById('prod-sort').value; animes=[...animes].sort((a,b)=>{ if(sortVal==='score')return parseFloat(b.score.replace(',','.')||0)-parseFloat(a.score.replace(',','.')||0); if(sortVal==='pop')return (parseInt(a.pop.replace('#',''))||99999)-(parseInt(b.pop.replace('#',''))||99999); if(sortVal==='année')return (b.sortie||'').localeCompare(a.sortie||''); if(sortVal==='nom')return a.nom.localeCompare(b.nom); return 0; }); const allForStudio=map[currentStudio]||[]; document.getElementById('prod-total').textContent=allForStudio.length; document.getElementById('prod-count').textContent=`${animes.length} titre${animes.length>1?'s':''} affiché${animes.length>1?'s':''}`; fetchStudioScoresFromMAL(allForStudio); const grid=document.getElementById('producer-grid'); if(animes.length===0){ grid.innerHTML='<div class="empty-state">Aucun anime pour ces critères.</div>'; return; } grid.innerHTML=animes.map(a=>{ const scoreNum=parseFloat(a.score.replace(',','.')); const scoreBadge=scoreNum?`<div class="score-badge">⭐ ${a.score}</div>`:''; return `<a href="video.html?name=${encodeURIComponent(a.nom)}" class="anime-card"><div class="img-wrap"><img src="img/${a.img}" loading="lazy" onerror="this.src='img/logo.jpg'">${scoreBadge}</div><div class="ac-info"><div class="ac-title">${a.nom}</div><div class="ac-meta"><span>📅 ${a.sortie}</span><span>🎞️ ${a.ep}</span></div><div class="ac-meta"><span>🔞 ${a.censure}</span><span>🛠️ ${a.etat}</span></div></div></a>`; }).join(''); }
        async function fetchStudioScoresFromMAL(animes){ const scores=[]; const sample=animes.slice(0,6); for(const a of sample){ try{ await new Promise(r=>setTimeout(r,400)); const q=a.nom.split('/')[0].trim(); const resp=await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=1&sfw=false`); if(!resp.ok)continue; const json=await resp.json(); const s=json.data?.[0]?.score; if(s) scores.push(parseFloat(s)); }catch(e){} } if(scores.length===0){ document.getElementById('prod-avg').textContent='—'; document.getElementById('prod-best').textContent='—'; return; } const avg=(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(2); const best=Math.max(...scores).toFixed(2); document.getElementById('prod-avg').textContent='⭐ '+avg; document.getElementById('prod-best').textContent='⭐ '+best; }
        function showList(){ currentStudio=null; renderList(document.getElementById('studio-search').value); }
        document.getElementById('prod-sort').onchange=renderProducerGrid; document.getElementById('prod-filter').onchange=renderProducerGrid; init();
        window.addEventListener('popstate',(e)=>{ if(e.state&&e.state.studio) showProducer(e.state.studio); else{ currentStudio=null; renderList(document.getElementById('studio-search').value); document.getElementById('view-list').style.display='block'; document.getElementById('view-producer').style.display='none'; document.title='Éditeurs & Studios - Le Malicieux'; } });
        function toggleM(){ const m=document.getElementById('menu'), ov=document.getElementById('overlay'); const isOpen=m.classList.toggle('active'); ov.classList.toggle('active'); document.body.style.overflow=isOpen?'hidden':''; }
        window.toggleM=toggleM;
    </script>
</body>
</html>
