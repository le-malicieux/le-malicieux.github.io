<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeurs & Studios - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20,20,20,0.92); --text: #eee; --nav-bg: rgba(15,15,15,0.88); }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg); background-size: cover;
            background-attachment: fixed; background-position: center;
            color: var(--text); margin: 0; min-height: 100vh;
        }
        body::before { content:''; position:fixed; inset:0; background:rgba(0,0,0,0.48); z-index:0; pointer-events:none; }

        .top-navbar {
            display:flex; align-items:center; justify-content:space-between;
            padding:10px 20px; background:var(--nav-bg); backdrop-filter:blur(10px);
            position:sticky; top:0; z-index:1000; border-bottom:1px solid rgba(255,255,255,0.1);
        }
        .nav-brand { display:flex; align-items:center; gap:12px; text-decoration:none; }
        .nav-logo-small { width:35px; height:35px; border-radius:5px; border:1px solid var(--primary); object-fit:cover; }
        .nav-title { color:var(--primary); font-weight:bold; font-size:1.1em; }
        .nav-back { color:#aaa; text-decoration:none; font-size:0.88em; transition:color 0.2s; }
        .nav-back:hover { color:var(--primary); }

        .page-wrap { position:relative; z-index:1; max-width:1300px; margin:0 auto; padding:30px 20px 60px; }

        /* ════════════ VUE LISTE ════════════ */
        #view-producer { display:none; }

        .list-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:24px; }
        .list-header h1 { font-size:1.7em; font-weight:900; color:var(--primary); margin:0; }
        .list-controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

        .ctrl-input {
            background:rgba(20,20,20,0.95); border:1px solid #444; color:white;
            padding:8px 14px; border-radius:6px; font-size:0.9em; width:210px;
            outline:none; transition:border-color 0.2s;
        }
        .ctrl-input:focus { border-color:var(--primary); }
        .ctrl-select {
            background:rgba(20,20,20,0.95); border:1px solid #444; color:white;
            padding:8px 12px; border-radius:6px; font-size:0.88em; cursor:pointer; outline:none;
        }
        .ctrl-select:focus { border-color:var(--primary); }

        .studios-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:18px; }

        .studio-card {
            background:var(--card-bg); border:1px solid #2a2a2a; border-radius:14px;
            overflow:hidden; cursor:pointer;
            transition:border-color 0.25s, transform 0.2s, box-shadow 0.2s;
            display:flex; flex-direction:column;
        }
        .studio-card:hover { border-color:var(--primary); transform:translateY(-5px); box-shadow:0 10px 28px rgba(255,71,87,0.18); }

        /* Mosaïque d'images */
        .studio-mosaic {
            width:100%; height:165px; flex-shrink:0;
            overflow:hidden; background:#111;
            display:grid; gap:2px;
        }
        .studio-mosaic.n1 { grid-template-columns:1fr; }
        .studio-mosaic.n2 { grid-template-columns:1fr 1fr; }
        .studio-mosaic.n3 { grid-template-columns:2fr 1fr; grid-template-rows:1fr 1fr; }
        .studio-mosaic.n3 img:first-child { grid-row:span 2; }
        .studio-mosaic.n4 { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
        .studio-mosaic img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.35s; }
        .studio-card:hover .studio-mosaic img { transform:scale(1.05); }

        .studio-body { padding:13px 15px 15px; display:flex; flex-direction:column; gap:6px; }
        .studio-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
        .studio-name { font-weight:800; font-size:1.05em; color:white; line-height:1.3; }
        .studio-badge {
            font-size:0.72em; white-space:nowrap; padding:3px 10px;
            background:rgba(255,71,87,0.13); border-radius:20px;
            color:var(--primary); font-weight:bold; flex-shrink:0;
        }
        .studio-stats { font-size:0.74em; color:#666; }
        .studio-stats b { color:#aaa; font-weight:600; }

        .empty-state { text-align:center; color:#555; padding:60px 20px; grid-column:1/-1; }

        /* ════════════ VUE PRODUCER ════════════ */
        .producer-header { background:var(--card-bg); border:1px solid #2a2a2a; border-radius:14px; overflow:hidden; margin-bottom:22px; }
        .producer-banner {
            height:130px;
            background:linear-gradient(135deg,#1a0008 0%,#2d0014 40%,#0a000f 100%);
            position:relative;
        }
        .producer-banner::after {
            content:''; position:absolute; inset:0;
            background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,71,87,0.04) 40px,rgba(255,71,87,0.04) 80px);
        }
        .producer-avatar {
            position:absolute; bottom:-40px; left:28px;
            width:80px; height:80px; border-radius:12px;
            background:linear-gradient(135deg,#ff4757,#c0392b);
            border:3px solid var(--bg);
            display:flex; align-items:center; justify-content:center;
            font-size:1.8em; font-weight:900; color:white;
            z-index:1; box-shadow:0 4px 16px rgba(0,0,0,0.5); user-select:none;
        }
        .producer-info-wrap {
            padding:50px 28px 20px;
            display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px;
        }
        .producer-name { font-size:1.7em; font-weight:900; color:white; margin:0 0 3px; }
        .producer-sub { font-size:0.8em; color:#555; }
        .producer-stats-row { display:flex; gap:14px; flex-wrap:wrap; }
        .pstat { background:#111; border:1px solid #2a2a2a; border-radius:10px; padding:10px 18px; text-align:center; min-width:75px; }
        .pstat-val { font-size:1.3em; font-weight:800; color:var(--primary); display:block; }
        .pstat-lbl { font-size:0.68em; color:#555; text-transform:uppercase; letter-spacing:0.5px; }

        .btn-back-list {
            display:inline-flex; align-items:center; gap:6px; color:#aaa; font-size:0.85em; cursor:pointer;
            border:1px solid #333; background:rgba(20,20,20,0.9); padding:7px 14px; border-radius:6px;
            transition:color 0.2s,border-color 0.2s; text-decoration:none; margin-bottom:20px;
        }
        .btn-back-list:hover { color:var(--primary); border-color:var(--primary); }

        .producer-controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
        .result-count { font-size:0.82em; color:#555; margin-left:auto; }

        .producer-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:14px; }
        .anime-card {
            background:var(--card-bg); border:1px solid #2a2a2a; border-radius:10px; overflow:hidden;
            transition:border-color 0.2s,transform 0.2s; text-decoration:none; color:inherit;
            display:flex; flex-direction:column; font-size:0.8em;
        }
        .anime-card:hover { border-color:var(--primary); transform:translateY(-6px); }
        .anime-card .img-wrap { width:100%; aspect-ratio:2/3; background:#111; position:relative; }
        .anime-card img { width:100%; height:100%; object-fit:cover; display:block; }
        .score-badge {
            position:absolute; top:6px; left:6px; background:rgba(0,0,0,0.75); color:#f1c40f;
            font-size:0.72em; font-weight:bold; padding:2px 6px; border-radius:4px; backdrop-filter:blur(4px);
        }
        .ac-info { padding:8px; flex:1; display:flex; flex-direction:column; gap:4px; }
        .ac-title { font-weight:700; color:var(--primary); overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-height:1.25; font-size:1.05em; }
        .ac-meta { font-size:0.72em; color:#888; display:flex; flex-wrap:wrap; gap:4px; }

        @media (max-width:700px) {
            .studios-grid { grid-template-columns:1fr; }
            .producer-grid { grid-template-columns:repeat(3,1fr); gap:8px; }
            .producer-name { font-size:1.3em; }
            .ctrl-input { width:100%; }
        }
    </style>
</head>
<body>

    <nav class="top-navbar">
        <a href="index.html" class="nav-brand">
            <img src="img/logo.jpg" class="nav-logo-small">
            <span class="nav-title">LE MALICIEUX</span>
        </a>
        <div style="display:flex;gap:16px;align-items:center;">
            <a href="tags.html" class="nav-back">🏷️ Tags</a>
            <a href="index.html" class="nav-back">← Catalogue</a>
        </div>
    </nav>

    <div class="page-wrap">

        <!-- VUE LISTE -->
        <div id="view-list">
            <div class="list-header">
                <h1>🏢 Éditeurs & Studios</h1>
                <div class="list-controls">
                    <input type="text" class="ctrl-input" id="studio-search" placeholder="Rechercher un studio…">
                    <select class="ctrl-select" id="studio-sort">
                        <option value="titres">Nb de titres ↓</option>
                        <option value="nom">Nom (A-Z)</option>
                        <option value="score">Score moyen ↓</option>
                    </select>
                </div>
            </div>
            <div class="studios-grid" id="studios-grid">
                <div class="empty-state">Chargement…</div>
            </div>
        </div>

        <!-- VUE PRODUCER -->
        <div id="view-producer">
            <a class="btn-back-list" onclick="showList()">← Tous les éditeurs</a>
            <div class="producer-header">
                <div class="producer-banner">
                    <div class="producer-avatar" id="prod-avatar">?</div>
                </div>
                <div class="producer-info-wrap">
                    <div>
                        <div class="producer-name" id="prod-name">—</div>
                        <div class="producer-sub">Éditeur / Label / Studio</div>
                    </div>
                    <div class="producer-stats-row">
                        <div class="pstat"><span class="pstat-val" id="prod-total">—</span><span class="pstat-lbl">Titres</span></div>
                        <div class="pstat"><span class="pstat-val" id="prod-avg">—</span><span class="pstat-lbl">Score moy.</span></div>
                        <div class="pstat"><span class="pstat-val" id="prod-best">—</span><span class="pstat-lbl">Meilleur ⭐</span></div>
                    </div>
                </div>
            </div>
            <div class="producer-controls">
                <select class="ctrl-select" id="prod-sort">
                    <option value="score">Score ↓</option>
                    <option value="pop">Popularité</option>
                    <option value="annee">Année ↓</option>
                    <option value="nom">Nom (A-Z)</option>
                </select>
                <select class="ctrl-select" id="prod-filter">
                    <option value="">Tout afficher</option>
                    <option value="en cours">🟢 En cours</option>
                    <option value="fini">✅ Terminés</option>
                    <option value="censure-oui">🔞 Censuré</option>
                    <option value="censure-non">✔️ Non censuré</option>
                </select>
                <span class="result-count" id="prod-count"></span>
            </div>
            <div class="producer-grid" id="producer-grid"></div>
        </div>

    </div>

    <script>
        (function() {
            const m = window.innerWidth <= 1000;
            const n = Math.floor(Math.random() * (m ? 13 : 64)) + 1;
            document.body.style.backgroundImage = `url('img/${m ? 'mobile' : 'fond'}${n}.webp')`;
        })();

        let allAnimes = [];
        let currentStudio = null;

        async function init() {
            const resp = await fetch('animes.csv');
            const text = await resp.text();
            allAnimes = text.split(/\r?\n/).slice(1).map(line => {
                const c = line.split(';');
                if (!c[0] || c.length < 9) return null;
                const cl = s => s ? s.trim().replace(/^"|"$/g, '') : '';
                return {
                    nom: cl(c[0]), pop: cl(c[1]), score: cl(c[2]),
                    sortie: cl(c[3]), ep: cl(c[4]), censure: cl(c[5]),
                    etat: cl(c[6]), img: cl(c[8]), editeur: cl(c[14])
                };
            }).filter(a => a && a.editeur);

            const param = new URLSearchParams(window.location.search).get('studio');
            if (param) showProducer(decodeURIComponent(param));
            else renderList();
        }

        function buildStudioMap() {
            const map = {};
            allAnimes.forEach(a => {
                a.editeur.split(',').map(e => e.trim()).filter(Boolean).forEach(ed => {
                    if (!map[ed]) map[ed] = [];
                    map[ed].push(a);
                });
            });
            return map;
        }

        function avgScore(animes) {
            const scored = animes.filter(a => parseFloat(a.score.replace(',', '.')));
            if (!scored.length) return 0;
            return scored.reduce((s, a) => s + parseFloat(a.score.replace(',', '.')), 0) / scored.length;
        }

        // ══ VUE LISTE ══
        function renderList(filter = '') {
            document.getElementById('view-list').style.display = 'block';
            document.getElementById('view-producer').style.display = 'none';
            document.title = 'Éditeurs & Studios - Le Malicieux';
            history.replaceState(null, '', 'editeurs.html');

            const map = buildStudioMap();
            const sortVal = document.getElementById('studio-sort').value;
            const q = filter.toLowerCase();
            let studios = Object.keys(map).filter(s => !q || s.toLowerCase().includes(q));

            studios.sort((a, b) => {
                if (sortVal === 'nom')   return a.localeCompare(b, 'fr');
                if (sortVal === 'score') return avgScore(map[b]) - avgScore(map[a]);
                return map[b].length - map[a].length;
            });

            const grid = document.getElementById('studios-grid');
            if (!studios.length) { grid.innerHTML = '<div class="empty-state">Aucun éditeur trouvé.</div>'; return; }

            grid.innerHTML = studios.map(studio => {
                const animes = map[studio];
                const imgs = animes.slice(0, 4);
                const cls = ['', 'n1', 'n2', 'n3', 'n4'][Math.min(imgs.length, 4)];
                const mosaicImgs = imgs.map(a =>
                    `<img src="img/${a.img}" onerror="this.src='img/logo.jpg'" loading="lazy" title="${a.nom.replace(/"/g, '&quot;')}">`
                ).join('');
                const avg = avgScore(animes);
                const safeStudio = studio.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                return `
                <div class="studio-card" onclick="showProducer('${safeStudio}')">
                    <div class="studio-mosaic ${cls}">${mosaicImgs}</div>
                    <div class="studio-body">
                        <div class="studio-top">
                            <div class="studio-name">${studio}</div>
                            <div class="studio-badge">${animes.length} titre${animes.length > 1 ? 's' : ''}</div>
                        </div>
                        ${avg ? `<div class="studio-stats">⭐ Score moyen : <b>${avg.toFixed(2)}</b></div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        document.getElementById('studio-search').oninput = e => renderList(e.target.value);
        document.getElementById('studio-sort').onchange  = () => renderList(document.getElementById('studio-search').value);

        // ══ VUE PRODUCER ══
        function showProducer(studio) {
            currentStudio = studio;
            document.getElementById('view-list').style.display = 'none';
            document.getElementById('view-producer').style.display = 'block';
            document.title = studio + ' - Le Malicieux';
            history.replaceState(null, '', `editeurs.html?studio=${encodeURIComponent(studio)}`);

            const initiales = studio.split(/[\s\-_&,]+/).map(w => w[0] || '').filter(Boolean).slice(0, 2).join('').toUpperCase() || '?';
            document.getElementById('prod-avatar').textContent = initiales;
            document.getElementById('prod-name').textContent = studio;
            renderProducerGrid();
        }

        function renderProducerGrid() {
            const map = buildStudioMap();
            const allForStudio = map[currentStudio] || [];
            let animes = [...allForStudio];

            const f = document.getElementById('prod-filter').value;
            if      (f === 'censure-oui') animes = animes.filter(a => a.censure.toLowerCase() === 'oui');
            else if (f === 'censure-non') animes = animes.filter(a => a.censure.toLowerCase() === 'non');
            else if (f === 'fini')        animes = animes.filter(a => /fini|terminé/i.test(a.etat));
            else if (f === 'en cours')    animes = animes.filter(a => /cours/i.test(a.etat));

            const s = document.getElementById('prod-sort').value;
            animes.sort((a, b) => {
                if (s === 'score') return parseFloat(b.score.replace(',', '.') || 0) - parseFloat(a.score.replace(',', '.') || 0);
                if (s === 'pop')   return (parseInt(a.pop.replace('#', '')) || 99999) - (parseInt(b.pop.replace('#', '')) || 99999);
                if (s === 'annee') return (b.sortie || '').localeCompare(a.sortie || '');
                return a.nom.localeCompare(b.nom, 'fr');
            });

            const avg  = avgScore(allForStudio);
            const best = allForStudio.length
                ? Math.max(...allForStudio.map(a => parseFloat(a.score.replace(',', '.')) || 0))
                : 0;

            document.getElementById('prod-total').textContent = allForStudio.length;
            document.getElementById('prod-avg').textContent   = avg  ? '⭐ ' + avg.toFixed(2)  : '—';
            document.getElementById('prod-best').textContent  = best ? best.toFixed(2) : '—';
            document.getElementById('prod-count').textContent = `${animes.length} titre${animes.length !== 1 ? 's' : ''} affiché${animes.length !== 1 ? 's' : ''}`;

            const grid = document.getElementById('producer-grid');
            if (!animes.length) { grid.innerHTML = '<div class="empty-state">Aucun anime pour ces critères.</div>'; return; }

            grid.innerHTML = animes.map(a => {
                const sn = parseFloat(a.score.replace(',', '.'));
                const badge = sn ? `<div class="score-badge">⭐ ${a.score}</div>` : '';
                return `
                <a href="video.html?name=${encodeURIComponent(a.nom)}" class="anime-card">
                    <div class="img-wrap">
                        <img src="img/${a.img}" loading="lazy" onerror="this.src='img/logo.jpg'">
                        ${badge}
                    </div>
                    <div class="ac-info">
                        <div class="ac-title">${a.nom}</div>
                        <div class="ac-meta"><span>📅 ${a.sortie}</span><span>🎞️ ${a.ep}</span></div>
                        <div class="ac-meta"><span>🔞 ${a.censure}</span><span>🛠️ ${a.etat}</span></div>
                    </div>
                </a>`;
            }).join('');
        }

        function showList() { currentStudio = null; renderList(document.getElementById('studio-search').value); }
        document.getElementById('prod-sort').onchange   = renderProducerGrid;
        document.getElementById('prod-filter').onchange = renderProducerGrid;

        init();
    </script>
</body>
</html>
