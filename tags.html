<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="img/logo.jpg" type="image/jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="mobile.css">
    <title>Tags - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --nav-bg: rgba(15, 15, 15, 0.85); }
        #bg-layer {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: -1; pointer-events: none;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 52px;
        }
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 5px; order: -1; }
        .search-wrapper { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
        .search-wrapper input { width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; padding: 6px 30px 6px 10px; border-radius: 5px; font-size: 0.85em; outline: none; }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #888; font-size: 0.9em; pointer-events: none; }
        .search-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 0 0 5px 5px; max-height: 300px; overflow-y: auto; display: none; z-index: 2000; }
        .search-suggestions.active { display: block; }
        .search-suggestions .suggestion-item { padding: 8px 12px; cursor: pointer; color: #ccc; font-size: 0.85em; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 10px; }
        .search-suggestions .suggestion-item:hover { background: #2a2a2a; }
        .search-suggestions .suggestion-item .sugg-img { width: 28px; height: 40px; border-radius: 4px; object-fit: cover; }
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links .nav-btn { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8em; text-decoration: none; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .nav-links .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; white-space: nowrap; border: 2px solid rgba(255,255,255,0.15); display: inline-flex; align-items: center; gap: 5px; }
        .nav-links .discord-btn::before { content: '💬'; font-size: 0.9em; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }
        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .search-wrapper { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links {
                position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
                background: #0f0f0f; flex-direction: column; padding: 30px 20px;
                transition: 0.4s; z-index: 1100; align-items: stretch; overflow-y: auto;
                left: auto; right: -100%;
            }
            .nav-links.active { right: 0; left: auto; }
            .nav-links a, .nav-links .nav-btn, .nav-links .discord-btn { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .nav-links .discord-btn { margin-top: auto; border-radius: 20px; justify-content: center; }
            body { padding-top: 106px; }
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Catégories de tags */
        .tag-category {
            margin-bottom: 30px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 12px 16px;
        }
        .tag-category h3 {
            color: var(--primary);
            font-size: 1.1em;
            margin: 0 0 10px 0;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .tag-pill {
            padding: 8px 16px;
            background: #222;
            border: 1px solid #444;
            border-radius: 20px;
            color: #ccc;
            cursor: pointer;
            font-size: 0.9em;
            transition: 0.3s;
            user-select: none;
        }
        .tag-pill:hover, .tag-pill.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .clear-tags-btn {
            background: #333;
            border: 1px solid #ff4757;
            color: #ff4757;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            margin-left: 10px;
        }
        .clear-tags-btn:hover {
            background: #ff4757;
            color: white;
        }
        .selected-descriptions {
            background: rgba(15,15,15,0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,71,87,0.4);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 20px;
            display: none;
        }
        .selected-descriptions.visible {
            display: block;
        }
        .selected-descriptions h4 {
            margin: 0 0 8px 0;
            color: var(--primary);
            font-size: 1em;
        }
        .selected-descriptions p {
            margin: 0;
            color: #ddd;
            font-size: 0.9em;
            line-height: 1.5;
        }
        .selected-descriptions .desc-item {
            margin-bottom: 8px;
        }
        .selected-descriptions .desc-item strong {
            color: var(--primary);
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.8em; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card .img-container { width: 100%; aspect-ratio: 2/3; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 8px; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; height: 2.4em; overflow: hidden; font-size: 1.05em; line-height: 1.2; }
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 4px; font-size: 0.72em; color: #bbb; margin-top: 2px; }
        .sort-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; justify-content: flex-end; }
        .sort-controls select { background: #222; border: 1px solid #444; color: white; padding: 6px 10px; border-radius: 6px; font-size: 0.85em; cursor: pointer; }
        .results-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .results-title { font-weight: bold; color: #888; }
        .highlight { background: var(--primary); color: white; padding: 0 2px; border-radius: 3px; font-weight: bold; }
        
        img { image-rendering: auto; }
        html { zoom: 0.8; }
        body { width: 100%; margin-left: auto; margin-right: auto; }
        .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)) !important; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div class="top-navbar">
        <div class="burger" onclick="toggleM()">☰</div>
        <div class="nav-left">
            <a href="index.html" class="nav-brand">
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX <small style="color:white;">• Tags</small></span>
            </a>
        </div>
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="Rechercher un anime..." autocomplete="off">
            <span class="search-icon">🔍</span>
            <div class="search-suggestions" id="search-suggestions"></div>
        </div>
        <div class="mobile-overlay" id="overlay" onclick="toggleM()"></div>
        <div class="nav-links" id="menu">
            <div class="close-menu" onclick="toggleM()">← Retour</div>
            <a href="index.html">🏠 Accueil</a>
            <a href="tags.html">🏷️ Tags</a>
            <a href="alphabetique.html">📖 A-Z</a>
            <a href="playlist.html">📂 Playlist</a>
            <a href="editeurs.html">🏢 Studios</a>
            <a href="share.html">🔗 Partager</a>
            <a href="profil.html">👤 Profil</a>
            <a href="index_old.html">🕰️ Ancien Index</a>
            <a href="https://discord.gg/4DY3Zq4vW4" target="_blank" class="discord-btn">Discord</a>
        </div>
    </div>

    <div class="container">
        <h2 style="color: var(--primary); margin-bottom: 20px;">Explorer par catégories</h2>
        
        <div id="tags-categories"></div>
        
        <div id="selected-descriptions" class="selected-descriptions">
            <h4>📖 Tags sélectionnés :</h4>
            <div id="descriptions-list"></div>
        </div>
        
        <div class="results-header">
            <div id="results-title" class="results-title">Sélectionnez des tags</div>
            <div class="sort-controls">
                <select id="tag-sort" onchange="applySort()">
                    <option value="">Aléatoire</option>
                    <option value="score">Score ↓</option>
                    <option value="popularite">Popularité ↑</option>
                    <option value="sortie">Année ↓</option>
                    <option value="episodes">Épisodes ↓</option>
                    <option value="nom">Nom (A-Z)</option>
                    <option value="censure">Censure</option>
                    <option value="etat">État</option>
                    <option value="editeur">Éditeur</option>
                </select>
            </div>
        </div>
        <div id="anime-container" class="grid"></div>
    </div>

    <script>
        let allAnimes = [];
        let tagDescriptions = {};
        let selectedTags = new Set();  // Ensemble des tags actuellement sélectionnés
        let currentSort = '';
        let currentSearch = '';  // pour la recherche

        // Définition des catégories
        const categories = {
            "Pratiques physiques": [
                "Ahegao", "BDSM", "Bondage", "Condom", "Cosplay", "Lactation", "Public Sex", "Rape",
                "Paizuri", "Masturbation", "Gang bang", "Yuri", "Yaoi", "Gender bender"
            ],
            "Caractéristiques personnages physiques et mentaux": [
                "Giga seins", "Futanari", "Tentacules", "Virgin", "Fétichisme", "Masochisme", "Nymphomanie",
                "Voyeurisme", "Yandere", "Tsundere", "Elf", "Succube", "Magical girl", "Monster", "Monster girl",
                "Furry", "Kemonomimi", "Milf", "Gyaru", "Idols", "Nun", "Nurse", "Maid", "Femboy", "Loli", "Shota"
            ],
            "Cadre Général": [
                "Vanilla", "School life", "Inceste", "NTR", "Harem", "Psychologique", "Surnaturel", "Isekai",
                "Fantasy", "Horreur", "Jeu NSFW", "Erotica"
            ]
        };
        const allCategoryTags = new Set([...categories["Pratiques physiques"], ...categories["Caractéristiques personnages physiques et mentaux"], ...categories["Cadre Général"]]);
        
        function getCategoryForTag(tag) {
            for (const [cat, tags] of Object.entries(categories)) {
                if (tags.includes(tag)) return cat;
            }
            return "Autres";
        }
        
        function normalize(str) {
            return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[-_.:;,!?()'"&~#|]/g, ' ').replace(/\s+/g, ' ').trim();
        }
        
        function searchAnimes(query) {
            const q = normalize(query);
            if (q.length < 1) return [];
            return allAnimes.filter(a => normalize(a.nom).includes(q));
        }
        
        async function setBackground() {
            const isMobile = window.innerWidth <= 1000;
            try {
                const res = await fetch('backgrounds.json');
                const data = await res.json();
                const list = isMobile ? data.mobile : data.desktop;
                if (!list || !list.length) return;
                const file = list[Math.floor(Math.random() * list.length)];
                document.getElementById('bg-layer').style.backgroundImage = `url('img/${file}')`;
            } catch(e) {}
        }
        
        // Mise à jour de l'URL et sessionStorage
        function updateURLAndStorage() {
            const tagsArray = Array.from(selectedTags);
            const urlParams = new URLSearchParams();
            if (tagsArray.length) urlParams.set('tags', tagsArray.join(','));
            if (currentSort) urlParams.set('sort', currentSort);
            if (currentSearch) urlParams.set('search', currentSearch);
            const newUrl = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : '');
            window.history.pushState({ tags: tagsArray, sort: currentSort, search: currentSearch }, '', newUrl);
            sessionStorage.setItem('tags_selected', JSON.stringify(tagsArray));
            sessionStorage.setItem('tags_sort', currentSort);
            sessionStorage.setItem('tags_search', currentSearch);
        }
        
        // Charger l'état depuis l'URL ou sessionStorage
        function loadStateFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            let tagsParam = urlParams.get('tags');
            if (tagsParam) {
                selectedTags = new Set(tagsParam.split(',').filter(t => t));
            } else {
                const stored = sessionStorage.getItem('tags_selected');
                if (stored) {
                    try {
                        selectedTags = new Set(JSON.parse(stored));
                    } catch(e) { selectedTags = new Set(); }
                } else {
                    selectedTags = new Set();
                }
            }
            currentSort = urlParams.get('sort') || sessionStorage.getItem('tags_sort') || '';
            currentSearch = urlParams.get('search') || sessionStorage.getItem('tags_search') || '';
            if (currentSort) document.getElementById('tag-sort').value = currentSort;
            if (currentSearch) document.getElementById('search').value = currentSearch;
        }
        
        // Mettre à jour l'affichage des tags (cocher les actifs)
        function updateTagsUI() {
            document.querySelectorAll('.tag-pill').forEach(pill => {
                const tag = pill.getAttribute('data-tag');
                if (selectedTags.has(tag)) pill.classList.add('active');
                else pill.classList.remove('active');
            });
        }
        
        // Afficher les descriptions des tags sélectionnés
        function updateDescriptions() {
            const container = document.getElementById('selected-descriptions');
            const listDiv = document.getElementById('descriptions-list');
            if (selectedTags.size === 0) {
                container.classList.remove('visible');
                return;
            }
            container.classList.add('visible');
            let html = '';
            for (let tag of selectedTags) {
                const desc = tagDescriptions[tag] || "Pas de description disponible.";
                html += `<div class="desc-item"><strong>${tag}</strong> : ${desc}</div>`;
            }
            listDiv.innerHTML = html;
        }
        
        // Filtrer les animes : tous les tags sélectionnés doivent être présents
        function filterAnimesByTags(animes) {
            if (selectedTags.size === 0) return animes;
            return animes.filter(anime => {
                if (!anime.tags || anime.tags.length === 0) return false;
                for (let tag of selectedTags) {
                    if (!anime.tags.includes(tag)) return false;
                }
                return true;
            });
        }
        
        // Appliquer tri et recherche
        function applyFiltersAndSort() {
            let filtered = allAnimes;
            // Filtre par tags
            filtered = filterAnimesByTags(filtered);
            // Filtre par recherche
            if (currentSearch) {
                const normSearch = normalize(currentSearch);
                filtered = filtered.filter(a => normalize(a.nom).includes(normSearch));
            }
            // Tri
            if (currentSort) {
                filtered = [...filtered];
                if (currentSort === 'score') filtered.sort((a,b)=>parseFloat((b.score||'0').replace(',','.'))-parseFloat((a.score||'0').replace(',','.')));
                else if (currentSort === 'popularite') filtered.sort((a,b)=>(parseInt((a.pop||'').replace('#',''))||99999)-(parseInt((b.pop||'').replace('#',''))||99999));
                else if (currentSort === 'sortie') filtered.sort((a,b)=>dateToTs(b.sortie)-dateToTs(a.sortie));
                else if (currentSort === 'episodes') filtered.sort((a,b)=>{ const ea=parseInt((a.ep||'').match(/\d+/g)?.pop()||0); const eb=parseInt((b.ep||'').match(/\d+/g)?.pop()||0); return eb-ea; });
                else if (currentSort === 'nom') filtered.sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));
                else if (currentSort === 'censure') filtered.sort((a,b)=>(a.censure||'').localeCompare(b.censure||''));
                else if (currentSort === 'etat') filtered.sort((a,b)=>(a.etat||'').localeCompare(b.etat||''));
                else if (currentSort === 'editeur') filtered.sort((a,b)=>(a.editeur||'').localeCompare(b.editeur||''));
            }
            renderCards(filtered);
            const title = document.getElementById('results-title');
            if (selectedTags.size === 0 && !currentSearch) title.innerText = "Sélectionnez des tags ou recherchez un anime";
            else {
                let msg = `${filtered.length} anime(s) trouvé(s)`;
                if (selectedTags.size) msg += ` avec les tags : ${Array.from(selectedTags).join(', ')}`;
                if (currentSearch) msg += ` pour "${currentSearch}"`;
                title.innerText = msg;
            }
        }
        
        function dateToTs(s){
            if(!s) return 0;
            s = s.trim();
            const mois={'janv.':1,'févr.':2,'mars':3,'avr.':4,'mai':5,'juin':6,'juil.':7,'août':8,'sept.':9,'oct.':10,'nov.':11,'déc.':12,
                        'Jan':1,'Feb':2,'Mar':3,'Apr':4,'May':5,'Jun':6,'Jul':7,'Aug':8,'Sep':9,'Oct':10,'Nov':11,'Dec':12};
            const parts = s.split(' au ');
            const last = parts[parts.length-1].trim();
            const m1 = last.match(/(\d{1,2})\s+([a-zéûôA-Z.]+)\s+(\d{4})/);
            if(m1){ const mo=mois[m1[2]]||1; return new Date(+m1[3], mo-1, +m1[1]).getTime(); }
            const m2 = last.match(/([A-Za-z]{3})\s+(\d{1,2}),\s*(\d{4})/);
            if(m2){ const mo=mois[m2[1]]||1; return new Date(+m2[3], mo-1, +m2[2]).getTime(); }
            const m3 = (last.match(/\d{4}/g)||[]);
            if(m3.length){ return new Date(+m3[m3.length-1], 0, 1).getTime(); }
            return 0;
        }
        
        function renderCards(list) {
            const container = document.getElementById('anime-container');
            const hl = (f) => currentSort === f ? 'class="highlight"' : '';
            container.innerHTML = list.map(a=>`
                <a href="video.html?name=${encodeURIComponent(a.nom)}" class="card">
                    <div class="img-container"><img src="img/${a.img}" onerror="this.src='img/logo.jpg'"></div>
                    <div class="card-info">
                        <div class="card-title">${a.nom}</div>
                        <div class="card-meta-row"><span ${hl('sortie')}>📅${currentSort==='sortie'?(a.sortie||''):((a.sortie||'').match(/\d{4}/g)?.pop()||a.sortie)}</span><span ${hl('score')}>⭐${a.score}</span><span ${hl('popularite')}>📈${a.pop}</span></div>
                        <div class="card-meta-row"><span ${hl('episodes')}>🎞️${a.ep}</span><span ${hl('censure')}>🔞${a.censure}</span><span ${hl('etat')}>🛠️${a.etat}</span></div>
                        ${a.editeur?`<div class="card-meta-row"><span ${hl('editeur')}>🏢${a.editeur}</span></div>`:''}
                    </div>
                </a>`).join('');
        }
        
        // Gestionnaire de clic sur tag
        function toggleTag(tag) {
            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
            } else {
                selectedTags.add(tag);
            }
            updateTagsUI();
            updateDescriptions();
            updateURLAndStorage();
            applyFiltersAndSort();
        }
        
        // Réinitialiser tous les tags
        function clearAllTags() {
            selectedTags.clear();
            updateTagsUI();
            updateDescriptions();
            updateURLAndStorage();
            applyFiltersAndSort();
        }
        
        // Générer l'interface des catégories
        function generateCategoriesUI(allTagsSet) {
            // Organiser les tags par catégorie
            const categoriesMap = new Map();
            for (let cat of Object.keys(categories)) categoriesMap.set(cat, []);
            categoriesMap.set("Autres", []);
            
            for (let tag of allTagsSet) {
                const cat = getCategoryForTag(tag);
                categoriesMap.get(cat).push(tag);
            }
            
            // Trier les tags alphabétiquement dans chaque catégorie
            for (let [cat, tags] of categoriesMap.entries()) {
                tags.sort((a,b) => a.localeCompare(b));
            }
            
            const container = document.getElementById('tags-categories');
            let html = '';
            for (let [cat, tags] of categoriesMap.entries()) {
                if (tags.length === 0) continue;
                html += `<div class="tag-category"><h3>${cat}</h3><div class="tags-container">`;
                tags.forEach(tag => {
                    html += `<div class="tag-pill" data-tag="${tag.replace(/"/g, '&quot;')}" onclick="toggleTag('${tag.replace(/'/g, "\\'")}')">${tag}</div>`;
                });
                html += `</div></div>`;
            }
            // Bouton pour effacer tous les tags
            html += `<div class="tag-category"><div class="tags-container"><div class="clear-tags-btn" onclick="clearAllTags()">✖ Effacer tous les tags</div></div></div>`;
            container.innerHTML = html;
        }
        
        async function init() {
            setBackground();
            try {
                const [csvResp, tagResp] = await Promise.all([fetch('animes.csv'), fetch('tags_description.csv').catch(() => null)]);
                const rawData = await csvResp.text();
                allAnimes = rawData.split(/\r?\n/).slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0] || c.length < 9) return null;
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                    return { 
                        nom: clean(c[0]), sortie: clean(c[3]), score: clean(c[2]), pop: clean(c[1]), ep: clean(c[4]), censure: clean(c[5]), 
                        etat: clean(c[6]), img: clean(c[8]), tags: c[12] ? c[12].split(',').map(clean).filter(t=>t) : [], editeur: clean(c[14])
                    };
                }).filter(a => a);
                
                if (tagResp && tagResp.ok) {
                    const tagText = await tagResp.text();
                    tagText.split(/\r?\n/).slice(1).forEach(line => {
                        if (!line.trim()) return;
                        let cols = [], field = '', inQ = false;
                        for (let i=0;i<line.length;i++) { const ch=line[i]; if(ch==='"') inQ=!inQ; else if(ch===';' && !inQ) { cols.push(field); field=''; } else field+=ch; }
                        cols.push(field);
                        const name = (cols[0]||'').trim().replace(/^"|"$/g,'');
                        const desc = (cols[1]||'').trim().replace(/^"|"$/g,'');
                        if(name) tagDescriptions[name]=desc;
                    });
                }
                
                // Récupérer tous les tags existants dans les animes
                const allTagsSet = new Set();
                allAnimes.forEach(a => a.tags.forEach(t => allTagsSet.add(t)));
                generateCategoriesUI(allTagsSet);
                
                // Restaurer l'état depuis l'URL ou sessionStorage
                loadStateFromURL();
                // Appliquer les sélections à l'UI
                updateTagsUI();
                updateDescriptions();
                applyFiltersAndSort();
                
                // Gestion de la recherche
                const searchInput = document.getElementById('search');
                const searchSuggestions = document.getElementById('search-suggestions');
                searchInput.addEventListener('input', function() {
                    currentSearch = this.value.trim();
                    updateURLAndStorage();
                    applyFiltersAndSort();
                    
                    if (currentSearch.length >= 2) {
                        const results = allAnimes.filter(a => normalize(a.nom).includes(normalize(currentSearch))).slice(0, 8);
                        if (results.length === 0) searchSuggestions.innerHTML='<div style="padding:12px;color:#888;">Aucun résultat</div>';
                        else searchSuggestions.innerHTML = results.map(a=>'<div class="suggestion-item" data-name="'+a.nom.replace(/"/g,'&quot;')+'"><img src="img/'+a.img+'" class="sugg-img" onerror="this.src=\'img/logo.jpg\'"><span>'+a.nom+'</span></div>').join('');
                        searchSuggestions.classList.add('active');
                    } else {
                        searchSuggestions.classList.remove('active');
                    }
                });
                searchInput.addEventListener('keydown', function(e) {
                    if(e.key==='Enter') { e.preventDefault(); searchSuggestions.classList.remove('active'); this.blur(); }
                });
                searchSuggestions.addEventListener('click', function(e) { const item=e.target.closest('.suggestion-item'); if(item && item.dataset.name) window.location.href='video.html?name='+encodeURIComponent(item.dataset.name); });
                document.addEventListener('click', function(e) { if(!e.target.closest('.search-wrapper')) searchSuggestions.classList.remove('active'); });
                
                // Gestion du tri
                document.getElementById('tag-sort').addEventListener('change', function() {
                    currentSort = this.value;
                    updateURLAndStorage();
                    applyFiltersAndSort();
                });
                
                // Gestion du retour arrière
                window.addEventListener('popstate', function(event) {
                    if (event.state) {
                        selectedTags = new Set(event.state.tags || []);
                        currentSort = event.state.sort || '';
                        currentSearch = event.state.search || '';
                        document.getElementById('tag-sort').value = currentSort;
                        document.getElementById('search').value = currentSearch;
                        updateTagsUI();
                        updateDescriptions();
                        applyFiltersAndSort();
                    } else {
                        // fallback sur l'URL
                        loadStateFromURL();
                        updateTagsUI();
                        updateDescriptions();
                        applyFiltersAndSort();
                    }
                });
                
            } catch(err) { console.error(err); }
        }
        
        function toggleM() { const menu=document.getElementById('menu'), overlay=document.getElementById('overlay'); const isOpen=menu.classList.toggle('active'); overlay.classList.toggle('active'); document.body.style.overflow=isOpen?'hidden':''; }
        
        // Exposer les fonctions globales pour les onclick
        window.toggleTag = toggleTag;
        window.clearAllTags = clearAllTags;
        window.applySort = function() { 
            currentSort = document.getElementById('tag-sort').value;
            updateURLAndStorage();
            applyFiltersAndSort();
        };
        window.toggleM = toggleM;
        
        init();
    </script>
</body>
</html>
