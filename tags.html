<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="img/logo.jpg" type="image/jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="mobile.css">
    <title>Tags - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --nav-bg: rgba(15, 15, 15, 0.85); }
        #bg-layer {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat;
        }
        /* Overlay fixe sombre pour mettre en valeur les cartes */
        body::after {
            content: ''; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: -1; pointer-events: none;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; min-height: 100vh; overflow-x: hidden; }
        .top-navbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--nav-bg); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); gap: 12px; flex-wrap: wrap; }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 5px; order: -1; }
        .search-wrapper { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
        .search-wrapper input { width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; padding: 6px 30px 6px 10px; border-radius: 5px; font-size: 0.85em; outline: none; }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #888; font-size: 0.9em; pointer-events: none; }
        .search-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 0 0 5px 5px; max-height: 300px; overflow-y: auto; display: none; z-index: 2000; }
        .search-suggestions.active { display: block; }
        .search-suggestions .suggestion-item { padding: 8px 12px; cursor: pointer; color: #ccc; font-size: 0.85em; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 10px; }
        .search-suggestions .suggestion-item:hover { background: #2a2a2a; }
        .search-suggestions .suggestion-item .sugg-img { width: 28px; height: 40px; border-radius: 4px; object-fit: cover; }
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links .nav-btn { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8em; text-decoration: none; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .nav-links .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; white-space: nowrap; border: 2px solid rgba(255,255,255,0.15); display: inline-flex; align-items: center; gap: 5px; }
        .nav-links .discord-btn::before { content: '💬'; font-size: 0.9em; }
        .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; white-space: nowrap; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }
        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .search-wrapper { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: #0f0f0f; flex-direction: column; padding: 30px 20px; transition: 0.4s; z-index: 1100; align-items: stretch; overflow-y: auto; left: auto; right: -100%; }
            .nav-links.active { right: 0; left: auto; }
            .nav-links a, .nav-links .nav-btn, .nav-links .discord-btn { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .nav-links .discord-btn { margin-top: auto; border-radius: 20px; justify-content: center; }
            .grid { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .tags-container { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .tag-pill { padding: 8px 16px; background: #222; border: 1px solid #444; border-radius: 20px; color: #ccc; cursor: pointer; font-size: 0.9em; transition: 0.3s; }
        .tag-pill:hover, .tag-pill.active { background: var(--primary); border-color: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.8em; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card .img-container { width: 100%; aspect-ratio: 2/3; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 8px; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; height: 2.4em; overflow: hidden; font-size: 1.05em; line-height: 1.2; }
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 4px; font-size: 0.72em; color: #bbb; margin-top: 2px; }
        .tag-def-box { background: rgba(15,15,15,0.88); backdrop-filter: blur(12px); border: 1px solid rgba(255,71,87,0.4); border-left: 4px solid var(--primary); border-radius: 8px; padding: 14px 18px; margin-bottom: 18px; display: none; }
        .tag-def-box.visible { display: block; }
        .tag-def-name { font-weight: 800; color: var(--primary); font-size: 1.05em; margin-bottom: 5px; }
        .tag-def-text { color: #ddd; font-size: 0.9em; line-height: 1.55; }
        .sort-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
        .sort-controls select { background: #222; border: 1px solid #444; color: white; padding: 6px 10px; border-radius: 6px; font-size: 0.85em; cursor: pointer; }
        @media (max-width: 1000px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; } }
            .highlight { background: var(--primary); color: white; padding: 0 2px; border-radius: 3px; font-weight: bold; }
        
        /* ===== CORRECTIONS GLOBALES ===== */
        /* 1. Images lisses (anti-pixelisation) */
        img {
            image-rendering: auto;
            -webkit-backface-visibility: hidden;
        }
        .card img, .sugg-img, .ml-img, .list-img, .studio-logo, .studio-preview img {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: auto;
            interpolation-mode: bicubic;
        }

        
        /* 2. Zoom par défaut 80% */
        @media screen {
            html { zoom: 0.8; }
        }

        
        /* 3. Grille responsive au zoom */
        .grid, .anime-list, #search-results-grid {
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)) !important;
        }
        @media (max-width: 600px) {
            .grid, .anime-list, #search-results-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)) !important;
            }
        }

        </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div class="top-navbar">
        <div class="burger" onclick="toggleM()">☰</div>
        <div class="nav-left">
            <a href="index.html" class="nav-brand">
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX <small style="color:white;">• Tags</small></span>
            </a>
        </div>
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="Rechercher un anime..." autocomplete="off">
            <span class="search-icon">🔍</span>
            <div class="search-suggestions" id="search-suggestions"></div>
        </div>
        <div class="mobile-overlay" id="overlay" onclick="toggleM()"></div>
        <div class="nav-links" id="menu">
            <div class="close-menu" onclick="toggleM()">← Retour</div>
            <a href="index.html">🏠 Accueil</a>
            <a href="tags.html">🏷️ Tags</a>
            <a href="alphabetique.html">📖 A-Z</a>
            <a href="playlist.html">📂 Playlist</a>
            <a href="editeurs.html">🏢 Studios</a>
            <a href="share.html">🔗 Partager</a>
            <a href="profil.html">👤 Profil</a>
            <a href="index_old.html">🕰️ Ancien Index</a>
            <a href="https://discord.gg/4DY3Zq4vW4" target="_blank" class="discord-btn">Discord</a>
        </div>
    </div>

    <div class="container">
        <h2 style="color: var(--primary); margin-bottom: 20px;">Explorer par catégories</h2>
        <div id="tags-list" class="tags-container">Chargement des tags...</div>
        <div id="tag-def-box" class="tag-def-box">
            <div class="tag-def-name" id="tag-def-name"></div>
            <div class="tag-def-text" id="tag-def-text"></div>
        </div>
        <div id="results-header" style="display:none; margin-bottom: 14px;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                <div id="results-title" style="font-weight: bold; color: #888;"></div>
                <div class="sort-controls">
                    <select id="tag-sort" onchange="applySort()">
                        <option value="">Aléatoire</option>
                        <option value="score">Score ↓</option>
                        <option value="popularite">Popularité ↑</option>
                        <option value="sortie">Année ↓</option>
                        <option value="episodes">Épisodes ↓</option>
                        <option value="nom">Nom (A-Z)</option>
                        <option value="censure">Censure</option>
                        <option value="etat">État</option>
                        <option value="editeur">Éditeur</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="anime-container" class="grid"></div>
    </div>

    <script>
        let allAnimes = [];
        let tagDescriptions = {};
        let activeTag = new URLSearchParams(window.location.search).get('tag') 
                || sessionStorage.getItem('tags_activeTag') || null;
        let currentFiltered = [];

        function normalize(str) {
            return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[-_.:;,!?()'"&~#|]/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function searchAnimes(query) {
            const q = normalize(query);
            if (q.length < 1) return [];
            return allAnimes.filter(a => normalize(a.nom).includes(q));
        }

        async function setBackground() {
            const isMobile = window.innerWidth <= 1000;
            try {
                const res = await fetch('backgrounds.json');
                const data = await res.json();
                const list = isMobile ? data.mobile : data.desktop;
                if (!list || !list.length) return;
                const file = list[Math.floor(Math.random() * list.length)];
                document.getElementById('bg-layer').style.backgroundImage = `url('img/${file}')`;
            } catch(e) {}
        }

        // Fond fixe, pas de parallax

        async function init() {
            setBackground();

            try {
                const [csvResp, tagResp] = await Promise.all([fetch('animes.csv'), fetch('tags_description.csv').catch(() => null)]);
                const rawData = await csvResp.text();
                allAnimes = rawData.split(/\r?\n/).slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0] || c.length < 9) return null;
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                    return { 
                        nom: clean(c[0]), sortie: clean(c[3]), score: clean(c[2]), pop: clean(c[1]), ep: clean(c[4]), censure: clean(c[5]), 
                        etat: clean(c[6]), img: clean(c[8]), tags: c[12] ? c[12].split(',').map(clean).filter(t=>t) : [], editeur: clean(c[14])
                    };
                }).filter(a => a);
                if (tagResp && tagResp.ok) {
                    const tagText = await tagResp.text();
                    tagText.split(/\r?\n/).slice(1).forEach(line => {
                        if (!line.trim()) return;
                        let cols = [], field = '', inQ = false;
                        for (let i=0;i<line.length;i++) { const ch=line[i]; if(ch==='"') inQ=!inQ; else if(ch===';' && !inQ) { cols.push(field); field=''; } else field+=ch; }
                        cols.push(field);
                        const name = (cols[0]||'').trim().replace(/^"|"$/g,'');
                        const desc = (cols[1]||'').trim().replace(/^"|"$/g,'');
                        if(name) tagDescriptions[name]=desc;
                    });
                }
                generateTagCloud();
                filterByTag(activeTag);
                // Restore saved sort
                const savedSort = sessionStorage.getItem('tags_sort');
                if (savedSort && activeTag) {
                    const sel = document.getElementById('tag-sort');
                    if (sel) { sel.value = savedSort; applySort(); }
                }

                const searchInput = document.getElementById('search');
                const searchSuggestions = document.getElementById('search-suggestions');
                searchInput.addEventListener('input', function() {
                    const val = this.value.trim();
                    if (val.length < 2) { searchSuggestions.classList.remove('active'); return; }
                    const results = searchAnimes(val).slice(0,8);
                    if (results.length===0) searchSuggestions.innerHTML='<div style="padding:12px;color:#888;">Aucun résultat</div>';
                    else searchSuggestions.innerHTML=results.map(a=>'<div class="suggestion-item" data-name="'+a.nom.replace(/"/g,'&quot;')+'"><img src="img/'+a.img+'" class="sugg-img" onerror="this.src=\'img/logo.jpg\'"><span>'+a.nom+'</span></div>').join('');
                    searchSuggestions.classList.add('active');
                });
                searchInput.addEventListener('keydown', function(e) {
                    if(e.key==='Enter') { e.preventDefault(); const val=this.value.trim(); if(val) window.location.href='index.html?search='+encodeURIComponent(val); searchSuggestions.classList.remove('active'); this.blur(); }
                });
                searchSuggestions.addEventListener('click', function(e) { const item=e.target.closest('.suggestion-item'); if(item && item.dataset.name) window.location.href='video.html?name='+encodeURIComponent(item.dataset.name); });
                document.addEventListener('click', function(e) { if(!e.target.closest('.search-wrapper')) searchSuggestions.classList.remove('active'); });
            } catch(err) { console.error(err); }
        }

        function generateTagCloud() {
            const tagsList = document.getElementById('tags-list');
            const allTags = new Set();
            allAnimes.forEach(a=>a.tags.forEach(t=>allTags.add(t)));
            const sortedTags = Array.from(allTags).sort();
            if(!sortedTags.length) { tagsList.innerHTML="Aucun tag trouvé."; return; }
            tagsList.innerHTML = sortedTags.map(t=>`<div class="tag-pill ${t===activeTag?'active':''}" onclick="filterByTag('${t.replace(/'/g,"\\'")}')">${t}</div>`).join('');
        }

        function filterByTag(tag) {
            activeTag = tag;
            if (tag) sessionStorage.setItem('tags_activeTag', tag);
            else sessionStorage.removeItem('tags_activeTag');
            document.getElementById('search').value='';
            document.querySelectorAll('.tag-pill').forEach(btn=>btn.classList.toggle('active',btn.innerText.trim()===tag));
            const title=document.getElementById('results-title'), header=document.getElementById('results-header'), defBox=document.getElementById('tag-def-box');
            if(!tag) { title.innerText="Sélectionnez un tag"; header.style.display='none'; defBox.classList.remove('visible'); document.getElementById('anime-container').innerHTML=""; return; }
            if(tagDescriptions[tag]) { document.getElementById('tag-def-name').textContent=tag; document.getElementById('tag-def-text').textContent=tagDescriptions[tag]; defBox.classList.add('visible'); }
            else defBox.classList.remove('visible');
            currentFiltered = allAnimes.filter(a=>a.tags.includes(tag));
            title.innerText = `${currentFiltered.length} anime(s) pour le tag : ${tag}`;
            header.style.display='block';
            document.getElementById('tag-sort').value='';
            renderCards(currentFiltered,'');
        }

        function applySort() {
            const sortVal = document.getElementById('tag-sort').value;
            sessionStorage.setItem('tags_sort', sortVal);
            let list = [...currentFiltered];
            if(sortVal==='score') list.sort((a,b)=>parseFloat((b.score||'0').replace(',','.'))-parseFloat((a.score||'0').replace(',','.')));
            else if(sortVal==='popularite') list.sort((a,b)=>(parseInt((a.pop||'').replace('#',''))||99999)-(parseInt((b.pop||'').replace('#',''))||99999));
            else if(sortVal==='sortie') list.sort((a,b)=>dateToTs(b.sortie)-dateToTs(a.sortie));
            else if(sortVal==='episodes') list.sort((a,b)=>{ const ea=parseInt((a.ep||'').match(/\d+/g)?.pop()||0); const eb=parseInt((b.ep||'').match(/\d+/g)?.pop()||0); return eb-ea; });
            else if(sortVal==='nom') list.sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));
            else if(sortVal==='censure') list.sort((a,b)=>(a.censure||'').localeCompare(b.censure||''));
            else if(sortVal==='etat') list.sort((a,b)=>(a.etat||'').localeCompare(b.etat||''));
            else if(sortVal==='editeur') list.sort((a,b)=>(a.editeur||'').localeCompare(b.editeur||''));
            renderCards(list,sortVal);
        }

        
        // Convertit une date (française, américaine ou année seule) en timestamp pour tri précis
        function dateToTs(s){
            if(!s) return 0;
            s = s.trim();
            const mois={'janv.':1,'févr.':2,'mars':3,'avr.':4,'mai':5,'juin':6,'juil.':7,'août':8,'sept.':9,'oct.':10,'nov.':11,'déc.':12,
                        'Jan':1,'Feb':2,'Mar':3,'Apr':4,'May':5,'Jun':6,'Jul':7,'Aug':8,'Sep':9,'Oct':10,'Nov':11,'Dec':12};
            const parts = s.split(' au ');
            const last = parts[parts.length-1].trim();
            const m1 = last.match(/(\d{1,2})\s+([a-zéûôA-Z.]+)\s+(\d{4})/);
            if(m1){ const mo=mois[m1[2]]||1; return new Date(+m1[3], mo-1, +m1[1]).getTime(); }
            const m2 = last.match(/([A-Za-z]{3})\s+(\d{1,2}),\s*(\d{4})/);
            if(m2){ const mo=mois[m2[1]]||1; return new Date(+m2[3], mo-1, +m2[2]).getTime(); }
            const m3 = (last.match(/\d{4}/g)||[]);
            if(m3.length){ return new Date(+m3[m3.length-1], 0, 1).getTime(); }
            return 0;
        }

        function renderCards(list,sortVal) {
            const hl = (f)=>sortVal===f?'class="highlight"':'';
            document.getElementById('anime-container').innerHTML = list.map(a=>`
                <a href="video.html?name=${encodeURIComponent(a.nom)}" class="card">
                    <div class="img-container"><img src="img/${a.img}" onerror="this.src='img/logo.jpg'"></div>
                    <div class="card-info">
                        <div class="card-title">${a.nom}</div>
                        <div class="card-meta-row"><span ${hl('sortie')}>📅${sortVal==='sortie'?(a.sortie||''):((a.sortie||'').match(/\d{4}/g)?.pop()||a.sortie)}</span><span ${hl('score')}>⭐${a.score}</span><span ${hl('popularite')}>📈${a.pop}</span></div>
                        <div class="card-meta-row"><span ${hl('episodes')}>🎞️${a.ep}</span><span ${hl('censure')}>🔞${a.censure}</span><span ${hl('etat')}>🛠️${a.etat}</span></div>
                        ${a.editeur?`<div class="card-meta-row"><span ${hl('editeur')}>🏢${a.editeur}</span></div>`:''}
                    </div>
                </a>`).join('');
        }

        function toggleM() { const menu=document.getElementById('menu'), overlay=document.getElementById('overlay'); const isOpen=menu.classList.toggle('active'); overlay.classList.toggle('active'); document.body.style.overflow=isOpen?'hidden':''; }
        window.filterByTag=filterByTag; window.applySort=applySort; window.toggleM=toggleM;
        init();
    </script>

    <script>

        // ===== MÉMOIRE DES TRIS =====
        (function() {
            const PAGE_KEY = 'sort_' + (location.pathname.split('/').pop() || 'index');
            // Sauvegarde automatique des selects de tri
            function saveSort() {
                const sorts = {};
                document.querySelectorAll('select[id$="-sort"], select[id^="tag-sort"], select[id^="alpha-sort"], select[id^="prod-sort"], select[id^="studio-sort"], select[id^="all-sort"], #display-mode, #sort-select').forEach(sel => {
                    if (sel.id) sorts[sel.id] = sel.value;
                });
                if (Object.keys(sorts).length) sessionStorage.setItem(PAGE_KEY, JSON.stringify(sorts));
            }
            function restoreSort() {
                const saved = sessionStorage.getItem(PAGE_KEY);
                if (!saved) return;
                try {
                    const sorts = JSON.parse(saved);
                    Object.entries(sorts).forEach(([id, val]) => {
                        const el = document.getElementById(id);
                        if (el) el.value = val;
                    });
                } catch(e) {}
            }
            // Restore on load
            document.addEventListener('DOMContentLoaded', restoreSort);
            window.addEventListener('load', function() {
                restoreSort();
                document.querySelectorAll('select').forEach(sel => {
                    sel.addEventListener('change', saveSort);
                });
            });
        })();

    </script>
</body>
</html>
