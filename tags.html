<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="mobile.css">
    <title>Tags - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20,20,20,0.92); --text: #eee; --nav-bg: rgba(15,15,15,0.88); }

        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }
        /* Overlay sombre pour lisibilité */
        body::before { content:''; position:fixed; inset:0; background:rgba(0,0,0,0.52); z-index:0; pointer-events:none; }

        .top-navbar, .container { position: relative; z-index: 1; }

        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo-small { width: 35px; height: 35px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 1.1em; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Tags pills */
        .tags-container {
            background: var(--card-bg);
            padding: 20px; border-radius: 15px; border: 1px solid #333;
            margin-bottom: 24px;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        .tag-pill {
            padding: 7px 15px; background: #222; border: 1px solid #444;
            border-radius: 20px; color: #ccc; cursor: pointer; font-size: 0.88em; transition: 0.25s;
        }
        .tag-pill:hover, .tag-pill.active { background: var(--primary); border-color: var(--primary); color: white; }

        /* Définition du tag — fond solide pour lisibilité garantie */
        .tag-def-box {
            background: rgba(10,10,10,0.92);
            border: 1px solid rgba(255,71,87,0.4);
            border-left: 4px solid var(--primary);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: none;
            backdrop-filter: blur(8px);
        }
        .tag-def-box.visible { display: block; }
        .tag-def-name { font-weight: 800; color: var(--primary); font-size: 1.08em; margin-bottom: 7px; }
        .tag-def-text { color: #ddd; font-size: 0.9em; line-height: 1.6; }

        /* Barre résultats + tri */
        .results-bar {
            display: none;
            justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
            margin-bottom: 16px;
        }
        .results-bar.visible { display: flex; }
        .results-count { font-weight: bold; color: #888; font-size: 0.9em; }
        .sort-select {
            background: #1a1a1a; border: 1px solid #444; color: white;
            padding: 7px 12px; border-radius: 6px; font-size: 0.85em; cursor: pointer; outline: none;
        }
        .sort-select:focus { border-color: var(--primary); }

        /* Cartes */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card {
            background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s;
            border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.8em;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card .img-container { width: 100%; aspect-ratio: 2/3; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; height: 2.4em; overflow: hidden; font-size: 1.05em; line-height: 1.2; }
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 4px; font-size: 0.72em; color: #bbb; margin-top: 2px; }
        .highlight { background: var(--primary); color: white; padding: 0 3px; border-radius: 3px; font-weight: bold; order: -1; }
        .card-editeur { margin-top: auto; padding-top: 4px; font-size: 0.68em; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-top: 1px solid rgba(255,255,255,0.05); }
        .card-editeur.highlight { color: white; background: var(--primary); padding: 0 3px; border-radius: 3px; border-top: none; }

        @media (max-width: 1000px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .card-info { padding: 5px; }
            .card-title { font-size: 0.78em; height: 2.2em; }
            .card-meta-row { font-size: 0.6em; gap: 2px; }
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <a href="index.html" class="nav-brand">
            <img src="img/logo.jpg" class="nav-logo-small">
            <span class="nav-title">LE MALICIEUX <small style="color:white; margin-left:10px;">• Tags</small></span>
        </a>
        <a href="index.html" style="color:var(--primary); text-decoration:none; font-weight:bold; font-size:0.9em;">← Catalogue</a>
    </div>

    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:15px;">
            <h2 style="color:var(--primary); margin:0;">Explorer par catégories</h2>
            <a href="lexique.html" style="background:#222; color:#fff; text-decoration:none; padding:10px 20px; border-radius:8px; border:1px solid var(--primary); font-weight:bold; font-size:0.9em; transition:0.3s;" onmouseover="this.style.background='var(--primary)'" onmouseout="this.style.background='#222'">
                📖 Lexique des tags
            </a>
        </div>

        <div id="tags-list" class="tags-container">Chargement des tags...</div>

        <!-- Définition du tag -->
        <div id="tag-def-box" class="tag-def-box">
            <div class="tag-def-name" id="tag-def-name"></div>
            <div class="tag-def-text" id="tag-def-text"></div>
        </div>

        <!-- Barre résultats + tri -->
        <div id="results-bar" class="results-bar">
            <div id="results-count" class="results-count"></div>
            <select id="tag-sort" class="sort-select" onchange="applySort()">
                <option value="">🔀 Aléatoire</option>
                <option value="score">⭐ Score ↓</option>
                <option value="popularite">📈 Popularité ↑</option>
                <option value="sortie">📅 Année ↓</option>
                <option value="episodes">🎞️ Épisodes ↓</option>
                <option value="nom">🔤 Nom (A-Z)</option>
                <option value="censure">🔞 Censure</option>
                <option value="etat">🛠️ État</option>
                <option value="editeur">🏢 Éditeur</option>
            </select>
        </div>

        <div id="anime-container" class="grid"></div>
    </div>

    <script>
        // ── Fond unique via div fixe (pas de doublon) ──
        (function() {
            const isMobile = window.innerWidth <= 1000;
            const n = Math.floor(Math.random() * (isMobile ? 14 : 64)) + 1;
            const url = `url('img/${isMobile ? 'mobile' : 'fond'}${n}.webp')`;
            if (isMobile) {
                let bg = document.createElement('div');
                bg.style.cssText = 'position:fixed;inset:0;z-index:-1;pointer-events:none;background-size:cover;background-position:center top;background-repeat:no-repeat;';
                bg.style.backgroundImage = url;
                document.body.insertBefore(bg, document.body.firstChild);
            } else {
                document.body.style.backgroundImage = url;
            }
        })();

        let allAnimes = [];
        let tagDescriptions = {};
        let activeTag = new URLSearchParams(window.location.search).get('tag');
        let currentFiltered = [];

        async function init() {
            try {
                const [csvResp, tagResp] = await Promise.all([
                    fetch('animes.csv'),
                    fetch('tags_description.csv').catch(() => null)
                ]);

                const rawData = await csvResp.text();
                allAnimes = rawData.split(/\r?\n/).slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0] || c.length < 9) return null;
                    const cl = s => s ? s.trim().replace(/^"|"$/g, '') : '';
                    return {
                        nom: cl(c[0]), pop: cl(c[1]), score: cl(c[2]),
                        sortie: cl(c[3]), ep: cl(c[4]), censure: cl(c[5]),
                        etat: cl(c[6]), img: cl(c[8]),
                        tags: c[12] ? c[12].split(',').map(cl).filter(t => t) : [],
                        editeur: cl(c[14])
                    };
                }).filter(a => a);

                // Parser tags_description.csv
                if (tagResp && tagResp.ok) {
                    const txt = await tagResp.text();
                    txt.split(/\r?\n/).slice(1).forEach(line => {
                        if (!line.trim()) return;
                        let cols = [], f = '', q = false;
                        for (const c of line) {
                            if (c === '"') { q = !q; }
                            else if (c === ';' && !q) { cols.push(f); f = ''; }
                            else f += c;
                        }
                        cols.push(f);
                        const name = cols[0]?.trim().replace(/^"|"$/g,'');
                        const desc = cols[1]?.trim().replace(/^"|"$/g,'');
                        if (name) tagDescriptions[name] = desc || '';
                    });
                }

                generateTagCloud();
                if (activeTag) filterByTag(activeTag);
            } catch (err) { console.error(err); }
        }

        function generateTagCloud() {
            const allTags = new Set();
            allAnimes.forEach(a => a.tags.forEach(t => allTags.add(t)));
            const sorted = Array.from(allTags).sort();
            if (!sorted.length) { document.getElementById('tags-list').innerHTML = "Aucun tag trouvé."; return; }
            document.getElementById('tags-list').innerHTML = sorted.map(t =>
                `<div class="tag-pill${t === activeTag ? ' active' : ''}" onclick="filterByTag(${JSON.stringify(t)})">${t}</div>`
            ).join('');
        }

        function filterByTag(tag) {
            activeTag = tag;
            document.querySelectorAll('.tag-pill').forEach(p => p.classList.toggle('active', p.textContent.trim() === tag));

            const defBox = document.getElementById('tag-def-box');
            const bar = document.getElementById('results-bar');

            if (!tag) {
                defBox.classList.remove('visible');
                bar.classList.remove('visible');
                document.getElementById('anime-container').innerHTML = '';
                return;
            }

            // Définition
            if (tagDescriptions[tag]) {
                document.getElementById('tag-def-name').textContent = tag;
                document.getElementById('tag-def-text').textContent = tagDescriptions[tag];
                defBox.classList.add('visible');
            } else {
                defBox.classList.remove('visible');
            }

            currentFiltered = allAnimes.filter(a => a.tags.includes(tag));
            document.getElementById('results-count').textContent = `${currentFiltered.length} anime${currentFiltered.length > 1 ? 's' : ''} pour le tag : ${tag}`;
            bar.classList.add('visible');
            document.getElementById('tag-sort').value = '';
            renderCards(currentFiltered, '');
        }

        function applySort() {
            const sortVal = document.getElementById('tag-sort').value;
            let list = [...currentFiltered];
            if (sortVal === 'score')     list.sort((a,b) => parseFloat((b.score||'0').replace(',','.')) - parseFloat((a.score||'0').replace(',','.')));
            else if (sortVal === 'popularite') list.sort((a,b) => (parseInt((a.pop||'').replace('#',''))||99999) - (parseInt((b.pop||'').replace('#',''))||99999));
            else if (sortVal === 'sortie')    list.sort((a,b) => { const ya=parseInt((a.sortie||'').match(/\d{4}/)?.[0]||0),yb=parseInt((b.sortie||'').match(/\d{4}/)?.[0]||0); return yb-ya; });
            else if (sortVal === 'episodes')  list.sort((a,b) => { const ea=parseInt((a.ep||'').match(/\d+/g)?.pop()||0),eb=parseInt((b.ep||'').match(/\d+/g)?.pop()||0); return eb-ea; });
            else if (sortVal === 'nom')       list.sort((a,b) => a.nom.localeCompare(b.nom,'fr'));
            else if (sortVal === 'censure')   list.sort((a,b) => (a.censure||'').localeCompare(b.censure||''));
            else if (sortVal === 'etat')      list.sort((a,b) => (a.etat||'').localeCompare(b.etat||''));
            else if (sortVal === 'editeur')   list.sort((a,b) => (a.editeur||'').localeCompare(b.editeur||''));
            renderCards(list, sortVal);
        }

        function renderCards(list, sortVal) {
            const hl = f => sortVal === f ? 'class="highlight"' : '';
            document.getElementById('anime-container').innerHTML = list.map(a => `
                <a href="video.html?name=${encodeURIComponent(a.nom)}" class="card">
                    <div class="img-container">
                        <img src="img/${a.img}" loading="lazy" onerror="this.src='img/logo.jpg'">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${a.nom}</div>
                        <div class="card-meta-row">
                            <span ${hl('sortie')}>📅${a.sortie}</span>
                            <span ${hl('score')}>⭐${a.score}</span>
                            <span ${hl('popularite')}>📈${a.pop}</span>
                        </div>
                        <div class="card-meta-row">
                            <span ${hl('episodes')}>🎞️${a.ep}</span>
                            <span ${hl('censure')}>🔞${a.censure}</span>
                            <span ${hl('etat')}>🛠️${a.etat}</span>
                        </div>
                        ${a.editeur ? `<div class="card-editeur${sortVal==='editeur'?' highlight':''}">🏢 ${a.editeur}</div>` : '<div class="card-editeur" style="visibility:hidden">·</div>'}
                    </div>
                </a>`).join('');
        }

        init();
    </script>
</body>
</html>
