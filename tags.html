<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --nav-bg: rgba(15, 15, 15, 0.85); }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            min-height: 100vh;
        }

        /* Navbar identique à index.html */
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-brand { display: flex; align-items: center; gap: 12px; }
        .nav-logo-small { width: 35px; height: 35px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 1.1em; text-decoration: none; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Section des Tags */
        .tags-container { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .tag-pill {
            padding: 8px 16px;
            background: #222;
            border: 1px solid #444;
            border-radius: 20px;
            color: #ccc;
            cursor: pointer;
            font-size: 0.9em;
            transition: 0.3s;
        }
        .tag-pill:hover, .tag-pill.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Grille d'animes identique à index.html */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; 
            border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.8em;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card .img-container { width: 100%; aspect-ratio: 2/3; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; height: 2.4em; overflow: hidden; font-size: 1.05em; line-height: 1.2; }
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 4px; font-size: 0.72em; color: #bbb; margin-top: 2px; }
        .highlight { background: var(--primary); color: white; padding: 0 3px; border-radius: 3px; font-weight: bold; order: -1; }

        /* Définition du tag sélectionné */
        .tag-def-box {
            background: rgba(255,71,87,0.08);
            border: 1px solid rgba(255,71,87,0.3);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 18px;
            display: none;
        }
        .tag-def-box.visible { display: block; }
        .tag-def-name { font-weight: 800; color: var(--primary); font-size: 1.05em; margin-bottom: 5px; }
        .tag-def-text { color: #ccc; font-size: 0.9em; line-height: 1.55; }

        /* Contrôles de tri */
        .sort-controls {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .sort-controls select {
            background: #222; border: 1px solid #444; color: white;
            padding: 6px 10px; border-radius: 6px; font-size: 0.85em; cursor: pointer; outline: none;
        }
        .sort-controls select:focus { border-color: var(--primary); }

        @media (max-width: 1000px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <a href="index.html" class="nav-brand">
            <img src="img/logo.jpg" class="nav-logo-small">
            <span class="nav-title">LE MALICIEUX <small style="color:white; margin-left:10px;">• Tags</small></span>
        </a>
        <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.9em;">← Catalogue</a>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
            <h2 style="color: var(--primary); margin: 0;">Explorer par catégories</h2>
            <a href="lexique.html" style="background: #222; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; border: 1px solid var(--primary); font-weight: bold; font-size: 0.9em; transition: 0.3s;" onmouseover="this.style.background='var(--primary)'" onmouseout="this.style.background='#222'">
                📖 Consulter le lexique des tags
            </a>
        </div>
        
        <div id="tags-list" class="tags-container">Chargement des tags...</div>
        
        <!-- Définition du tag + compteur + tri -->
        <div id="tag-def-box" class="tag-def-box">
            <div class="tag-def-name" id="tag-def-name"></div>
            <div class="tag-def-text" id="tag-def-text"></div>
        </div>

        <div id="results-header" style="display:none; margin-bottom: 14px;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                <div id="results-title" style="font-weight: bold; color: #888;"></div>
                <div class="sort-controls">
                    <select id="tag-sort" onchange="applySort()">
                        <option value="">Aléatoire</option>
                        <option value="score">Score ↓</option>
                        <option value="popularite">Popularité ↑</option>
                        <option value="sortie">Année ↓</option>
                        <option value="episodes">Épisodes ↓</option>
                        <option value="nom">Nom (A-Z)</option>
                        <option value="censure">Censure</option>
                        <option value="etat">État</option>
                        <option value="editeur">Éditeur</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="anime-container" class="grid"></div>
    </div>

    <script>
        let allAnimes = [];
        let tagDescriptions = {}; // nom → description
        let activeTag = new URLSearchParams(window.location.search).get('tag');
        let currentFiltered = [];

        async function init() {
            // Fond aléatoire
            const isMobile = window.innerWidth <= 1000;
            const n = Math.floor(Math.random() * (isMobile ? 14 : 64)) + 1;
            document.body.style.backgroundImage = `url('img/${isMobile ? 'mobile' : 'fond'}${n}.webp')`;
            if (isMobile) {
                let _mbg = document.getElementById('mobile-bg-layer');
                if (!_mbg) { _mbg = document.createElement('div'); _mbg.id = 'mobile-bg-layer'; document.body.insertBefore(_mbg, document.body.firstChild); }
                _mbg.style.cssText = 'position:fixed;inset:0;z-index:-1;pointer-events:none;background-size:cover;background-position:center top;background-repeat:no-repeat;';
                _mbg.style.backgroundImage = `url('img/mobile${n}.webp')`;
            } else {
                document.body.style.backgroundImage = `url('img/fond${n}.webp')`;
            }

            try {
                // Charger animes.csv
                const [csvResp, tagResp] = await Promise.all([
                    fetch('animes.csv'),
                    fetch('tags_description.csv').catch(() => null)
                ]);

                const rawData = await csvResp.text();
                allAnimes = rawData.split(/\r?\n/).slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0] || c.length < 9) return null;
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                    return { 
                        nom: clean(c[0]), sortie: clean(c[3]), score: clean(c[2]), 
                        pop: clean(c[1]), ep: clean(c[4]), censure: clean(c[5]), 
                        etat: clean(c[6]), img: clean(c[8]),
                        tags: c[12] ? c[12].split(',').map(clean).filter(t => t !== "") : [],
                        editeur: clean(c[14])
                    };
                }).filter(a => a !== null);

                // Charger tags_description.csv si disponible
                if (tagResp && tagResp.ok) {
                    const tagText = await tagResp.text();
                    // Parser CSV simple
                    tagText.split(/\r?\n/).slice(1).forEach(line => {
                        if (!line.trim()) return;
                        // Gérer les champs entre guillemets
                        let cols = [], field = '', inQ = false;
                        for (let i = 0; i < line.length; i++) {
                            const c = line[i];
                            if (c === '"') { inQ = !inQ; }
                            else if (c === ';' && !inQ) { cols.push(field); field = ''; }
                            else field += c;
                        }
                        cols.push(field);
                        const name = (cols[0]||'').trim().replace(/^"|"$/g,'');
                        const desc = (cols[1]||'').trim().replace(/^"|"$/g,'');
                        if (name) tagDescriptions[name] = desc;
                    });
                }

                generateTagCloud();
                filterByTag(activeTag);
            } catch (err) {
                console.error("Erreur:", err);
            }
        }

        function generateTagCloud() {
            const tagsList = document.getElementById('tags-list');
            const allTags = new Set();
            allAnimes.forEach(a => a.tags.forEach(t => allTags.add(t)));
            const sortedTags = Array.from(allTags).sort();
            if (sortedTags.length === 0) { tagsList.innerHTML = "Aucun tag trouvé."; return; }
            tagsList.innerHTML = sortedTags.map(t => `
                <div class="tag-pill ${t === activeTag ? 'active' : ''}" onclick="filterByTag('${t.replace(/'/g,"\\'")}')">
                    ${t}
                </div>
            `).join('');
        }

        function filterByTag(tag) {
            activeTag = tag;
            document.querySelectorAll('.tag-pill').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.trim() === tag);
            });

            const container = document.getElementById('anime-container');
            const title = document.getElementById('results-title');
            const header = document.getElementById('results-header');
            const defBox = document.getElementById('tag-def-box');

            if (!tag) {
                title.innerText = "Sélectionnez un tag pour voir les animes correspondants.";
                header.style.display = 'none';
                defBox.classList.remove('visible');
                container.innerHTML = "";
                return;
            }

            // Afficher la définition du tag
            if (tagDescriptions[tag]) {
                document.getElementById('tag-def-name').textContent = tag;
                document.getElementById('tag-def-text').textContent = tagDescriptions[tag];
                defBox.classList.add('visible');
            } else {
                defBox.classList.remove('visible');
            }

            currentFiltered = allAnimes.filter(a => a.tags.includes(tag));
            title.innerText = `${currentFiltered.length} anime(s) pour le tag : ${tag}`;
            header.style.display = 'block';

            // Réinitialiser le tri à aléatoire quand on change de tag
            document.getElementById('tag-sort').value = '';
            renderCards(currentFiltered, '');
        }

        function applySort() {
            const sortVal = document.getElementById('tag-sort').value;
            let list = [...currentFiltered];

            if (sortVal === 'score') {
                list.sort((a,b) => parseFloat((b.score||'0').replace(',','.')) - parseFloat((a.score||'0').replace(',','.')));
            } else if (sortVal === 'popularite') {
                list.sort((a,b) => (parseInt((a.pop||'').replace('#',''))||99999) - (parseInt((b.pop||'').replace('#',''))||99999));
            } else if (sortVal === 'sortie') {
                list.sort((a,b) => {
                    const ya = parseInt((a.sortie||'').match(/\d{4}/)?.[0]||'0');
                    const yb = parseInt((b.sortie||'').match(/\d{4}/)?.[0]||'0');
                    return yb - ya;
                });
            } else if (sortVal === 'episodes') {
                list.sort((a,b) => {
                    const ea = parseInt((a.ep||'').match(/\d+/g)?.pop()||'0');
                    const eb = parseInt((b.ep||'').match(/\d+/g)?.pop()||'0');
                    return eb - ea;
                });
            } else if (sortVal === 'nom') {
                list.sort((a,b) => a.nom.localeCompare(b.nom,'fr'));
            } else if (sortVal === 'censure') {
                list.sort((a,b) => (a.censure||'').localeCompare(b.censure||''));
            } else if (sortVal === 'etat') {
                list.sort((a,b) => (a.etat||'').localeCompare(b.etat||''));
            } else if (sortVal === 'editeur') {
                list.sort((a,b) => (a.editeur||'').localeCompare(b.editeur||''));
            }
            // '' = aléatoire → ordre original (currentFiltered non trié)

            renderCards(list, sortVal);
        }

        function renderCards(list, sortVal) {
            const hl = (field) => sortVal === field ? 'class="highlight"' : '';
            document.getElementById('anime-container').innerHTML = list.map(a => `
                <a href="video.html?name=${encodeURIComponent(a.nom)}" class="card">
                    <div class="img-container">
                        <img src="img/${a.img}" loading="lazy" onerror="this.src='img/logo.jpg'">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${a.nom}</div>
                        <div class="card-meta-row">
                            <span ${hl('sortie')}>📅${a.sortie}</span>
                            <span ${hl('score')}>⭐${a.score}</span>
                            <span ${hl('popularite')}>📈${a.pop}</span>
                        </div>
                        <div class="card-meta-row">
                            <span ${hl('episodes')}>🎞️${a.ep}</span>
                            <span ${hl('censure')}>🔞${a.censure}</span>
                            <span ${hl('etat')}>🛠️${a.etat}</span>
                        </div>
                        ${a.editeur ? `<div class="card-meta-row"><span ${hl('editeur')} style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;">🏢${a.editeur}</span></div>` : ''}
                    </div>
                </a>`).join('');
        }

        init();
    </script>
</body>
</html>
