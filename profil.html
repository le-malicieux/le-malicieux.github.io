<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="mobile.css">
    <title>Profil - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20,20,20,0.9); --text: #eee; --nav-bg: rgba(15,15,15,0.85); }
        #bg-layer {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat; background-attachment: scroll;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; min-height: 100vh; overflow-x: hidden; }
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 12px; flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 5px; order: -1; }
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links .nav-btn {
            background: var(--primary); border: none; color: white;
            padding: 5px 10px; border-radius: 4px; font-size: 0.8em;
            text-decoration: none; cursor: pointer; white-space: nowrap; font-weight: bold;
        }
        .nav-links .discord-btn {
            background: #5865F2; color: white; text-decoration: none;
            padding: 5px 10px; border-radius: 20px; font-size: 0.8em;
            font-weight: bold; white-space: nowrap;
            border: 2px solid rgba(255,255,255,0.15);
            display: inline-flex; align-items: center; gap: 5px;
        }
        .nav-links .discord-btn::before { content: '💬'; font-size: 0.9em; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }
        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links {
                position: fixed; top: 0; left: -100%; width: 280px; height: 100vh;
                background: #0f0f0f; flex-direction: column; padding: 30px 20px;
                transition: 0.4s; z-index: 1100; align-items: stretch; overflow-y: auto;
            }
            .nav-links.active { left: 0; }
            .nav-links a, .nav-links .nav-btn, .nav-links .discord-btn { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .nav-links .discord-btn { margin-top: auto; border-radius: 20px; justify-content: center; }
        }
        .container { max-width: 600px; margin: 40px auto; padding: 30px; background: var(--card-bg); border-radius: 15px; border: 1px solid #333; text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 15px; }
        h2 { color: var(--primary); margin-bottom: 10px; }
        label { display: block; text-align: left; margin-top: 15px; color: #aaa; font-size: 0.9em; }
        input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px; font-size: 0.9em; margin-top: 5px; }
        button { background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 5px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <nav class="top-navbar">
        <div class="burger" onclick="toggleM()">☰</div>
        <div class="nav-left">
            <a href="index.html" class="nav-brand">
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX <small style="color:white;">• Profil</small></span>
            </a>
        </div>
        <div class="mobile-overlay" id="overlay" onclick="toggleM()"></div>
        <div class="nav-links" id="menu">
            <div class="close-menu" onclick="toggleM()">← Retour</div>
            <a href="index.html">🏠 Accueil</a>
            <a href="tags.html">🏷️ Tags</a>
            <a href="alphabetique.html">📖 A-Z</a>
            <a href="playlist.html">📂 Playlist</a>
            <a href="editeurs.html">🏢 Studios</a>
            <a href="index_old.html">🕰️ Ancien Index</a>
            <a href="https://discord.gg/4DY3Zq4vW4" target="_blank" class="discord-btn">Discord</a>
        </div>
    </nav>

    <div class="container" id="profile-content">
        <p>Chargement du profil...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function setBackground() {
            const isMobile = window.innerWidth <= 1000;
            const n = isMobile ? Math.floor(Math.random() * 13) + 1 : Math.floor(Math.random() * 64) + 1;
            document.getElementById('bg-layer').style.backgroundImage = `url('img/${isMobile ? 'mobile' + n : 'fond' + n}.webp')`;
        }
        setBackground();

        const container = document.getElementById('profile-content');

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                container.innerHTML = '<p>Vous devez être connecté pour voir votre profil. <a href="index.html">Retour à l\'accueil</a></p>';
                return;
            }
            const userDoc = await getDoc(doc(db, "users", user.uid));
            const data = userDoc.exists() ? userDoc.data() : {};
            const pseudo = data.pseudo || user.displayName || '';
            const bio = data.bio || '';
            const avatar = data.photoURL || user.photoURL || 'img/logo.jpg';

            container.innerHTML = `
                <img src="${avatar}" class="avatar" onerror="this.src='img/logo.jpg'">
                <h2>${pseudo || 'Anonyme'}</h2>
                <label>Pseudo</label>
                <input type="text" id="pseudo-input" value="${pseudo}">
                <label>Bio</label>
                <textarea id="bio-input" rows="3">${bio}</textarea>
                <button id="save-btn">Enregistrer</button>
                <button id="logout-btn" style="background:#333; margin-left:10px;">Déconnexion</button>
            `;

            document.getElementById('save-btn').onclick = async () => {
                const newPseudo = document.getElementById('pseudo-input').value.trim();
                const newBio = document.getElementById('bio-input').value.trim();
                await setDoc(doc(db, "users", user.uid), {
                    pseudo: newPseudo,
                    bio: newBio,
                    displayName: newPseudo || user.displayName,
                    email: user.email,
                    photoURL: user.photoURL || avatar,
                    lastSeen: new Date().toISOString()
                }, { merge: true });
                sessionStorage.setItem('userPseudo', newPseudo);
                alert('Profil mis à jour !');
            };

            document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => window.location.href = 'index.html');
        });

        function toggleM() { const m=document.getElementById('menu'), ov=document.getElementById('overlay'); const isOpen=m.classList.toggle('active'); ov.classList.toggle('active'); document.body.style.overflow=isOpen?'hidden':''; }
        window.toggleM = toggleM;
    </script>
</body>
</html>
