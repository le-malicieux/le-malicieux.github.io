<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Malicieux - Catalogue d'Animes</title>
    <style>
        :root { --primary: #ff4757; --primary-soft: #e04050; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --text-bright: #ffffff; --text-secondary: #ccc; --nav-bg: rgba(15, 15, 15, 0.85); }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text); 
            margin: 0; 
            min-height: 100vh;
        }

        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            will-change: transform; gap: 12px;
        }
        .nav-left { display: flex; flex-direction: row; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; cursor: pointer; }
        .nav-logo-small { width: 35px; height: 35px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 1.1em; }
        
        #back-home { font-size: 0.75em; color: #ff6b7a; text-decoration: none; display: none; cursor: pointer; margin-top: 2px; }
        #back-home:hover { color: var(--primary); }

        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 4px; user-select: none; }

        /* Barre de recherche */
        .search-wrapper {
            position: relative; flex: 1; max-width: 500px; min-width: 200px;
        }
        .search-wrapper input {
            width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; 
            padding: 10px 40px 10px 15px; border-radius: 25px; font-size: 0.9em;
            transition: 0.3s; box-sizing: border-box; outline: none;
        }
        .search-wrapper input:focus {
            border-color: var(--primary); box-shadow: 0 0 10px rgba(255,71,87,0.3);
        }
        .search-wrapper input::placeholder { color: #777; }
        .search-icon {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            color: #888; font-size: 1.1em; pointer-events: none;
        }
        .search-suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #1a1a1a; border: 1px solid #333; border-radius: 0 0 12px 12px;
            max-height: 350px; overflow-y: auto; display: none; z-index: 2000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
        }
        .search-suggestions.active { display: block; }
        .search-suggestions .suggestion-item {
            padding: 10px 15px; cursor: pointer; color: #ccc; font-size: 0.85em;
            border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.15s;
            display: flex; align-items: center; gap: 10px;
        }
        .search-suggestions .suggestion-item:hover { background: #2a2a2a; color: white; }
        .search-suggestions .suggestion-item .sugg-img {
            width: 32px; height: 45px; border-radius: 4px; object-fit: cover; flex-shrink: 0;
            background: #111;
        }
        .search-suggestions .no-result {
            padding: 15px; color: #888; text-align: center; font-size: 0.85em;
        }

        .nav-center { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .nav-center a { 
            background: #222; border: 1px solid #444; color: white; padding: 8px 12px; border-radius: 25px; font-size: 0.85em; text-decoration: none; white-space: nowrap;
        }
        .btn-red { background: var(--primary) !important; border: none !important; font-weight: bold; cursor: pointer; color: white !important; }

        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }

        .hero-section {
            height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .main-logo { width: 130px; height: 130px; border-radius: 20px; border: 3px solid var(--primary); margin-bottom: 15px; box-shadow: 0 0 15px rgba(255,71,87,0.3); object-fit: cover; }
        .main-title { font-size: 3em; margin: 0; color: white; text-shadow: 2px 2px 12px rgba(0,0,0,0.9); font-weight: 800; }
        .main-slogan { font-size: 1.4em; font-weight: bold; margin-top: 10px; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }

        .content-area { padding: 20px 15px 40px; }
        
        /* Titres de section : adoucis */
        .section-title {
            max-width: 1400px; margin: 30px auto 15px; padding: 8px 15px;
            font-size: 1.4em; font-weight: 600; 
            color: var(--primary-soft);
            background: rgba(0, 0, 0, 0.45);
            border-radius: 20px;
            display: inline-block;
            letter-spacing: 0.3px;
        }
        .section-title-wrapper {
            max-width: 1400px; margin: 30px auto 15px; padding: 0 15px;
        }
        .section-subtitle { 
            font-size: 0.55em; color: var(--text-secondary); font-weight: 400; display: block; margin-top: 3px;
            opacity: 0.85;
        }

        .carousel-wrapper {
            position: relative; max-width: 1400px; margin: 0 auto; padding: 0 35px;
        }
        .carousel-container { overflow: hidden; }
        
        .carousel-track {
            display: flex; gap: 15px; transition: transform 0.4s ease;
        }
        
        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15); color: white;
            font-size: 18px; width: 30px; height: 60px; cursor: pointer; z-index: 10; border-radius: 4px;
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
            opacity: 0.7;
        }
        .carousel-btn:hover { background: var(--primary); border-color: var(--primary); opacity: 1; }
        .carousel-btn.prev { left: 0; }
        .carousel-btn.next { right: 0; }
        .carousel-btn:disabled { opacity: 0.2; cursor: default; }
        .carousel-btn:disabled:hover { background: rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.15); }

        .card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; 
            border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.8em;
            display: flex; flex-direction: column; flex-shrink: 0;
            width: 180px;
        }
        .card:hover { transform: translateY(-6px); border-color: var(--primary); }
        .card .img-container { width: 100%; aspect-ratio: 2/3; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 7px 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; height: 2.4em; overflow: hidden; font-size: 1.05em; line-height: 1.2; }
        
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 4px; font-size: 0.72em; color: #ddd; margin-top: 2px; }
        .highlight { background: var(--primary); color: white; padding: 0 3px; border-radius: 3px; font-weight: bold; }

        .mal-updated { color: #5dade2; }

        .anime-count {
            text-align: center; padding: 12px 20px; 
            color: var(--primary-soft); font-size: 0.95em; font-weight: 600;
            background: rgba(0, 0, 0, 0.45);
            display: inline-block; border-radius: 20px;
        }
        .anime-count-wrapper {
            text-align: center; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 30px; margin-top: 40px;
        }
        .anime-count .count-number { color: var(--text-bright); font-weight: bold; }

        .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 7px 14px; border-radius: 5px; font-size: 0.85em; font-weight: bold; }
        .auth-status { font-size: 0.9em; color: #ccc; margin-right: 12px; }

        @media (max-width: 1000px) {
            .burger { display: block; }
            .close-menu { display: block; }
            .search-wrapper { max-width: none; }
            .nav-center {
                position: fixed; top: 0; left: -100%; width: 280px; height: 100vh;
                background: #0f0f0f; flex-direction: column; padding: 30px 20px;
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1100; align-items: stretch;
            }
            .nav-center.active { left: 0; }
            .nav-center * { margin: 8px 0; font-size: 1em !important; padding: 12px !important; }
            .mobile-overlay.active { display: block; }
            .hero-section { height: 50vh; }
            .main-title { font-size: 2em; }
            .section-title { font-size: 1.1em; padding: 6px 12px; }
            .carousel-wrapper { padding: 0 28px; }
            .carousel-btn { width: 24px; height: 48px; font-size: 14px; }
            .card { width: 150px; }
            .card-info { padding: 5px; }
            .card-title { font-size: 0.85em; height: 2.4em; }
            .card-meta-row { font-size: 0.65em; gap: 2px; }
            .carousel-track { gap: 10px; }
            .nav-center a { border-radius: 8px; }
        }

        @media (max-width: 480px) {
            .card { width: 140px; }
            .carousel-wrapper { padding: 0 24px; }
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M65SBS3C"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div class="top-navbar">

    <div class="content-area">
        <div class="section-title-wrapper"><h2 class="section-title">🎲 Sélection aléatoire</h2></div>
        <div class="carousel-wrapper" id="carousel-random-wrapper">
            <button class="carousel-btn prev" id="carousel-random-prev">◀</button>

                <div class="carousel-track" id="carousel-random-track"></div>

    <div class="anime-count-wrapper">
        <div class="anime-count" id="anime-count"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        let allAnimes = [];
        let allTags = [];

        // MAL Cache
        const MAL_TTL = 60 * 60 * 1000;
        function malCacheGet(nom) {
            try {
                const raw = sessionStorage.getItem('mal_cache_' + nom);
                if (!raw) return null;
                const obj = JSON.parse(raw);
                if (Date.now() - obj.ts > MAL_TTL) { sessionStorage.removeItem('mal_cache_' + nom); return null; }
                return obj;
            } catch { return null; }
        }
        function malCacheSet(nom, data) {
            try { sessionStorage.setItem('mal_cache_' + nom, JSON.stringify({ ...data, ts: Date.now() })); } catch {}
        }

        let jikanQueue = [];
        let jikanRunning = false;
        function jikanEnqueue(task) {
            jikanQueue.push(task);
            if (!jikanRunning) jikanDrain();
        }
        async function jikanDrain() {
            jikanRunning = true;
            while (jikanQueue.length > 0) {
                const task = jikanQueue.shift();
                await task();
                await new Promise(r => setTimeout(r, 400));
            }
            jikanRunning = false;
        }
        function fetchMALForCard(nom, malId, scoreEl, popEl) {
            const cached = malCacheGet(nom);
            if (cached) { applyCardMAL(scoreEl, popEl, cached); return; }
            jikanEnqueue(async () => {
                try {
                    let item = null;
                    if (malId && malId.trim() !== '') {
                        const resp = await fetch('https://api.jikan.moe/v4/anime/' + malId.trim());
                        if (resp.ok) { const j = await resp.json(); item = j.data || null; }
                    } else {
                        const q = nom.split('/')[0].trim();
                        const resp = await fetch('https://api.jikan.moe/v4/anime?q=' + encodeURIComponent(q) + '&limit=1&sfw=false');
                        if (resp.ok) { const j = await resp.json(); item = j.data?.[0] || null; }
                    }
                    if (item) {
                        const data = { score: item.score, popularity: item.popularity };
                        malCacheSet(nom, data);
                        applyCardMAL(scoreEl, popEl, data);
                    }
                } catch(e) {}
            });
        }
        function applyCardMAL(scoreEl, popEl, data) {
            if (!scoreEl || !popEl) return;
            if (data.score != null) {
                scoreEl.textContent = '⭐' + parseFloat(data.score).toFixed(2);
                scoreEl.classList.add('mal-updated');
            }
            if (data.popularity != null) {
                popEl.textContent = '📈#' + data.popularity.toLocaleString('fr-FR');
                popEl.classList.add('mal-updated');
            }
        }

        const cardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const nom = card.dataset.nom;
                    const malId = card.dataset.malid || '';
                    const scoreEl = card.querySelector('.mal-score');
                    const popEl = card.querySelector('.mal-pop');
                    if (nom && scoreEl && popEl) {
                        fetchMALForCard(nom, malId, scoreEl, popEl);
                    }
                    cardObserver.unobserve(card);
                }
            });
        }, { rootMargin: '200px' });

        // Firebase Auth
        onAuthStateChanged(auth, async (user) => {
            const authUi = document.getElementById('auth-ui');
            if (user) {
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid, email: user.email, displayName: user.displayName || '',
                    photoURL: user.photoURL || '', lastSeen: new Date().toISOString(),
                }, { merge: true });
                const cachedPseudo = sessionStorage.getItem('userPseudo');
                let displayName = cachedPseudo || user.displayName;
                if (!cachedPseudo) {
                    const uSnap = await getDoc(doc(db, "users", user.uid));
                    if (uSnap.exists() && uSnap.data().pseudo) {
                        displayName = uSnap.data().pseudo;
                        sessionStorage.setItem('userPseudo', displayName);
                    }
                    if (uSnap.exists() && uSnap.data().photoURL) {
                        sessionStorage.setItem('userAvatar', uSnap.data().photoURL);
                    }
                }
                const avatarUrl = sessionStorage.getItem('userAvatar') || user.photoURL || 'img/logo.jpg';
                authUi.innerHTML = '<a href="profil.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:8px;"><img src="'+avatarUrl+'" style="width:30px;height:30px;border-radius:50%;border:2px solid var(--primary);object-fit:cover;" onerror="this.src=\'img/logo.jpg\'"><span class="auth-status" style="color:white;">'+displayName+'</span></a><button id="logout-btn" class="discord-btn" style="background:#333;border:none;cursor:pointer;">Quitter</button>';
                document.getElementById('logout-btn').onclick = () => signOut(auth);
            } else {
                authUi.innerHTML = '<button id="login-btn" class="btn-red" style="padding:7px 15px;">Connexion</button>';
                document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        window.saveState = () => {
            sessionStorage.setItem('indexSearch', document.getElementById('search').value);
            sessionStorage.setItem('indexScroll', window.scrollY);
        };

        window.resetToHome = () => {
            document.getElementById('search').value = '';
            document.getElementById('search').placeholder = 'Rechercher un anime...';
            sessionStorage.removeItem('indexSearch');
            sessionStorage.removeItem('indexScroll');
            history.replaceState(null, '', window.location.pathname);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.handleImgError = function(img, fileNameFromCSV) {
            if (!img.dataset.attempt) img.dataset.attempt = "1";
            const lastDotIndex = fileNameFromCSV.lastIndexOf('.');
            const base = lastDotIndex !== -1 ? fileNameFromCSV.substring(0, lastDotIndex) : fileNameFromCSV;
            if (img.dataset.attempt === "1") { img.dataset.attempt = "2"; img.src = 'img/'+base+'.webp'; } 
            else if (img.dataset.attempt === "2") { img.dataset.attempt = "3"; img.src = 'img/'+base+'.png'; } 
            else if (img.dataset.attempt === "3") { img.dataset.attempt = "4"; img.src = 'img/'+base+'.jpg'; } 
            else { img.onerror = null; img.src = 'img/logo.jpg'; }
        };

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function createCardHTML(a) {
            return '<a href="video.html?name='+encodeURIComponent(a.nom)+'" class="card" data-nom="'+a.nom.replace(/"/g,'&quot;')+'" data-malid="'+(a.malId||'')+'" onclick="saveState()"><div class="img-container"><img src="img/'+a.img+'" loading="lazy" onerror="handleImgError(this, \''+a.img+'\')"></div><div class="card-info"><div class="card-title">'+a.nom+'</div><div class="card-meta-row"><span>📅'+a.sortie+'</span><span class="mal-score">⭐'+a.score+'</span><span class="mal-pop">📈'+a.pop+'</span></div><div class="card-meta-row"><span>🎞️'+a.ep+'</span><span>🔞'+a.censure+'</span><span>🛠️'+a.etat+'</span></div>'+(a.editeur?'<div class="card-meta-row"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;">🏢'+a.editeur+'</span></div>':'')+'</div></a>';
        }

        function buildCarousel(trackId, prevBtnId, nextBtnId, animeList) {
            const track = document.getElementById(trackId);
            const prevBtn = document.getElementById(prevBtnId);
            const nextBtn = document.getElementById(nextBtnId);
            
            prevBtn.style.display = 'flex';
            nextBtn.style.display = 'flex';
            
            if (animeList.length === 0) {
                track.innerHTML = '<p style="color:#ff6b7a;padding:20px;background:rgba(0,0,0,0.5);border-radius:12px;display:inline-block;font-size:0.9em;">Aucun anime pour le moment.</p>';
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
                return;
            }

            track.innerHTML = animeList.map(a => createCardHTML(a)).join('');
            track.querySelectorAll('.card[data-nom]').forEach(c => cardObserver.observe(c));

            let currentIndex = 0;

            function getCardsPerView() {
                const w = window.innerWidth;
                if (w <= 480) return 2;
                if (w <= 1000) return 3;
                return 5;
            }

            function getCardWidth() {
                const card = track.querySelector('.card');
                if (!card) return 180;
                return card.offsetWidth + 15;
            }

            function getMaxIndex() {
                return Math.max(0, track.children.length - getCardsPerView());
            }

            function updateButtons() {
                const maxIdx = getMaxIndex();
                prevBtn.disabled = currentIndex <= 0;
                nextBtn.disabled = currentIndex >= maxIdx;
            }

            function scrollToIndex() {
                track.style.transform = 'translateX(-' + (currentIndex * getCardWidth()) + 'px)';
                updateButtons();
            }

            prevBtn.onclick = () => {
                currentIndex = Math.max(0, currentIndex - getCardsPerView());
                scrollToIndex();
            };

            nextBtn.onclick = () => {
                currentIndex = Math.min(getMaxIndex(), currentIndex + getCardsPerView());
                scrollToIndex();
            };

            let touchStartX = 0;
            track.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
            track.addEventListener('touchend', (e) => {
                const diff = touchStartX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) nextBtn.click();
                    else prevBtn.click();
                }
            });

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    currentIndex = Math.min(currentIndex, getMaxIndex());
                    scrollToIndex();
                }, 150);
            });

            updateButtons();
        }

        // Recherche tolérante
        function normalize(str) {
            return str
                .toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // enlever accents
                .replace(/[-_.:;,!?()'"&~#|]/g, ' ') // ponctuation → espace
                .replace(/\s+/g, ' ') // espaces multiples → un
                .trim();
        }

        function searchAnimes(query) {
            const q = normalize(query);
            if (q.length < 1) return [];
            return allAnimes.filter(a => normalize(a.nom).includes(q));
        }

        // Suggestions
        const searchInput = document.getElementById('search');
        const searchSuggestions = document.getElementById('search-suggestions');

        searchInput.addEventListener('input', function() {
            const val = this.value.trim();
            if (val.length < 1) {
                searchSuggestions.classList.remove('active');
                return;
            }
            const results = searchAnimes(val).slice(0, 8);
            if (results.length === 0) {
                searchSuggestions.innerHTML = '<div class="no-result">Aucun résultat</div>';
            } else {
                searchSuggestions.innerHTML = results.map(a => 
                    '<div class="suggestion-item" data-name="'+a.nom.replace(/"/g,'&quot;')+'"><img src="img/'+a.img+'" class="sugg-img" onerror="this.src=\'img/logo.jpg\'"><span>'+a.nom+'</span></div>'
                ).join('');
            }
            searchSuggestions.classList.add('active');
        });

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const val = this.value.trim();
                if (!val) return;
                const results = searchAnimes(val);
                if (results.length === 1) {
                    window.location.href = 'video.html?name='+encodeURIComponent(results[0].nom);
                } else if (results.length > 1) {
                    window.location.href = 'catalogue.html?search='+encodeURIComponent(val);
                } else {
                    window.location.href = 'catalogue.html?search='+encodeURIComponent(val);
                }
                searchSuggestions.classList.remove('active');
                this.blur();
            }
        });

        searchSuggestions.addEventListener('click', function(e) {
            const item = e.target.closest('.suggestion-item');
            if (item) {
                const name = item.dataset.name;
                window.location.href = 'video.html?name='+encodeURIComponent(name);
            }
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                searchSuggestions.classList.remove('active');
            }
        });

        // INIT
        async function init() {
            const isMobile = window.innerWidth <= 1000;
            let fileName = isMobile ? 'mobile' + Math.floor(Math.random() * 13 + 1) + '.webp' : 'fond' + Math.floor(Math.random() * 64 + 1) + '.webp';
            document.body.style.backgroundImage = "url('img/" + fileName + "')";

            try {
                const resp = await fetch('animes.csv');
                const raw = await resp.text();
                const lines = raw.split(/\r?\n/);
                const headers = lines[0].split(';').map(h => h.trim().toLowerCase());
                const ordreAjoutIndex = headers.indexOf('ordre_ajout');
                
                console.log('Headers ('+headers.length+'):', headers);
                console.log('ordre_ajout index:', ordreAjoutIndex);

                allAnimes = lines.slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0] || c.length < 9) return null;
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : '';
                    let ordreAjout = 0;
                    if (ordreAjoutIndex >= 0 && ordreAjoutIndex < c.length) {
                        ordreAjout = parseInt(clean(c[ordreAjoutIndex])) || 0;
                    }
                    return { 
                        nom: clean(c[0]), pop: clean(c[1]), score: clean(c[2]), 
                        sortie: clean(c[3]), ep: clean(c[4]), censure: clean(c[5]), 
                        etat: clean(c[6]), img: clean(c[8]),
                        tags: clean(c[12]), malId: clean(c[13]), editeur: clean(c[14]),
                        ordreAjout: ordreAjout
                    };
                }).filter(a => a !== null);

                console.log('Animes charges: ' + allAnimes.length);
                const avecOrdre = allAnimes.filter(a => a.ordreAjout > 0);
                console.log('Avec ordre_ajout: ' + avecOrdre.length);

                // Tags
                try {
                    const tr = await fetch('tags_description.csv');
                    const trRaw = await tr.text();
                    allTags = trRaw.split(/\r?\n/).slice(1).map(line => {
                        const c = line.split(';');
                        if (!c[0]) return null;
                        return { nom: c[0].trim(), description: (c[1]||'').trim() };
                    }).filter(t => t !== null);
                    console.log('Tags charges: ' + allTags.length);
                } catch(e) { 
                    console.warn('tags_description.csv non trouve');
                    allTags = []; 
                }

                // SECTIONS
                buildCarousel('carousel-random-track', 'carousel-random-prev', 'carousel-random-next', shuffle(allAnimes).slice(0, 20));

                const recents = [...avecOrdre].sort((a,b) => b.ordreAjout - a.ordreAjout).slice(0, 20);
                buildCarousel('carousel-recent-track', 'carousel-recent-prev', 'carousel-recent-next', recents);

                if (allTags.length > 0) {
                    const rTag = allTags[Math.floor(Math.random() * allTags.length)];
                    document.getElementById('tag-name').textContent = rTag.nom;
                    document.getElementById('tag-description').textContent = rTag.description;
                    
                    const tagAnimes = allAnimes.filter(a => a.tags && a.tags.toLowerCase().includes(rTag.nom.toLowerCase()));
                    console.log('Tag "' + rTag.nom + '" : ' + tagAnimes.length + ' animes');
                    
                    if (tagAnimes.length > 0) {
                        buildCarousel('carousel-tag-track', 'carousel-tag-prev', 'carousel-tag-next', shuffle(tagAnimes).slice(0, 20));
                    } else {
                        document.getElementById('carousel-tag-track').innerHTML = '<p style="color:#ff6b7a;padding:20px;background:rgba(0,0,0,0.5);border-radius:12px;display:inline-block;font-size:0.9em;">Aucun anime avec ce tag.</p>';
                        document.getElementById('carousel-tag-prev').style.display = 'none';
                        document.getElementById('carousel-tag-next').style.display = 'none';
                    }
                } else {
                    document.getElementById('tag-name').textContent = 'Tags non disponibles';
                    document.getElementById('tag-description').textContent = 'Fichier tags_description.csv introuvable';
                    document.getElementById('carousel-tag-track').innerHTML = '<p style="color:#ff6b7a;padding:20px;background:rgba(0,0,0,0.5);border-radius:12px;display:inline-block;font-size:0.9em;">Fichier tags_description.csv introuvable.</p>';
                    document.getElementById('carousel-tag-prev').style.display = 'none';
                    document.getElementById('carousel-tag-next').style.display = 'none';
                }

                document.getElementById('anime-count').innerHTML = '📊 <span class="count-number">' + allAnimes.length + '</span> animes dans le catalogue';

                // Restaurer recherche
                const savedSearch = sessionStorage.getItem('indexSearch');
                const savedScroll = sessionStorage.getItem('indexScroll');
                if (savedSearch !== null) document.getElementById('search').value = savedSearch;
                if (savedScroll && parseInt(savedScroll) > 0) {
                    requestAnimationFrame(() => requestAnimationFrame(() => {
                        window.scrollTo({ top: parseInt(savedScroll), behavior: 'instant' });
                    }));
                }

            } catch(e) { console.error('Erreur:', e); }
        }

        window.toggleM = () => {
            document.getElementById('menu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        };

        window.randomAnime = () => {
            if(allAnimes.length > 0) {
                const a = allAnimes[Math.floor(Math.random()*allAnimes.length)];
                window.location.href = 'video.html?name='+encodeURIComponent(a.nom);
            }
        };

        init();
    </script>
</body>
</html>
