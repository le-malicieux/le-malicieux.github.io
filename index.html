    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="mobile.css">
    <title>Le Malicieux - Catalogue d'Animes</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --text-bright: #ffffff; --text-secondary: #ccc; --nav-bg: rgba(15, 15, 15, 0.85); }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text); 
            margin: 0; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; cursor: pointer; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        
        #back-home { font-size: 0.7em; color: #ff6b7a; text-decoration: none; display: none; cursor: pointer; margin-left: 5px; }
        
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 5px; user-select: none; order: -1; }

        .search-wrapper {
            position: relative; flex: 1; min-width: 180px; max-width: 300px;
        }
        .search-wrapper input {
            width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; 
            padding: 6px 30px 6px 10px; border-radius: 5px; font-size: 0.85em;
            box-sizing: border-box; outline: none;
        }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: #888; font-size: 0.9em; pointer-events: none;
        }
        .search-suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #1a1a1a; border: 1px solid #333; border-radius: 0 0 5px 5px;
            max-height: 300px; overflow-y: auto; display: none; z-index: 2000;
        }
        .search-suggestions.active { display: block; }
        .search-suggestions .suggestion-item {
            padding: 8px 12px; cursor: pointer; color: #ccc; font-size: 0.85em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 10px;
        }
        .search-suggestions .suggestion-item:hover { background: #2a2a2a; color: white; }
        .search-suggestions .suggestion-item .sugg-img {
            width: 28px; height: 40px; border-radius: 4px; object-fit: cover;
            flex-shrink: 0;
        }

        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links button { 
            background: var(--primary); border: none; color: white; 
            padding: 5px 10px; border-radius: 4px; font-size: 0.8em; 
            text-decoration: none; cursor: pointer; white-space: nowrap;
            font-weight: bold;
        }
        .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; white-space: nowrap; }

        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }
        
        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .search-wrapper { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links {
                position: fixed; top: 0; left: -100%; width: 280px; height: 100vh;
                background: #0f0f0f; flex-direction: column; padding: 30px 20px;
                transition: 0.4s cubic-bezier(0.4,0,0.2,1); z-index: 1100; align-items: stretch;
                overflow-y: auto;
            }
            .nav-links.active { left: 0; }
            .nav-links a, .nav-links button { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .discord-btn { margin-top: 10px; }
        }

        .hero-section {
            height: 55vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .main-logo { width: 120px; height: 120px; border-radius: 20px; border: 3px solid var(--primary); margin-bottom: 15px; box-shadow: 0 0 15px rgba(255,71,87,0.3); object-fit: cover; }
        .main-title { font-size: 2.8em; margin: 0; color: white; text-shadow: 2px 2px 12px rgba(0,0,0,0.9); font-weight: 800; }
        .main-slogan { font-size: 1.3em; font-weight: bold; margin-top: 10px; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }

        .content-area { padding: 20px 15px 40px; }
        
        .section-title {
            max-width: 1400px; margin: 30px auto 15px; padding: 10px 15px;
            font-size: 1.5em; font-weight: bold; 
            color: var(--primary);
            background: rgba(0, 0, 0, 0.75);
            border-radius: 6px;
            display: inline-block;
        }
        .section-title-wrapper { max-width: 1400px; margin: 30px auto 15px; padding: 0 15px; }

        .carousel-wrapper {
            position: relative; max-width: 1400px; margin: 0 auto; padding: 0 35px;
            overflow: hidden;
        }
        .carousel-container { overflow-x: auto; scrollbar-width: thin; -webkit-overflow-scrolling: touch; }
        .carousel-track {
            display: flex; gap: 15px; transition: transform 0.4s ease;
        }
        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); color: white;
            font-size: 18px; width: 30px; height: 60px; cursor: pointer; z-index: 10; border-radius: 4px;
        }
        .carousel-btn:hover { background: var(--primary); border-color: var(--primary); }
        .carousel-btn.prev { left: 0; }
        .carousel-btn.next { right: 0; }
        .carousel-btn:disabled { opacity: 0.25; cursor: default; }

        .card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; 
            border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.8em;
            display: flex; flex-direction: column; flex-shrink: 0;
            width: 180px;
        }
        .card:hover { transform: translateY(-6px); border-color: var(--primary); }
        .card .img-container { width: 100%; aspect-ratio: 2/3; background: #111; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 7px 8px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; height: 2.4em; overflow: hidden; font-size: 1.05em; line-height: 1.2; }
        .card-title .highlight { background: var(--primary); color: white; padding: 0 2px; border-radius: 3px; }
        .card-meta-row { display: flex; flex-wrap: wrap; gap: 4px; font-size: 0.72em; color: #ddd; margin-top: 2px; }

        #search-results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; max-width: 1400px; margin: 0 auto; padding: 0 15px;
        }
        #search-results-count { color: #aaa; margin: 5px 15px; font-size: 0.9em; }
        .anime-count { text-align: center; padding: 12px 20px; color: var(--primary); font-size: 1em; font-weight: bold; background: rgba(0, 0, 0, 0.75); display: inline-block; border-radius: 6px; }
        .anime-count-wrapper { text-align: center; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 30px; margin-top: 40px; }
        
        @media (max-width: 1000px) {
            .card { width: 150px; }
            .hero-section { height: 45vh; }
            .main-title { font-size: 2em; }
            .section-title { font-size: 1.2em; }
            .carousel-wrapper { padding: 0 28px; }
            .carousel-btn { width: 24px; height: 48px; font-size: 14px; }
            .carousel-track { gap: 10px; }
            #search-results-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }
        @media (max-width: 480px) {
            .card { width: 140px; }
            #search-results-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        let allAnimes = [];
        let allTags = [];
        let currentSearchQuery = '';

        const MAL_TTL = 60 * 60 * 1000;
        function malCacheGet(nom) { try { const raw = sessionStorage.getItem('mal_cache_' + nom); if (!raw) return null; const obj = JSON.parse(raw); if (Date.now() - obj.ts > MAL_TTL) { sessionStorage.removeItem('mal_cache_' + nom); return null; } return obj; } catch { return null; } }
        function malCacheSet(nom, data) { try { sessionStorage.setItem('mal_cache_' + nom, JSON.stringify({ ...data, ts: Date.now() })); } catch {} }

        let jikanQueue = [], jikanRunning = false;
        function jikanEnqueue(task) { jikanQueue.push(task); if (!jikanRunning) jikanDrain(); }
        async function jikanDrain() { jikanRunning = true; while (jikanQueue.length > 0) { const task = jikanQueue.shift(); await task(); await new Promise(r => setTimeout(r, 400)); } jikanRunning = false; }
        
        function fetchMALForCard(nom, malId, scoreEl, popEl) {
            const cached = malCacheGet(nom);
            if (cached) { applyCardMAL(scoreEl, popEl, cached); return; }
            jikanEnqueue(async () => {
                try {
                    let item = null;
                    if (malId && malId.trim() !== '') {
                        const resp = await fetch(`https://api.jikan.moe/v4/anime/${malId.trim()}`);
                        if (resp.ok) { const j = await resp.json(); item = j.data || null; }
                    } else {
                        const q = nom.split('/')[0].trim();
                        const resp = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=1&sfw=false`);
                        if (resp.ok) { const j = await resp.json(); item = j.data?.[0] || null; }
                    }
                    if (item) { const data = { score: item.score, popularity: item.popularity }; malCacheSet(nom, data); applyCardMAL(scoreEl, popEl, data); }
                } catch(e) {}
            });
        }
        function applyCardMAL(scoreEl, popEl, data) {
            if (!scoreEl || !popEl) return;
            if (data.score != null) { scoreEl.textContent = '⭐' + parseFloat(data.score).toFixed(2); scoreEl.classList.add('mal-updated'); }
            if (data.popularity != null) { popEl.textContent = '📈#' + data.popularity.toLocaleString('fr-FR'); popEl.classList.add('mal-updated'); }
        }

        const cardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const nom = card.dataset.nom;
                    const malId = card.dataset.malid || '';
                    const scoreEl = card.querySelector('.mal-score');
                    const popEl = card.querySelector('.mal-pop');
                    if (nom && scoreEl && popEl) { fetchMALForCard(nom, malId, scoreEl, popEl); }
                    cardObserver.unobserve(card);
                }
            });
        }, { rootMargin: '200px' });

        onAuthStateChanged(auth, async (user) => {
            const authUi = document.getElementById('auth-ui');
            if (user) {
                await setDoc(doc(db, "users", user.uid), { uid: user.uid, email: user.email, displayName: user.displayName || '', photoURL: user.photoURL || '', lastSeen: new Date().toISOString() }, { merge: true });
                const cachedPseudo = sessionStorage.getItem('userPseudo');
                let displayName = cachedPseudo || user.displayName;
                if (!cachedPseudo) {
                    const uSnap = await getDoc(doc(db, "users", user.uid));
                    if (uSnap.exists() && uSnap.data().pseudo) { displayName = uSnap.data().pseudo; sessionStorage.setItem('userPseudo', displayName); }
                    if (uSnap.exists() && uSnap.data().photoURL) { sessionStorage.setItem('userAvatar', uSnap.data().photoURL); }
                }
                const avatarUrl = sessionStorage.getItem('userAvatar') || user.photoURL || 'img/logo.jpg';
                authUi.innerHTML = `<a href="profil.html" style="display:flex;align-items:center;gap:6px;text-decoration:none;"><img src="${avatarUrl}" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--primary);object-fit:cover;" onerror="this.src='img/logo.jpg'"><span style="color:white;font-size:0.8em;">${displayName}</span></a><button id="logout-btn" class="discord-btn" style="background:#333; border:none; cursor:pointer; padding:5px 8px;">Quitter</button>`;
                document.getElementById('logout-btn').onclick = () => signOut(auth);
            } else {
                authUi.innerHTML = `<button id="login-btn" class="discord-btn" style="background:#5865F2; border:none; padding:5px 10px;">Connexion</button>`;
                document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        function normalize(str) {
            return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[-_.:;,!?()'"&~#|]/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function highlightTitle(title, query) {
            if (!query) return title;
            const normTitle = normalize(title);
            const normQuery = normalize(query);
            const index = normTitle.indexOf(normQuery);
            if (index === -1) return title;
            let charCount = 0, origIndex = -1;
            for (let i = 0; i < title.length; i++) {
                if (normalize(title[i]).length > 0) charCount++;
                if (charCount > index && origIndex === -1) origIndex = i;
            }
            if (origIndex === -1) return title;
            const endIndex = origIndex + query.length;
            return title.substring(0, origIndex) + '<span class="highlight">' + title.substring(origIndex, Math.min(endIndex, title.length)) + '</span>' + title.substring(Math.min(endIndex, title.length));
        }

        function createCardHTML(a, highlight = false, query = '') {
            const titleHtml = highlight ? highlightTitle(a.nom, query) : a.nom;
            return `<a href="video.html?name=${encodeURIComponent(a.nom)}" class="card" data-nom="${a.nom.replace(/"/g,'&quot;')}" data-malid="${a.malId||''}">
                <div class="img-container"><img src="img/${a.img}" loading="lazy" onerror="handleImgError(this, '${a.img}')"></div>
                <div class="card-info">
                    <div class="card-title">${titleHtml}</div>
                    <div class="card-meta-row"><span>📅${a.sortie}</span><span class="mal-score">⭐${a.score}</span><span class="mal-pop">📈${a.pop}</span></div>
                    <div class="card-meta-row"><span>🎞️${a.ep}</span><span>🔞${a.censure}</span><span>🛠️${a.etat}</span></div>
                    ${a.editeur ? `<div class="card-meta-row"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">🏢${a.editeur}</span></div>` : ''}
                </div>
            </a>`;
        }

        function buildCarousel(trackId, prevBtnId, nextBtnId, animeList) {
            const track = document.getElementById(trackId);
            const prevBtn = document.getElementById(prevBtnId);
            const nextBtn = document.getElementById(nextBtnId);
            if (!track) return;
            if (animeList.length === 0) { track.innerHTML = '<p style="color:#ff6b7a;padding:20px;">Aucun anime.</p>'; prevBtn.style.display = 'none'; nextBtn.style.display = 'none'; return; }
            track.innerHTML = animeList.map(a => createCardHTML(a)).join('');
            track.querySelectorAll('.card[data-nom]').forEach(c => cardObserver.observe(c));
            let currentIndex = 0;
            function getCardsPerView() { const w = window.innerWidth; if (w <= 480) return 2; if (w <= 1000) return 3; return 5; }
            function getCardWidth() { const card = track.querySelector('.card'); return card ? card.offsetWidth + 15 : 180; }
            function getMaxIndex() { return Math.max(0, track.children.length - getCardsPerView()); }
            function updateButtons() { const maxIdx = getMaxIndex(); prevBtn.disabled = currentIndex <= 0; nextBtn.disabled = currentIndex >= maxIdx; }
            function scrollToIndex() { track.style.transform = 'translateX(-' + (currentIndex * getCardWidth()) + 'px)'; updateButtons(); }
            prevBtn.onclick = () => { currentIndex = Math.max(0, currentIndex - getCardsPerView()); scrollToIndex(); };
            nextBtn.onclick = () => { currentIndex = Math.min(getMaxIndex(), currentIndex + getCardsPerView()); scrollToIndex(); };
            let resizeTimeout; window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { currentIndex = Math.min(currentIndex, getMaxIndex()); scrollToIndex(); }, 150); });
            updateButtons();
        }

        function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

        function showSearchResults(query) {
            currentSearchQuery = query;
            const results = allAnimes.filter(a => normalize(a.nom).includes(normalize(query)));
            const mainContent = document.getElementById('main-content');
            const resultsSection = document.getElementById('search-results-section');
            const resultsGrid = document.getElementById('search-results-grid');
            const resultsTitle = document.getElementById('search-results-title');
            const resultsCount = document.getElementById('search-results-count');
            const backHome = document.getElementById('back-home');

            mainContent.style.display = 'none';
            resultsSection.style.display = 'block';
            resultsTitle.textContent = '🔍 ' + query;
            resultsCount.textContent = results.length + ' anime' + (results.length > 1 ? 's' : '') + ' trouvé' + (results.length > 1 ? 's' : '');
            
            if (results.length === 0) {
                resultsGrid.innerHTML = '<p style="color:#ff6b7a;text-align:center;padding:40px;">Aucun anime trouvé pour "' + query + '"</p>';
            } else if (results.length === 1) {
                window.location.href = 'video.html?name=' + encodeURIComponent(results[0].nom);
                return;
            } else {
                resultsGrid.innerHTML = results.map(a => createCardHTML(a, true, query)).join('');
                resultsGrid.querySelectorAll('.card[data-nom]').forEach(c => cardObserver.observe(c));
            }
            backHome.style.display = 'block';
            window.scrollTo({ top: resultsSection.offsetTop - 80, behavior: 'smooth' });
            history.pushState({}, '', `?search=${encodeURIComponent(query)}`);
        }

        function resetToHome() {
            document.getElementById('search').value = '';
            currentSearchQuery = '';
            sessionStorage.removeItem('indexSearch');
            document.getElementById('search-results-section').style.display = 'none';
            document.getElementById('main-content').style.display = '';
            document.getElementById('back-home').style.display = 'none';
            history.replaceState(null, '', window.location.pathname);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        window.resetToHome = resetToHome;

        window.handleImgError = function(img, fileNameFromCSV) {
            if (!img.dataset.attempt) img.dataset.attempt = "1";
            const lastDotIndex = fileNameFromCSV.lastIndexOf('.');
            const base = lastDotIndex !== -1 ? fileNameFromCSV.substring(0, lastDotIndex) : fileNameFromCSV;
            if (img.dataset.attempt === "1") { img.dataset.attempt = "2"; img.src = `img/${base}.webp`; } 
            else if (img.dataset.attempt === "2") { img.dataset.attempt = "3"; img.src = `img/${base}.png`; } 
            else if (img.dataset.attempt === "3") { img.dataset.attempt = "4"; img.src = `img/${base}.jpg`; } 
            else { img.onerror = null; img.src = 'img/logo.jpg'; }
        };

        async function init() {
            const isMobile = window.innerWidth <= 1000;
            let fileName = isMobile ? `mobile${Math.floor(Math.random() * 13) + 1}.webp` : `fond${Math.floor(Math.random() * 64) + 1}.webp`;
            document.body.style.backgroundImage = `url('img/${fileName}')`;
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundPosition = 'center';
            document.body.style.backgroundAttachment = 'fixed';

            try {
                const resp = await fetch('animes.csv');
                const raw = await resp.text();
                const lines = raw.split(/\r?\n/);
                const headers = lines[0].split(';').map(h => h.trim().toLowerCase());
                const ordreAjoutIndex = headers.indexOf('ordre_ajout');
                allAnimes = lines.slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0] || c.length < 9) return null;
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                    let ordreAjout = 0;
                    if (ordreAjoutIndex >= 0 && ordreAjoutIndex < c.length) ordreAjout = parseInt(clean(c[ordreAjoutIndex])) || 0;
                    return { 
                        nom: clean(c[0]), pop: clean(c[1]), score: clean(c[2]), 
                        sortie: clean(c[3]), ep: clean(c[4]), censure: clean(c[5]), 
                        etat: clean(c[6]), img: clean(c[8]), tags: clean(c[12]), 
                        malId: clean(c[13]), editeur: clean(c[14]), ordreAjout
                    };
                }).filter(a => a !== null);

                try {
                    const tr = await fetch('tags_description.csv');
                    const trRaw = await tr.text();
                    allTags = trRaw.split(/\r?\n/).slice(1).map(line => {
                        const c = line.split(';');
                        if (!c[0]) return null;
                        return { nom: c[0].trim(), description: (c[1]||'').trim() };
                    }).filter(t => t !== null);
                } catch(e) { allTags = []; }

                buildCarousel('carousel-random-track', 'carousel-random-prev', 'carousel-random-next', shuffle(allAnimes).slice(0, 20));
                const recents = [...allAnimes].filter(a => a.ordreAjout > 0).sort((a,b) => b.ordreAjout - a.ordreAjout).slice(0, 20);
                buildCarousel('carousel-recent-track', 'carousel-recent-prev', 'carousel-recent-next', recents);

                if (allTags.length > 0) {
                    const rTag = allTags[Math.floor(Math.random() * allTags.length)];
                    document.getElementById('tag-name').textContent = rTag.nom;
                    document.getElementById('tag-description').textContent = rTag.description;
                    const tagAnimes = allAnimes.filter(a => a.tags && a.tags.toLowerCase().includes(rTag.nom.toLowerCase()));
                    buildCarousel('carousel-tag-track', 'carousel-tag-prev', 'carousel-tag-next', shuffle(tagAnimes).slice(0, 20));
                } else {
                    document.getElementById('tag-name').textContent = 'Tags non disponibles';
                    document.getElementById('carousel-tag-prev').style.display = 'none';
                    document.getElementById('carousel-tag-next').style.display = 'none';
                }
                document.getElementById('anime-count').innerHTML = '📊 <span class="count-number">' + allAnimes.length + '</span> animes dans le catalogue';

                const urlParams = new URLSearchParams(window.location.search);
                const searchParam = urlParams.get('search');
                if (searchParam) {
                    document.getElementById('search').value = searchParam;
                    showSearchResults(searchParam);
                } else {
                    const savedSearch = sessionStorage.getItem('indexSearch');
                    if (savedSearch) document.getElementById('search').value = savedSearch;
                }
            } catch(e) { console.error(e); }
        }

        const searchInput = document.getElementById('search');
        const searchSuggestions = document.getElementById('search-suggestions');
        searchInput.addEventListener('input', function() {
            const val = this.value.trim();
            if (val.length < 2) { searchSuggestions.classList.remove('active'); return; }
            const results = allAnimes.filter(a => normalize(a.nom).includes(normalize(val))).slice(0, 8);
            if (results.length === 0) { searchSuggestions.innerHTML = '<div class="no-result" style="padding:12px;color:#888;">Aucun résultat</div>'; } 
            else { searchSuggestions.innerHTML = results.map(a => '<div class="suggestion-item" data-name="'+a.nom.replace(/"/g,'&quot;')+'"><img src="img/'+a.img+'" class="sugg-img" onerror="this.src=\'img/logo.jpg\'"><span>'+a.nom+'</span></div>').join(''); }
            searchSuggestions.classList.add('active');
        });
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const val = this.value.trim();
                if (val) showSearchResults(val);
                searchSuggestions.classList.remove('active');
                this.blur();
            }
        });
        searchSuggestions.addEventListener('click', function(e) {
            const item = e.target.closest('.suggestion-item');
            if (item && item.dataset.name) window.location.href = 'video.html?name=' + encodeURIComponent(item.dataset.name);
        });
        document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrapper')) searchSuggestions.classList.remove('active'); });

        window.randomAnime = () => { if(allAnimes.length) { const a = allAnimes[Math.floor(Math.random()*allAnimes.length)]; window.location.href = 'video.html?name='+encodeURIComponent(a.nom); } };
        window.toggleM = () => { const menu = document.getElementById('menu'); const overlay = document.getElementById('overlay'); const isOpen = menu.classList.toggle('active'); overlay.classList.toggle('active'); document.body.style.overflow = isOpen ? 'hidden' : ''; };
        init();
    </script>
</body>
</html>
