<!DOCTYPE html>
<html lang="fr">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-M65SBS3C');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Malicieux - Catalogue d'Animes</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: rgba(20, 20, 20, 0.9); --text: #eee; --nav-bg: rgba(15, 15, 15, 0.85); }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text); 
            margin: 0; 
            min-height: 100vh;
        }

        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; background: var(--nav-bg); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-left { display: flex; flex-direction: column; align-items: flex-start; }
        .nav-brand { display: flex; align-items: center; gap: 12px; }
        .nav-logo-small { width: 35px; height: 35px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 1.1em; }
        
        /* Nouveau bouton Retour à l'accueil */
        #back-home { 
            font-size: 0.75em; color: #888; text-decoration: none; margin-top: 4px; 
            display: none; cursor: pointer; transition: 0.2s;
        }
        #back-home:hover { color: var(--primary); }

        .nav-center { display: flex; gap: 8px; align-items: center; }
        .nav-center input, .nav-center select, .nav-center button, .nav-center a { 
            background: #222; border: 1px solid #444; color: white; padding: 6px 10px; border-radius: 4px; font-size: 0.85em; text-decoration: none;
        }
        .btn-red { background: var(--primary) !important; border: none !important; font-weight: bold; cursor: pointer; color: white !important; }

        .hero-section {
            height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .main-logo { width: 130px; height: 130px; border-radius: 20px; border: 3px solid var(--primary); margin-bottom: 15px; box-shadow: 0 0 15px rgba(255,71,87,0.3); object-fit: cover; }
        .main-title { font-size: 3em; margin: 0; color: white; text-shadow: 2px 2px 12px rgba(0,0,0,0.9); font-weight: 800; }

        .content-area { background: linear-gradient(to top, rgba(0,0,0,1) 80%, transparent); padding: 40px 15px; min-height: 600px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        
        .card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; 
            border: 1px solid #333; text-decoration: none; color: inherit; font-size: 0.8em;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 12px; flex-grow: 1; }
        .card-title { font-weight: bold; color: var(--primary); margin-bottom: 5px; height: 2.4em; overflow: hidden; font-size: 1.05em; }
        .tag { background: rgba(255,71,87,0.2); color: var(--primary); padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }

        @media (max-width: 1000px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="top-navbar">
        <div class="nav-left">
            <div class="nav-brand">
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX</span>
            </div>
            <a id="back-home" onclick="resetToHome()">← Retour à l'accueil</a>
        </div>

        <div class="nav-center" id="menu">
            <input type="text" id="search" placeholder="Rechercher un anime...">
            <select id="sort">
                <option value="">Ordre Aléatoire</option>
                <option value="popularite">Popularité</option>
                <option value="score">Score</option>
                <option value="nom">Nom (A-Z)</option>
                <option value="sortie">Année</option>
                <option value="episodes">Épisodes</option>
            </select>
            <a href="playlist.html" class="btn-red">📂 Playlist</a>
            <button onclick="randomAnime()" class="btn-red">🎲 Random</button>
        </div>

        <div id="auth-ui" style="display:flex; align-items:center;"></div>
    </div>

    <div class="hero-section">
        <img src="img/logo.jpg" class="main-logo">
        <h1 class="main-title">le-malicieux.github.io</h1>
    </div>

    <div class="content-area">
        <div id="anime-container" class="grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let allAnimes = [];
        let shuffledAnimes = []; // Pour garder l'ordre aléatoire initial

        onAuthStateChanged(auth, (user) => {
            const authUi = document.getElementById('auth-ui');
            if (user) {
                authUi.innerHTML = `<button id="logout-btn" class="btn-red" style="background:#333 !important;">Quitter</button>`;
                document.getElementById('logout-btn').onclick = () => signOut(auth);
            } else {
                authUi.innerHTML = `<button id="login-btn" class="btn-red">Connexion</button>`;
                document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        window.saveState = () => {
            sessionStorage.setItem('indexScrollPos', window.scrollY);
            sessionStorage.setItem('indexSearch', document.getElementById('search').value);
            sessionStorage.setItem('indexSort', document.getElementById('sort').value);
        };

        // Fonction pour revenir à l'accueil
        window.resetToHome = () => {
            document.getElementById('search').value = "";
            document.getElementById('sort').value = "";
            sessionStorage.removeItem('indexSearch');
            sessionStorage.removeItem('indexSort');
            sessionStorage.removeItem('indexScrollPos');
            window.scrollTo(0, 0);
            runFilterAndSort();
        };

        async function init() {
            try {
                const response = await fetch('animes.csv');
                const rawData = await response.text();
                allAnimes = rawData.split(/\r?\n/).slice(1).map(line => {
                    const c = line.split(';');
                    if (!c[0]) return null;
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                    return { nom: clean(c[0]), pop: clean(c[1]), score: clean(c[2]), sortie: clean(c[3]), ep: clean(c[4]), censure: clean(c[5]), etat: clean(c[6]), img: clean(c[8]) };
                }).filter(a => a !== null);

                // Création d'un ordre aléatoire unique pour cette session
                shuffledAnimes = [...allAnimes];
                for (let i = shuffledAnimes.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledAnimes[i], shuffledAnimes[j]] = [shuffledAnimes[j], shuffledAnimes[i]];
                }

                const savedSearch = sessionStorage.getItem('indexSearch') || "";
                const savedSort = sessionStorage.getItem('indexSort') || "";
                document.getElementById('search').value = savedSearch;
                document.getElementById('sort').value = savedSort;

                runFilterAndSort();
            } catch (err) { console.error(err); }
        }

        function runFilterAndSort() {
            const searchVal = document.getElementById('search').value.toLowerCase();
            const sortMode = document.getElementById('sort').value;
            const backHomeBtn = document.getElementById('back-home');

            // Afficher le bouton retour si on a filtré quelque chose
            backHomeBtn.style.display = (searchVal !== "" || sortMode !== "") ? "block" : "none";

            // Si rien n'est trié/cherché, on utilise la liste mélangée
            let baseList = (searchVal === "" && sortMode === "") ? shuffledAnimes : allAnimes;
            let filtered = baseList.filter(a => a.nom.toLowerCase().includes(searchVal));

            if (sortMode) {
                filtered.sort((a, b) => {
                    let valA = a[sortMode === "popularite" ? "pop" : (sortMode === "episodes" ? "ep" : sortMode)];
                    let valB = b[sortMode === "popularite" ? "pop" : (sortMode === "episodes" ? "ep" : sortMode)];

                    const isAEmpty = !valA || valA === "N/A" || valA === "";
                    const isBEmpty = !valB || valB === "N/A" || valB === "";
                    if (isAEmpty && isBEmpty) return 0;
                    if (isAEmpty) return 1;
                    if (isBEmpty) return -1;

                    if (sortMode === "score") return parseFloat(valB) - parseFloat(valA); // Tri précis
                    if (sortMode === "episodes") return parseInt(valB) - parseInt(valA);
                    if (sortMode === "popularite") return (parseInt(valA.replace('#','')) || 999) - (parseInt(valB.replace('#','')) || 999);
                    return valA.localeCompare(valB);
                });
            }
            displayAnimes(filtered);
        }

        function displayAnimes(list) {
            const container = document.getElementById('anime-container');
            container.innerHTML = list.map(a => `
                <a href="video.html?name=${encodeURIComponent(a.nom)}" class="card" onclick="saveState()">
                    <img src="img/${a.img}" loading="lazy" onerror="this.src='img/logo.jpg'">
                    <div class="card-info">
                        <div class="card-title">${a.nom}</div>
                        <div class="card-meta">📅 ${a.sortie} • ⭐ ${a.score}</div>
                    </div>
                </a>`).join('');

            const savedPos = sessionStorage.getItem('indexScrollPos');
            if (savedPos) {
                window.scrollTo(0, parseInt(savedPos));
                sessionStorage.removeItem('indexScrollPos');
            }
        }

        document.getElementById('sort').onchange = runFilterAndSort;
        document.getElementById('search').oninput = runFilterAndSort;
        init();
    </script>
</body>
</html>
