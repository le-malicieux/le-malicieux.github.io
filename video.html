<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Visionnage - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .back-btn { display: inline-block; text-decoration: none; color: var(--primary); font-weight: bold; margin-bottom: 20px; border: 1px solid var(--primary); padding: 8px 15px; border-radius: 6px; transition: 0.3s; }
        .back-btn:hover { background: var(--primary); color: white; }
        
        .anime-header { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        .top-info { display: flex; gap: 25px; margin-bottom: 25px; align-items: flex-start; }
        .anime-poster { width: 220px; border-radius: 10px; border: 2px solid #333; flex-shrink: 0; }
        .anime-details h1 { margin: 0 0 15px 0; color: var(--primary); font-size: 2.2em; }
        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .meta-item { background: #222; padding: 10px; border-radius: 8px; font-size: 0.9em; border-left: 3px solid var(--primary); }
        
        /* Ajout uniquement du style pour la case des tags */
        .tags-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .tag-badge { background: #222; color: var(--primary); border: 1px solid #444; padding: 5px 12px; border-radius: 5px; text-decoration: none; font-size: 0.85em; }

        .video-section { margin-top: 30px; }
        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: 1px solid #333; background: #000; }
        
        .actions-bar { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-download { background: #27ae60; color: white; }
        .btn-playlist { background: #f39c12; color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        #stars span { font-size: 1.5em; cursor: pointer; color: #444; }
        #stars span.active { color: #f1c40f; }

        @media (max-width: 768px) {
            .top-info { flex-direction: column; align-items: center; text-align: center; }
            .meta-item { text-align: left; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Retour au catalogue</a>

        <div class="anime-header">
            <div class="top-info">
                <img id="anime-img" class="anime-poster" src="" alt="">
                <div class="anime-details">
                    <h1 id="anime-title">Chargement...</h1>
                    <div class="meta-grid">
                        <div class="meta-item">📅 Sortie: <span id="anime-year"></span></div>
                        <div class="meta-item">⭐ Score: <span id="anime-score"></span></div>
                        <div class="meta-item">🎞️ Épisodes: <span id="anime-ep"></span></div>
                        <div class="meta-item">🔞 Censure: <span id="anime-censure"></span></div>
                    </div>
                    <p id="anime-desc" style="line-height:1.6; color:#ccc;"></p>
                    <div id="anime-tags" class="tags-container"></div>
                </div>
            </div>

            <div class="actions-bar">
                <a id="link-download" href="#" target="_blank" class="btn btn-download">📥 Télécharger</a>
                <button id="add-playlist" class="btn btn-playlist">📂 Ajouter à la playlist</button>
            </div>
        </div>

        <div class="video-section">
            <iframe id="video-player" src="" allowfullscreen></iframe>
        </div>

        <div id="stars" style="margin-top:20px;">
            <span data-v="1">☆</span><span data-v="2">☆</span><span data-v="3">☆</span><span data-v="4">☆</span><span data-v="5">☆</span>
        </div>

        <div style="margin-top:40px;">
            <h3>Commentaires</h3>
            <textarea id="comment-input" style="width:100%; height:100px; background:#222; color:white; border:1px solid #444; padding:15px; border-radius:8px; margin-bottom:10px;" placeholder="Votre avis..."></textarea>
            <button id="btn-post" class="btn" style="background:var(--primary); color:white;">Publier</button>
            <div id="comments-display" style="margin-top:20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let animeName = new URLSearchParams(window.location.search).get('name');

        onAuthStateChanged(auth, user => { currentUser = user; });

        async function load() {
            try {
                const res = await fetch('animes.csv');
                const data = await res.text();
                const lines = data.split(/\r?\n/).slice(1);
                let anime = null;

                for (let line of lines) {
                    const c = line.split(';');
                    if (c[0] && c[0].trim().replace(/^"|"$/g, '') === animeName) {
                        const cl = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                        anime = { 
                            nom: cl(c[0]), pop: cl(c[1]), score: cl(c[2]), 
                            sortie: cl(c[3]), ep: cl(c[4]), censure: cl(c[5]), 
                            etat: cl(c[6]), desc: cl(c[7]), img: cl(c[8]), 
                            stream: cl(c[9]), download: cl(c[10]),
                            tags: cl(c[12]) // Lecture de la colonne M
                        };
                        break;
                    }
                }

                if (!anime) return;

                document.getElementById('anime-title').textContent = anime.nom;
                document.getElementById('anime-year').textContent = anime.sortie;
                document.getElementById('anime-score').textContent = anime.score;
                document.getElementById('anime-ep').textContent = anime.ep;
                document.getElementById('anime-censure').textContent = anime.censure;
                document.getElementById('anime-desc').textContent = anime.desc;
                document.getElementById('anime-img').src = "img/" + anime.img;
                document.getElementById('video-player').src = anime.stream;
                document.getElementById('link-download').href = anime.download;

                // Affichage des tags
                if (anime.tags) {
                    const tagsContainer = document.getElementById('anime-tags');
                    tagsContainer.innerHTML = anime.tags.split(',').map(t => {
                        const clean = t.trim();
                        return clean ? `<span class="tag-badge">#${clean}</span>` : '';
                    }).join('');
                }

                document.getElementById('add-playlist').onclick = async () => {
                    if(!currentUser) return alert("Connectez-vous pour ajouter à votre playlist !");
                    await setDoc(doc(db, "playlists", currentUser.uid + "_" + anime.nom), {
                        userId: currentUser.uid, anime: anime.nom, img: anime.img, status: 'watching', epSeen: 0, score: anime.score, pop: anime.pop, sortie: anime.sortie, censure: anime.censure
                    });
                    alert("Ajouté à la playlist !");
                };

                const starDoc = await getDoc(doc(db, "notes", (currentUser ? currentUser.uid : "anon") + "_" + animeName));
                if(starDoc.exists()) updateStars(starDoc.data().val);

                document.querySelectorAll('#stars span').forEach(s => {
                    s.onclick = async () => {
                        if(!currentUser) return alert("Connectez-vous pour noter !");
                        const v = parseInt(s.dataset.v);
                        await setDoc(doc(db, "notes", currentUser.uid + "_" + animeName), { anime: animeName, userId: currentUser.uid, val: v });
                        updateStars(v);
                    };
                });

                const updateStars = (v) => document.querySelectorAll('#stars span').forEach(s => s.classList.toggle('active', s.dataset.v <= v));

                onSnapshot(query(collection(db, "commentaires"), where("anime", "==", animeName)), (snap) => {
                    const cDisp = document.getElementById('comments-display');
                    let docs = [];
                    snap.forEach(d => docs.push(d.data()));
                    docs.sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
                    cDisp.innerHTML = docs.map(d => `<div style="margin-bottom:12px; border-bottom:1px solid #333; padding-bottom:8px;"><b style="color:var(--primary)">${d.userName}</b><p style="margin:4px 0; font-size:0.9em; color:#ddd;">${d.text}</p></div>`).join('');
                });

                document.getElementById('btn-post').onclick = async () => {
                    const t = document.getElementById('comment-input').value;
                    if(t.trim() && currentUser) { 
                        await addDoc(collection(db, "commentaires"), { anime: animeName, text: t, userName: currentUser.displayName, date: serverTimestamp() }); 
                        document.getElementById('comment-input').value = ""; 
                    }
                };

                if(currentUser) {
                    const pRef = doc(db, "playlists", currentUser.uid + "_" + animeName);
                    const pDoc = await getDoc(pRef);
                    if(pDoc.exists()) {
                        const btn = document.getElementById('add-playlist');
                        btn.textContent = "⚙️ Modifier ma progression";
                        btn.onclick = () => { window.location.href = "playlist.html"; };
                    }
                }

            } catch (err) { console.error(err); }
        }
        load();
    </script>
</body>
</html>
