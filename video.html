<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="mobile.css">
    <title>Visionnage - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #eee; }
        #bg-layer {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat;
        }
        /* Overlay sombre */
        body::after {
            content: ''; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: -1; pointer-events: none;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; }
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: rgba(15,15,15,0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px; border-radius: 8px; gap: 12px; flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-right: 5px; order: -1; }
        .search-wrapper { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
        .search-wrapper input { width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; padding: 6px 30px 6px 10px; border-radius: 5px; font-size: 0.8em; outline: none; }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #888; font-size: 0.9em; pointer-events: none; }
        .search-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 0 0 5px 5px; max-height: 250px; overflow-y: auto; display: none; z-index: 2000; }
        .search-suggestions.active { display: block; }
        .search-suggestions .suggestion-item { padding: 6px 10px; cursor: pointer; color: #ccc; font-size: 0.75em; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px; }
        .search-suggestions .suggestion-item:hover { background: #2a2a2a; }
        .search-suggestions .suggestion-item .sugg-img { width: 22px; height: 32px; border-radius: 3px; object-fit: cover; }
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links button { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.75em; text-decoration: none; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-size: 0.75em; font-weight: bold; white-space: nowrap; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }
        @media (max-width: 900px) {
            .top-navbar { flex-wrap: wrap; }
            .search-wrapper { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; order: 1; }
            .close-menu { display: block; }
            .nav-links { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: #0f0f0f; flex-direction: column; padding: 30px 20px; transition: 0.4s; z-index: 1100; align-items: stretch; overflow-y: auto; left: auto; right: -100%; }
            .nav-links.active { right: 0; left: auto; }
            .nav-links a, .nav-links button { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
        }
        /* ... reste du style de video.html ... */
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div class="top-navbar">
        <div class="burger" onclick="toggleM()">☰</div>
        <div class="nav-left">
            <a href="index.html" class="nav-brand">
                <img src="img/logo.jpg" class="nav-logo-small">
                <span class="nav-title">LE MALICIEUX</span>
            </a>
        </div>
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="Rechercher un anime..." autocomplete="off">
            <span class="search-icon">🔍</span>
            <div class="search-suggestions" id="search-suggestions"></div>
        </div>
        <div class="mobile-overlay" id="overlay" onclick="toggleM()"></div>
        <div class="nav-links" id="menu">
            <div class="close-menu" onclick="toggleM()">← Retour</div>
            <a href="index.html">🏠 Accueil</a>
            <a href="tags.html">🏷️ Tags</a>
            <a href="alphabetique.html">📖 A-Z</a>
            <a href="playlist.html">📂 Playlist</a>
            <a href="editeurs.html">🏢 Studios</a>
            <a href="share.html">🔗 Partager</a>
            <a href="profil.html">👤 Profil</a>
            <a href="index_old.html">🕰️ Ancien Index</a>
            <button onclick="randomAnime()">🎲 Random</button>
            <a href="https://discord.gg/4DY3Zq4vW4" target="_blank" class="discord-btn">Discord</a>
        </div>
    </div>

    <div class="container">
        <a href="index.html" id="back-link" class="back-btn" onclick="handleBack(event)">← Retour au catalogue</a>
        <div id="anime-details">Chargement des données...</div>
        <div class="comments-section">
            <h3 style="font-size:1.1em;">Commentaires</h3>
            <textarea id="comment-input" style="width:100%; background:#222; border:1px solid #444; color:white; padding:8px; border-radius:5px; margin-bottom:10px; resize:none;" rows="2" placeholder="Ajouter un commentaire..."></textarea>
            <button id="btn-post" style="background:var(--primary); color:white; border:none; padding:8px 25px; border-radius:5px; cursor:pointer; font-weight:bold;">Publier</button>
            <div id="comments-display" style="margin-top: 20px;"></div>
        </div>
    </div>
    <div class="modal-overlay" id="confirm-modal"><div class="modal-box"><p id="modal-msg"></p><div class="modal-actions"><button class="modal-btn modal-btn-cancel" id="modal-cancel">Annuler</button><button class="modal-btn modal-btn-confirm" id="modal-confirm">Supprimer</button></div></div></div>

    <script type="module">
        // ... script original avec suppression de applyParallaxZoom ...
        function setBackground() {
            const isMobile = window.innerWidth <= 1000;
            const n = isMobile ? Math.floor(Math.random() * 13) + 1 : Math.floor(Math.random() * 64) + 1;
            document.getElementById('bg-layer').style.backgroundImage = `url('img/${isMobile ? 'mobile' + n : 'fond' + n}.webp')`;
        }
        setBackground();
        // Pas d'écouteur scroll

        window.toggleM = () => {
            const menu = document.getElementById('menu');
            const overlay = document.getElementById('overlay');
            const isOpen = menu.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = isOpen ? 'hidden' : '';
        };
    </script>
</body>
</html>
