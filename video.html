<!DOCTYPE html>
<html lang="fr">
<head>

    <link rel="icon" href="img/logo.jpg" type="image/jpeg">

    <script>
        (function(){
            const p = new URLSearchParams(window.location.search).get('name');
            if (p) document.title = p + ' - Le Malicieux';
        })();

    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #eee; }
        #bg-layer {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-size: cover; background-position: center center;
            background-repeat: no-repeat;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: -1; pointer-events: none;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-top: 60px; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: rgba(15,15,15,0.95); backdrop-filter: blur(10px);
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 12px; flex-wrap: wrap;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-logo-small { width: 32px; height: 32px; border-radius: 5px; border: 1px solid var(--primary); object-fit: cover; }
        .nav-title { color: var(--primary); font-weight: bold; font-size: 0.95em; white-space: nowrap; }
        .burger { display: none; font-size: 28px; cursor: pointer; color: white; margin-left: 5px; flex-shrink: 0; }
        .search-wrapper { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
        .search-wrapper input { width: 100%; background: #1a1a1a; border: 2px solid #333; color: white; padding: 6px 30px 6px 10px; border-radius: 5px; font-size: 0.8em; outline: none; }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #888; font-size: 0.9em; pointer-events: none; }
        .search-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 0 0 5px 5px; max-height: 250px; overflow-y: auto; display: none; z-index: 2000; }
        .search-suggestions.active { display: block; }
        .search-suggestions .suggestion-item { padding: 6px 10px; cursor: pointer; color: #ccc; font-size: 0.75em; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px; }
        .search-suggestions .suggestion-item:hover { background: #2a2a2a; }
        .search-suggestions .suggestion-item .sugg-img { width: 22px; height: 32px; border-radius: 3px; object-fit: cover; }
        .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .nav-links button { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.75em; text-decoration: none; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .nav-links .discord-btn { background: #5865F2; color: white; text-decoration: none; padding: 5px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; white-space: nowrap; border: 2px solid rgba(255,255,255,0.15); display: inline-flex; align-items: center; gap: 5px; }
        .nav-links .discord-btn::before { content: '💬'; font-size: 0.9em; }
        .nav-links .discord-btn:hover { background: #4752c4; border-color: rgba(255,255,255,0.3); }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1050; }
        .close-menu { display: none; font-size: 24px; color: var(--primary); cursor: pointer; margin-bottom: 20px; align-self: flex-start; background: none !important; }
        @media (max-width: 900px) {
            body { padding-top: 100px; }
            .top-navbar { flex-wrap: wrap; }
            .search-wrapper { order: 3; width: 100%; max-width: none; margin-top: 8px; }
            .nav-links { order: 2; }
            .burger { display: block; }
            .close-menu { display: block; }
            .nav-links { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: #0f0f0f; flex-direction: column; padding: 30px 20px; transition: 0.4s cubic-bezier(0.4,0,0.2,1); z-index: 1100; align-items: stretch; overflow-y: auto; left: auto; right: -100%; }
            .nav-links.active { right: 0; left: auto; }
            .nav-links a, .nav-links button, .nav-links .discord-btn { margin: 5px 0; text-align: center; }
            .mobile-overlay.active { display: block; }
            .nav-links .discord-btn { margin-top: auto; border-radius: 20px; justify-content: center; }
        }
        .back-btn { display: inline-block; text-decoration: none; color: var(--primary); font-weight: bold; margin-bottom: 20px; border: 1px solid var(--primary); padding: 6px 12px; border-radius: 6px; font-size: 0.85em; }
        .back-btn:hover { background: var(--primary); color: white; }
        .anime-header { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        .top-info { display: flex; gap: 25px; margin-bottom: 25px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        @keyframes pulse { 0%,100% { opacity:0.2; } 50% { opacity:1; } }
        .bottom-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .playlist-box { background: #222; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        select { background: #333; color: #fff; border: 1px solid #555; padding: 8px; width: 100%; border-radius: 4px; margin-bottom: 10px; font-size: 0.85em; }
        .ep-row { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; margin-bottom: 12px; }
        .star-rating { font-size: 1.3em; color: #444; cursor: pointer; margin: 10px 0; text-align: center; display: flex; justify-content: center; gap: 2px; }
        .star-rating span.active { color: #f1c40f; }
        .link-box { background: rgba(255,71,87,0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,71,87,0.3); }
        .link-title { font-size: 0.75em; font-weight: bold; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        .btn-link { display: block; background: #333; color: white; text-decoration: none; padding: 8px; border-radius: 5px; margin-bottom: 6px; font-size: 0.85em; text-align: center; border: 1px solid #444; }
        .btn-link:hover { background: var(--primary); }
        .btn-delete { background: none; color: #ff4757; border: 1px solid #ff4757; padding: 6px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 0.75em; margin-top: 10px; }
        .mal-link { display: inline-flex; align-items: center; gap: 5px; font-size: 0.7em; color: #2e86de; text-decoration: none; margin-top: 4px; }
        .related-row { display: flex; gap: 16px; margin-bottom: 15px; flex-wrap: wrap; }
        .related-section { flex: 1; min-width: 0; }
        .related-label { font-size: 0.65em; color: var(--primary); font-weight: bold; margin-bottom: 6px; }
        .related-card { display: flex; align-items: center; gap: 8px; background: #222; border: 1px solid #333; border-radius: 8px; padding: 6px; text-decoration: none; }
        .related-card:hover { border-color: var(--primary); }
        .related-card img { width: 48px; height: 66px; object-fit: cover; border-radius: 4px; }
        .related-card span { font-size: 0.75em; color: #ccc; flex: 1; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: #1a1a1a; border: 1px solid #444; border-radius: 12px; padding: 20px; max-width: 320px; text-align: center; }
        .modal-actions { display: flex; gap: 8px; justify-content: center; margin-top: 18px; }
        .modal-btn { padding: 8px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .modal-btn-cancel { background: #333; color: #ccc; }
        .modal-btn-confirm { background: var(--primary); color: white; }
        .comments-section { margin-top: 20px; background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .seekstreaming-section { margin-top: 20px; background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .seekstreaming-section h3 { font-size: 1.1em; margin: 0 0 15px; color: var(--text); display: flex; align-items: center; justify-content: space-between; }
        .seek-episode-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .seek-ep-btn { background: #222; border: 2px solid #444; color: #ccc; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.95em; font-weight: 600; transition: all 0.2s; letter-spacing: 0.02em; }
        .seek-ep-btn:hover { border-color: var(--primary); color: white; background: rgba(255,71,87,0.12); transform: translateY(-1px); }
        .seek-ep-btn.active { background: var(--primary); border-color: var(--primary); color: white; font-weight: bold; box-shadow: 0 4px 12px rgba(255,71,87,0.4); transform: translateY(-1px); }
        .seek-player-wrap { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 10px; overflow: hidden; background: #000; border: 1px solid #333; margin-top: 12px; }
        .seek-player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        .close-player-btn, .fullscreen-player-btn { background: #333; color: white; border: none; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; transition: 0.2s; margin-left: 8px; }
        .close-player-btn:hover, .fullscreen-player-btn:hover { background: #ff4757; }
        @media (max-width: 800px) {
            .top-info { flex-direction: column; gap: 15px; }
            .poster { width: 100%; max-width: 200px; margin: 0 auto; }
            .anime-title { font-size: 1.5em; }
            .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .bottom-controls { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, addDoc, query, where, getDocs, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const params = new URLSearchParams(window.location.search);
        const animeName = params.get('name');
        let currentUser = null;
        let userRating = 0;
        let allAnimesForSearch = [];

        async function setBackground() {
            const isMobile = window.innerWidth <= 1000;
            try {
                const res = await fetch('backgrounds.json');
                const data = await res.json();
                const list = isMobile ? data.mobile : data.desktop;
                if (!list || !list.length) return;
                const file = list[Math.floor(Math.random() * list.length)];
                document.getElementById('bg-layer').style.backgroundImage = `url('img/${file}')`;
            } catch(e) {}
        }
        setBackground();

        function normalize(str) { return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[-_.:;,!?()'"&~#|]/g,' ').replace(/\s+/g,' ').trim(); }

        window.handleBack = (e) => { e.preventDefault(); const from=document.referrer; if(from && from.startsWith(window.location.origin)) history.back(); else window.location.href='index.html'; };

        async function loadAnimesForSearch() {
            try {
                const resp=await fetch('animes.csv');
                const data=await resp.text();
                const lines=data.split(/\r?\n/).slice(1);
                for(const line of lines) { const c=line.split(';'); const clean=s=>s?s.trim().replace(/^"|"$/g,'') : ""; if(c[0]) allAnimesForSearch.push({ nom:clean(c[0]), img:clean(c[8]) }); }
            } catch(e) {}
        }
        loadAnimesForSearch();

        const searchInput=document.getElementById('search'), searchSuggestions=document.getElementById('search-suggestions');
        searchInput.addEventListener('input', function() { const val=this.value.trim(); if(val.length<2) { searchSuggestions.classList.remove('active'); return; } const results=allAnimesForSearch.filter(a=>normalize(a.nom).includes(normalize(val))).slice(0,8); if(results.length===0) searchSuggestions.innerHTML='<div style="padding:8px;color:#888;">Aucun résultat</div>'; else searchSuggestions.innerHTML=results.map(a=>'<div class="suggestion-item" data-name="'+a.nom.replace(/"/g,'&quot;')+'"><img src="img/'+a.img+'" class="sugg-img" onerror="this.src=\'img/logo.jpg\'"><span>'+a.nom+'</span></div>').join(''); searchSuggestions.classList.add('active'); });
        searchInput.addEventListener('keydown', function(e) { if(e.key==='Enter') { e.preventDefault(); const val=this.value.trim(); if(val) window.location.href='index.html?search='+encodeURIComponent(val); searchSuggestions.classList.remove('active'); this.blur(); } });
        searchSuggestions.addEventListener('click', function(e) { const item=e.target.closest('.suggestion-item'); if(item && item.dataset.name) window.location.href='video.html?name='+encodeURIComponent(item.dataset.name); });
        document.addEventListener('click', function(e) { if(!e.target.closest('.search-wrapper')) searchSuggestions.classList.remove('active'); });
        window.randomAnime = () => { if(allAnimesForSearch.length) { const a=allAnimesForSearch[Math.floor(Math.random()*allAnimesForSearch.length)]; window.location.href='video.html?name='+encodeURIComponent(a.nom); } };

        function traduitStatutMAL(s){ const m={'Finished Airing':'Terminé','Currently Airing':'En cours','Not yet aired':'À venir','Airing':'En cours'}; return m[s]||s||'—'; }
        function formatDateFR(raw){
            if(!raw || !raw.trim()) return '—';
            const moisEN={'Jan':'janv.','Feb':'févr.','Mar':'mars','Apr':'avr.','May':'mai','Jun':'juin','Jul':'juil.','Aug':'août','Sep':'sept.','Oct':'oct.','Nov':'nov.','Dec':'déc.'};
            const parseDate = s => {
                s = s.trim();
                const m = s.match(/^([A-Za-z]{3})\s+(\d{1,2}),\s*(\d{4})$/);
                if(m) return `${parseInt(m[2])} ${moisEN[m[1]]||m[1]} ${m[3]}`;
                const m2 = s.match(/^([A-Za-z]{3})\s+(\d{4})$/);
                if(m2) return `${moisEN[m2[1]]||m2[1]} ${m2[2]}`;
                return s;
            };
            const rangeMatch = raw.match(/^(.+?)\s+to\s+(.+)$/i);
            if(rangeMatch) return `${parseDate(rangeMatch[1])} au ${parseDate(rangeMatch[2])}`;
            return parseDate(raw);
        }
        function formatPop(n){ return (!n && n!==0)?'—':'#'+n.toLocaleString('fr-FR'); }
        function formatScore(s){ return (!s && s!==0)?'—':parseFloat(s).toFixed(2); }
        function formatAiredJikan(aired){
            const moisFR=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
            const parseISO = s => { if(!s) return null; const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return null; return `${parseInt(m[3])} ${moisFR[parseInt(m[2])-1]} ${m[1]}`; };
            if(!aired) return null;
            const from=parseISO(aired.from), to=parseISO(aired.to);
            if(from && to) return `${from} au ${to}`;
            return from||null;
        }

        async function fetchMALData(nom,malId){
            try{
                if(malId && malId.trim()){
                    const resp=await fetch(`https://api.jikan.moe/v4/anime/${malId.trim()}`);
                    if(!resp.ok) return null;
                    const json=await resp.json();
                    if(!json.data) return null;
                    const item=json.data;
                    return { score:item.score, popularity:item.popularity, status:item.status, malUrl:item.url, aired:item.aired };
                }else{
                    const q=nom.split('/')[0].trim();
                    const resp=await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=1&sfw=false`);
                    if(!resp.ok) return null;
                    const json=await resp.json();
                    if(!json.data || json.data.length===0) return null;
                    const item=json.data[0];
                    return { score:item.score, popularity:item.popularity, status:item.status, malUrl:item.url, aired:item.aired };
                }
            }catch(e){ return null; }
        }
        function applyMALStats(malData, updateDate=true){
            if(!malData) return;
            const popEl=document.getElementById('stat-pop'), scoreEl=document.getElementById('stat-score'), etatEl=document.getElementById('stat-etat'), sortieEl=document.getElementById('stat-sortie'), malBadge=document.getElementById('mal-badge');
            if(popEl && malData.popularity!=null){ popEl.textContent=formatPop(malData.popularity); popEl.closest('.stat-item').classList.add('mal-live'); }
            if(scoreEl && malData.score!=null){ scoreEl.textContent='⭐ '+formatScore(malData.score); scoreEl.closest('.stat-item').classList.add('mal-live'); }
            if(etatEl && malData.status){ etatEl.textContent=traduitStatutMAL(malData.status); etatEl.closest('.stat-item').classList.add('mal-live'); }
            if(updateDate && sortieEl && malData.aired){ const d=formatAiredJikan(malData.aired); if(d){ sortieEl.textContent=d; sortieEl.closest('.stat-item').classList.add('mal-live'); } }
            if(malBadge && malData.malUrl) malBadge.innerHTML=`<a href="${malData.malUrl}" target="_blank" class="mal-link">🔗 Voir sur MyAnimeList</a>`;
        }

        async function load(){
            const display=document.getElementById('anime-details');
            try{
                const resp=await fetch('animes.csv');
                const data=await resp.text();
                const lines=data.split(/\r?\n/).slice(1);
                let anime=null;
                for(let line of lines){
                    const c=line.split(';');
                    const clean=s=>s?s.trim().replace(/^"|"$/g,'') : "";
                    if(clean(c[0])===animeName){
                        anime={
                            nom:clean(c[0]), pop:clean(c[1]), score:clean(c[2]), year:clean(c[3]), ep:clean(c[4]), censure:clean(c[5]),
                            etat:clean(c[6]), desc:clean(c[7]), img:clean(c[8]), stream:c[9]?c[9].split(',').map(clean):[], dl:c[10]?c[10].split(',').map(clean):[],
                            infoV:clean(c[11]), tags:c[12]?c[12].split(',').filter(t=>t).map(clean):[], malId:clean(c[13]), editeur:clean(c[14]),

                const epMatches=anime.ep.match(/\d+/g);

                display.innerHTML=`

                function getDomainLabel(url, prefix) {

                anime.stream.filter(l=>l.trim()).forEach((l,i)=>document.getElementById('stream-area').innerHTML+=`<a href="${l}" target="_blank" class="btn-link">${getDomainLabel(l,'▶')} ↗</a>`);
                if(anime.infoV && anime.infoV.trim()){
                    const infovArea=document.getElementById('infov-area');
                    if(infovArea){
                        const t=document.createElement('div'); t.className='link-title'; t.textContent='ℹ️ Informations de visionnage';
                        const b=document.createElement('div'); b.style.cssText='background:rgba(255,255,255,0.04);border:1px solid #333;border-radius:6px;padding:8px 10px;font-size:0.8em;color:#ccc;line-height:1.6;white-space:pre-line;margin-top:4px;';
                        b.textContent=anime.infoV;
                        infovArea.appendChild(t); infovArea.appendChild(b);
                    }
                }
                const yearIsOnlyYear = /^\d{4}$/.test(anime.year.trim());
                const lastYear = parseInt((anime.year.match(/\d{4}/g)||[]).pop()||'0');
                const isRecent = lastYear >= new Date().getFullYear() - 5;
                const isEnCours = (anime.etat||'').toLowerCase().includes('cours') || (anime.etat||'').toLowerCase().includes('airing');
                const shouldRefreshDate = yearIsOnlyYear || (isEnCours && isRecent);
                fetchMALData(anime.nom,anime.malId).then(md=>{ applyMALStats(md, shouldRefreshDate); if(!md){ const badge=document.getElementById('mal-badge'); if(badge) badge.innerHTML='<span style="font-size:0.7em;color:#555;">Données MAL indisponibles</span>'; } });
                const _ref=document.referrer, _bl=document.getElementById('back-link');
                if(_ref.includes('playlist.html')) _bl.innerText='← Retour à la playlist';
                else if(_ref.includes('tags.html')) _bl.innerText='← Retour aux tags';
                const updateStars=v=>document.querySelectorAll('#stars span').forEach(s=>s.classList.toggle('active',s.dataset.v<=v));
                onAuthStateChanged(auth,async(u)=>{
                    currentUser=u;
                    if(u){
                        const docRef=doc(db,"playlists",u.uid+"_"+animeName);
                        let snap=await getDoc(docRef);
                        if(!snap.exists()){
                            try{
                                const q=query(collection(db,"playlists"),where("uid","==",u.uid));
                                const allSnap=await getDocs(q);
                                for(const old of allSnap.docs){
                                    if(old.id===docRef.id) continue;
                                    const oldAnime=(old.data().anime||old.data().animeName||old.data().titre||old.data().nom||"").trim();
                                    if(oldAnime.toLowerCase()===animeName.toLowerCase()){

                            document.getElementById('user-status').value=d.status||'watching';
                            document.getElementById('user-ep').value=d.epSeen||0;

                            updateStars(userRating);
                        }
                        const isNew=!snap.exists();
                        function showConfirm(msg,onConfirm){ const ov=document.getElementById('confirm-modal'); document.getElementById('modal-msg').innerHTML=msg; ov.classList.add('active'); document.getElementById('modal-confirm').onclick=()=>{ ov.classList.remove('active'); onConfirm(); }; document.getElementById('modal-cancel').onclick=()=>ov.classList.remove('active'); }
                        function formatAddedAt(ts){
                            if(!ts) return '';
                            const d = ts.toDate ? ts.toDate() : new Date(ts);
                            const moisFR=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
                            return `${d.getDate()} ${moisFR[d.getMonth()]} ${d.getFullYear()} à ${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
                        }
                        function refreshAddedAt(data){

                            if(cel && data && data.completedAt){ cel.textContent=`✅ Terminé le ${formatAddedAt(data.completedAt)}`; cel.style.display='block'; }
                            else if(cel){ cel.style.display='none'; }

                        if(snap.exists()) refreshAddedAt(snap.data());
                        const autoSave=async()=>{
                            const statusVal=document.getElementById('user-status').value, epVal=parseInt(document.getElementById('user-ep').value);

                            if(isNew||!prevData.addedAt) updates.addedAt=now;
                            if(epVal!==(prevData.epSeen||0)) updates.epUpdatedAt=now;

                        document.getElementById('user-ep').onchange=autoSave;
                        document.getElementById('stars').onclick=e=>{ if(e.target.dataset.v){ userRating=parseInt(e.target.dataset.v); updateStars(userRating); autoSave(); } };
                        document.getElementById('delete-btn').onclick=()=>showConfirm('Supprimer cet anime de votre liste ?',()=>deleteDoc(docRef).then(()=>location.reload()));

                onSnapshot(query(collection(db,"commentaires"),where("anime","==",animeName)),(snap)=>{ const cDisp=document.getElementById('comments-display'); let docs=[]; snap.forEach(d=>docs.push(d.data())); docs.sort((a,b)=>(b.date?.seconds||0)-(a.date?.seconds||0)); cDisp.innerHTML=docs.map(d=>`<div style="margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:6px;"><b style="color:var(--primary); font-size:0.85em;">${d.userName}</b><p style="margin:4px 0; font-size:0.85em;">${d.text}</p></div>`).join(''); });
                document.getElementById('btn-post').onclick=async()=>{ const t=document.getElementById('comment-input').value; if(t.trim() && currentUser){ await addDoc(collection(db,"commentaires"),{ anime:animeName, text:t, userName:sessionStorage.getItem("userPseudo")||currentUser.displayName, date:serverTimestamp() }); document.getElementById('comment-input').value=""; } };
            }catch(err){ console.error(err); }
        }
        load();

        // ── SeekStreaming integration améliorée (épisodes spéciaux, numéros décimaux, ignore les tirets) ──
        async function loadSeekstreaming() {
            if (!animeName) return;
            try {
                const resp = await fetch('stream.csv');
                if (!resp.ok) return;
                const text = await resp.text();
                const lines = text.split(/\r?\n/).slice(1).filter(l => l.trim());

                // Normalisation : minuscules, sans accents, ignore tirets/underscores et séparateurs
                const norm = s => s.toLowerCase()
                    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                    .replace(/[-_\s]+/g, ' ')           // les tirets/underscores deviennent des espaces
                    .replace(/[^a-z0-9\s]/g, '')
                    .replace(/\s+/g, ' ').trim();

                // Mots-clés spéciaux (deviennent des mini-catégories affichées sous "Épisodes")
                const specialKeywords = ['special', 'bonus', 'deleted scenes', 'art gallery'];

                // Ordre + libellé d'affichage des mini-catégories (uniquement affichées si présentes)
                const miniCategories = [
                    { key: 'special', label: 'Special' },
                    { key: 'bonus', label: 'Bonus' },
                    { key: 'deleted scenes', label: 'Deleted Scenes' },
                    { key: 'art gallery', label: 'Art Gallery' }
                ];

                const cleanRawTitle = raw => {
                    let s = raw.trim();
                    // Ignore les crochets/parenthèses présents au tout début du nom de fichier
                    // (ex: "[GroupName] Titre 02 vostfr" ou "(VOSTFR) Titre 02 vostfr")
                    while (/^[\[\(]/.test(s)) {
                        s = s.replace(/^[\[\(][^\]\)]*[\]\)]\s*/, '');
                    }
                    return s
                        .replace(/\[[^\]]*\]/g, '')          // crochets restants ailleurs dans le nom
                        .replace(/\.(mkv|mp4|avi|mov)$/i, '')
                        .replace(/[-_]+/g, ' ')
                        .trim();
                };

                // Formate un numéro : entier -> "07" (même si stocké "07.0"), demi-épisode -> "08.5"
                const formatNum = n => {
                    if (n === null || n === undefined || isNaN(n)) return '';
                    if (Number.isInteger(n)) return String(n).padStart(2, '0');
                    const [intPart, decPart] = n.toFixed(1).split('.');
                    return intPart.padStart(2, '0') + '.' + decPart;
                };

                const parseEnhanced = raw => {
                    let cleaned = cleanRawTitle(raw);
                    // Pattern saison + épisode : "s1 02" ou "s1 08.5"
                    let mSeason = cleaned.match(/^(.*?)\s+s(\d+)\s+(\d+(?:\.\d+)?)\s*(vostfr|vf|sub|vo|fr)/i);
                    if (mSeason) {
                        return {
                            animeTitle: mSeason[1].trim(),
                            season: parseInt(mSeason[2]),
                            episode: parseFloat(mSeason[3]),
                            specialType: null,
                            specialNumber: null
                        };
                    }
                    // Pattern saison + épisode SANS "s" : "Titre 2 02 vostfr"
                    // Le premier nombre (sans zéro devant, 1-2 chiffres) = saison,
                    // le second nombre (souvent avec zéro devant) = épisode.
                    let mSeasonBare = cleaned.match(/^(.*?)\s+([1-9]\d?)\s+(\d{1,4}(?:\.\d+)?)\s*(vostfr|vf|sub|vo|fr)/i);
                    if (mSeasonBare) {
                        return {
                            animeTitle: mSeasonBare[1].trim(),
                            season: parseInt(mSeasonBare[2]),
                            episode: parseFloat(mSeasonBare[3]),
                            specialType: null,
                            specialNumber: null
                        };
                    }
                    // Épisode normal ou spécial (accepte les décimales : 08.5, 07.0...)
                    let mEp = cleaned.match(/^(.*?)\s+(\d+(?:\.\d+)?)\s*(vostfr|vf|sub|vo|fr)/i);
                    if (mEp) {
                        let titlePart = mEp[1].trim();
                        let epNum = parseFloat(mEp[2]);
                        let foundSpecial = null;
                        for (let kw of specialKeywords) {
                            let regex = new RegExp(`\\b${kw}\\s*(\\d+(?:\\.\\d+)?)?\\b`, 'i');
                            let match = titlePart.match(regex);
                            if (match) {
                                foundSpecial = { type: kw, num: match[1] ? parseFloat(match[1]) : epNum };
                                titlePart = titlePart.replace(regex, '').trim();
                                break;
                            }
                        }
                        if (foundSpecial) {
                            return {
                                animeTitle: titlePart,
                                season: 1,
                                episode: null,
                                specialType: foundSpecial.type,
                                specialNumber: foundSpecial.num
                            };
                        } else {
                            return {
                                animeTitle: titlePart,
                                season: 1,
                                episode: epNum,
                                specialType: null,
                                specialNumber: null
                            };
                        }
                    }
                    return {
                        animeTitle: cleaned.trim(),
                        season: 1,
                        episode: null,
                        specialType: null,
                        specialNumber: null
                    };
                };

                // Ignorer les tirets et mots-clés lors de la comparaison du titre
                const normalizeForMatch = title => {
                    let t = title.toLowerCase();
                    for (let kw of specialKeywords) {
                        t = t.replace(new RegExp(`\\b${kw}\\s*\\d*(?:\\.\\d+)?\\b`, 'g'), '');
                    }
                    t = t.replace(/\b\d+(?:\.\d+)?\b/g, '');
                    return norm(t);  // la fonction norm gère déjà les tirets
                };

                // Lecture CSV : title,poster,resolution,download,watch (5 colonnes)
                const rows = lines.map(line => {
                    const parts = line.split(',');
                    if (parts.length < 5) return null;
                    const watch = parts[parts.length - 1].trim();
                    const resolution = parts[parts.length - 3].trim();
                    const title = parts[0].trim();
                    const poster = parts.slice(1, parts.length - 3).join(',').trim();
                    return { title, poster, resolution, watch };
                }).filter(Boolean);

                rows.forEach(r => {
                    const parsed = parseEnhanced(r.title);
                    r.animeTitle = parsed.animeTitle;
                    r.season = parsed.season;
                    r.episode = parsed.episode;
                    r.specialType = parsed.specialType;
                    r.specialNumber = parsed.specialNumber;
                    r.normAnime = normalizeForMatch(r.animeTitle);
                });

                const pageNorm = normalizeForMatch(animeName);
                const matched = rows.filter(r => r.normAnime === pageNorm);
                if (matched.length === 0) return;

                const priority = { null: 0, 'special': 1, 'bonus': 2, 'deleted scenes': 3, 'art gallery': 4 };
                matched.sort((a, b) => {
                    if (a.season !== b.season) return a.season - b.season;
                    let prioA = priority[a.specialType] ?? 99;
                    let prioB = priority[b.specialType] ?? 99;
                    if (prioA !== prioB) return prioA - prioB;
                    let numA = a.specialNumber ?? a.episode ?? 0;
                    let numB = b.specialNumber ?? b.episode ?? 0;
                    return numA - numB;
                });

                const section = document.getElementById('seekstreaming-section');
                const list = document.getElementById('seek-episode-list');
                const wrap = document.getElementById('seek-player-wrap');
                const iframe = document.getElementById('seek-iframe');

                section.style.display = '';
                list.innerHTML = '';
                list.style.flexDirection = 'column';
                list.style.gap = '14px';

                // Les liens "watch" (ex: https://.../embedseek.com/#xxxxx) ne diffèrent
                // souvent que par le fragment "#xxxxx". Or changer uniquement le fragment
                // d'une iframe déjà chargée ne force PAS un vrai rechargement du document
                // (le navigateur traite ça comme une simple navigation interne) : le lecteur
                // distant doit alors détecter lui-même le changement, ce qui échoue une fois
                // sur deux (écran noir, épisode qui ne change pas, résolution qui suit pas).
                // On force donc systématiquement un rechargement complet de l'iframe.
                function hardSetIframeSrc(url) {
                    iframe.src = 'about:blank';
                    setTimeout(() => { iframe.src = url; }, 30);
                }

                function closePlayer() {
                    iframe.src = 'about:blank';
                    wrap.style.display = 'none';
                    document.querySelectorAll('.seek-ep-btn').forEach(b => b.classList.remove('active'));
                }

                function loadEpisode(row, btn) {
                    document.querySelectorAll('.seek-ep-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    wrap.style.display = '';
                    hardSetIframeSrc(row.watch);
                }

                // Plein écran fiable : on ne dépend plus du bouton interne du lecteur
                // distant (qui peut être cassé par le problème de rechargement ci-dessus),
                // on pilote directement l'API Fullscreen sur notre propre conteneur.
                function goFullscreen() {
                    const req = wrap.requestFullscreen || wrap.webkitRequestFullscreen
                        || wrap.mozRequestFullScreen || wrap.msRequestFullscreen;
                    if (req) req.call(wrap);
                }

                // Ajout des boutons fermer / plein écran
                const header = section.querySelector('h3');
                if (header && !section.querySelector('.close-player-btn')) {
                    const closeBtn = document.createElement('button');
                    closeBtn.textContent = '❌ Fermer le lecteur';
                    closeBtn.className = 'close-player-btn';
                    closeBtn.onclick = closePlayer;
                    header.appendChild(closeBtn);
                }
                if (header && !section.querySelector('.fullscreen-player-btn')) {
                    const fsBtn = document.createElement('button');
                    fsBtn.textContent = '⛶ Plein écran';
                    fsBtn.className = 'fullscreen-player-btn';
                    fsBtn.onclick = goFullscreen;
                    header.appendChild(fsBtn);
                }

                function labelFor(row) {
                    if (row.specialType) {
                        let typeCapitalized = row.specialType.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                        return `${typeCapitalized} ${formatNum(row.specialNumber)}`;
                    } else if (row.episode !== null) {
                        return `Épisode ${formatNum(row.episode)}`;
                    }
                    return 'Film / OAV';
                }

                function makeEpBtn(row) {
                    const btn = document.createElement('button');
                    btn.className = 'seek-ep-btn';
                    btn.textContent = labelFor(row);
                    btn.title = row.title;
                    btn.addEventListener('click', () => loadEpisode(row, btn));
                    return btn;
                }

                function makeCategoryLabel(text) {
                    const el = document.createElement('div');
                    el.style.cssText = 'font-size:0.8em; font-weight:bold; color:var(--primary); text-transform:uppercase; letter-spacing:0.05em; padding-bottom:4px; border-bottom:1px solid rgba(255,71,87,0.3); width:100%;';
                    el.textContent = text;
                    return el;
                }

                // Ajoute les épisodes normaux (sans label, comme avant), puis en dessous
                // les mini-catégories Special / Bonus / Deleted Scenes / Art Gallery,
                // uniquement celles qui contiennent au moins un élément.
                function appendCategoryGroups(rowsScope, target) {
                    const normalRows = rowsScope.filter(r => r.specialType === null);
                    if (normalRows.length > 0) {
                        const group = document.createElement('div');
                        group.style.cssText = 'display:flex; flex-wrap:wrap; gap:8px;';
                        normalRows.forEach(row => group.appendChild(makeEpBtn(row)));
                        target.appendChild(group);
                    }
                    miniCategories.forEach(cat => {
                        const catRows = rowsScope.filter(r => r.specialType === cat.key);
                        if (catRows.length === 0) return;
                        target.appendChild(makeCategoryLabel(cat.label));
                        const group = document.createElement('div');
                        group.style.cssText = 'display:flex; flex-wrap:wrap; gap:8px;';
                        catRows.forEach(row => group.appendChild(makeEpBtn(row)));
                        target.appendChild(group);
                    });
                }

                const seasons = [...new Set(matched.map(r => r.season))].sort((a, b) => a - b);
                const isMultiSeason = seasons.length > 1;

                if (isMultiSeason) {
                    seasons.forEach(s => {
                        const seasonRows = matched.filter(r => r.season === s);
                        const seasonBlock = document.createElement('div');
                        seasonBlock.style.cssText = 'display:flex; flex-direction:column; gap:10px; width:100%;';
                        const seasonLabel = document.createElement('div');
                        seasonLabel.style.cssText = 'font-size:0.9em; font-weight:bold; color:#fff; text-transform:uppercase; letter-spacing:0.05em;';
                        seasonLabel.textContent = `Saison ${s}`;
                        seasonBlock.appendChild(seasonLabel);
                        appendCategoryGroups(seasonRows, seasonBlock);
                        list.appendChild(seasonBlock);
                    });
                } else {
                    appendCategoryGroups(matched, list);
                }
            } catch (e) {
                console.warn('SeekStreaming load error:', e);
            }
        }
        loadSeekstreaming();

        function toggleM(){ const menu=document.getElementById('menu'), overlay=document.getElementById('overlay'); const isOpen=menu.classList.toggle('active'); overlay.classList.toggle('active'); document.body.style.overflow=isOpen?'hidden':''; }
        window.toggleM=toggleM;
    </script>
</body>
</html>
