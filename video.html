<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="mobile.css">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Visionnage - Le Malicieux</title>
    <style>
        :root { --primary: #ff4757; --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .back-btn { display: inline-block; text-decoration: none; color: var(--primary); font-weight: bold; margin-bottom: 20px; border: 1px solid var(--primary); padding: 8px 15px; border-radius: 6px; transition: 0.3s; }
        .back-btn:hover { background: var(--primary); color: white; }
        .anime-header { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        .top-info { display: flex; gap: 25px; margin-bottom: 25px; }
        .poster { width: 280px; flex-shrink: 0; }
        .poster img { width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .main-details { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .anime-title { font-size: 2.2em; color: var(--primary); margin: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .stat-item { background: #222; padding: 10px; border-radius: 8px; border: 1px solid #333; text-align: center; position: relative; }
        .stat-item small { color: var(--primary); font-size: 0.7em; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .stat-item span { font-weight: bold; font-size: 0.9em; }
        .stat-item.mal-live { border-color: #2e86de; }
        .stat-item.mal-live::after { content: 'MAL'; position: absolute; top: 4px; right: 5px; font-size: 0.55em; color: #2e86de; font-weight: bold; letter-spacing: 0.5px; }
        .mal-loading { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75em; color: #888; margin-top: 6px; }
        .mal-loading .dot { width: 6px; height: 6px; background: #2e86de; border-radius: 50%; animation: pulse 1s infinite; }
        .mal-loading .dot:nth-child(2) { animation-delay: 0.2s; }
        .mal-loading .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,100% { opacity:0.2; } 50% { opacity:1; } }
        .bottom-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch; }
        .playlist-box { background: #222; padding: 15px; border-radius: 10px; border: 1px solid #444; }
        select { background: #333; color: #fff; border: 1px solid #555; padding: 10px; width: 100%; border-radius: 4px; margin-bottom: 12px; cursor: pointer; }
        select option { background-color: #222 !important; color: #fff !important; }
        .ep-row { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #444; }
        .ep-row span { font-weight: bold; color: #aaa; }
        #user-ep { width: auto; min-width: 80px; margin-bottom: 0; text-align: center; padding: 5px; }
        .star-rating { font-size: 1.4em; color: #444; cursor: pointer; margin: 10px 0; text-align: center; display: flex; justify-content: center; gap: 2px; }
        .star-rating span.active { color: #f1c40f; }
        .link-box { background: rgba(255, 71, 87, 0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(255, 71, 87, 0.3); }
        .link-title { font-size: 0.8em; font-weight: bold; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; }
        .btn-link { display: block; background: #333; color: white; text-decoration: none; padding: 10px; border-radius: 5px; margin-bottom: 8px; font-size: 0.9em; text-align: center; border: 1px solid #444; font-weight: bold; transition: 0.2s; }
        .btn-link:hover { background: var(--primary); border-color: var(--primary); }
        .info-visionnage-csv { background: rgba(255,255,255,0.05); border-left: 3px solid var(--primary); padding: 10px; border-radius: 4px; font-size: 0.85em; margin-bottom: 12px; color: #bbb; }
        .info-generale-fixe { margin-top: 15px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.8em; color: #888; line-height: 1.4; }
        .btn-delete { background: none; color: #ff4757; border: 1px solid #ff4757; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 0.8em; margin-top: 10px; }
        .mal-link { display: inline-flex; align-items: center; gap: 5px; font-size: 0.75em; color: #2e86de; text-decoration: none; margin-top: 4px; opacity: 0.8; transition: opacity 0.2s; }
        .mal-link:hover { opacity: 1; text-decoration: underline; }
        @media (max-width: 800px) {
            body { padding: 10px; }
            .top-info { flex-direction: column; gap: 15px; }
            .poster { width: 100%; max-width: 220px; margin: 0 auto; }
            .anime-title { font-size: 1.5em; }
            .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px; }
            .stat-item { padding: 8px 6px; }
            .stat-item small { font-size: 0.6em; }
            .stat-item span { font-size: 0.8em; }
            .bottom-controls { grid-template-columns: 1fr; gap: 12px; }
            .anime-header { padding: 14px; }
            .info-generale-fixe { font-size: 0.72em; }
        }
        /* ── SECTION RELATIONS (PREQUELS / SEQUELS) ── */
        .related-section { margin-bottom: 18px; }
        .related-label { font-size: 0.7em; color: var(--primary); font-weight: bold; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em; }
        .related-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .related-card {
            display: flex; flex-direction: column; align-items: center;
            width: 80px; text-decoration: none; gap: 6px;
            transition: transform 0.2s;
        }
        .related-card:hover { transform: translateY(-3px); }
        .related-card img {
            width: 80px; height: 110px; object-fit: cover;
            border-radius: 7px; border: 2px solid #333;
            transition: border-color 0.2s;
        }
        .related-card:hover img { border-color: var(--primary); }
        .related-card span {
            font-size: 0.72em; color: #ccc; text-align: center;
            line-height: 1.3; word-break: break-word;
            max-width: 80px;
        }
        .related-card:hover span { color: white; }
        /* ── MODALE CONFIRMATION ── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: #1a1a1a; border: 1px solid #444; border-radius: 12px; padding: 28px 24px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .modal-box p { margin: 0 0 22px; font-size: 0.95em; color: #ddd; line-height: 1.5; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { padding: 10px 24px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        .modal-btn-cancel { background: #333; color: #ccc; border: 1px solid #555; }
        .modal-btn-cancel:hover { background: #444; }
        .modal-btn-confirm { background: var(--primary); color: white; }
        .modal-btn-confirm:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <!-- MODALE CONFIRMATION -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-box">
            <p id="modal-msg"></p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">Annuler</button>
                <button class="modal-btn modal-btn-confirm" id="modal-confirm">Supprimer</button>
            </div>
        </div>
    </div>

    <div class="container">
        <a href="index.html" id="back-link" class="back-btn" onclick="handleBack(event)">← Retour au catalogue</a>
        <div id="anime-details">Chargement des données...</div>
        <div id="comments-section" style="margin-top:20px; background:var(--card-bg); padding:20px; border-radius:15px; border: 1px solid #333;">
            <h3>Commentaires</h3>
            <textarea id="comment-input" style="width: 100%; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; resize: none; box-sizing: border-box;" placeholder="Ajouter un commentaire..." rows="3"></textarea>
            <button id="btn-post" style="background:var(--primary); color:white; border:none; padding:10px 30px; border-radius:5px; cursor:pointer; font-weight:bold;">Publier</button>
            <div id="comments-display" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, addDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCD70a-QR2nJnHBnA-FUoIGHZ7Z3VByPMk", authDomain: "le-malicieux-v2.firebaseapp.com", projectId: "le-malicieux-v2", storageBucket: "le-malicieux-v2.firebasestorage.app", messagingSenderId: "938147445933", appId: "1:938147445933:web:86f9c65ee0737e66a9da24" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const params = new URLSearchParams(window.location.search);
        const animeName = params.get('name');
        let currentUser = null;
        let userRating = 0;

        // ─── RETOUR INTELLIGENT ──────────────────────────────────────────────────
        // Si on vient du site (index, playlist…) → history.back() pour restaurer
        // le scroll et l'état exact. Sinon → fallback vers index.html.
        window.handleBack = (e) => {
            e.preventDefault();
            const from = document.referrer;
            if (from && from.startsWith(window.location.origin)) {
                history.back();
            } else {
                window.location.href = 'index.html';
            }
        };
        // ────────────────────────────────────────────────────────────────────────

        // ─── JIKAN / MAL ────────────────────────────────────────────────────────────
        function traduitStatutMAL(status) {
            const map = { 'Finished Airing': 'Terminé', 'Currently Airing': 'En cours', 'Not yet aired': 'À venir', 'Airing': 'En cours' };
            return map[status] || status || '—';
        }
        function formatPop(n) { return (!n && n !== 0) ? '—' : '#' + n.toLocaleString('fr-FR'); }
        function formatScore(s) { return (!s && s !== 0) ? '—' : parseFloat(s).toFixed(2); }

        /**
         * Récupère les données MAL via Jikan.
         * Si malId est renseigné dans le CSV → appel direct par ID (fiable à 100%).
         * Sinon → recherche par nom (peut se tromper sur des titres ambigus).
         */
        async function fetchMALData(nomAnime, malId) {
            try {
                if (malId && malId.trim() !== '') {
                    // ID forcé → appel direct
                    const resp = await fetch(`https://api.jikan.moe/v4/anime/${malId.trim()}`);
                    if (!resp.ok) return null;
                    const json = await resp.json();
                    if (!json.data) return null;
                    const item = json.data;
                    return { score: item.score, popularity: item.popularity, status: item.status, malUrl: item.url };
                } else {
                    // Recherche par nom (premier segment avant le slash)
                    const searchQuery = nomAnime.split('/')[0].trim();
                    const resp = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(searchQuery)}&limit=1&sfw=false`);
                    if (!resp.ok) return null;
                    const json = await resp.json();
                    if (!json.data || json.data.length === 0) return null;
                    const item = json.data[0];
                    return { score: item.score, popularity: item.popularity, status: item.status, malUrl: item.url };
                }
            } catch(e) {
                console.warn('Erreur Jikan:', e);
                return null;
            }
        }

        function applyMALStats(malData) {
            if (!malData) return;
            const popEl    = document.getElementById('stat-pop');
            const scoreEl  = document.getElementById('stat-score');
            const etatEl   = document.getElementById('stat-etat');
            const malBadge = document.getElementById('mal-badge');
            if (popEl && malData.popularity != null)  { popEl.textContent = formatPop(malData.popularity);          popEl.closest('.stat-item').classList.add('mal-live'); }
            if (scoreEl && malData.score != null)      { scoreEl.textContent = '⭐ ' + formatScore(malData.score);  scoreEl.closest('.stat-item').classList.add('mal-live'); }
            if (etatEl && malData.status)              { etatEl.textContent = traduitStatutMAL(malData.status);     etatEl.closest('.stat-item').classList.add('mal-live'); }
            if (malBadge) {
                malBadge.innerHTML = malData.malUrl
                    ? `<a href="${malData.malUrl}" target="_blank" class="mal-link">🔗 Voir sur MyAnimeList</a>`
                    : '';
            }
        }
        // ────────────────────────────────────────────────────────────────────────────

        async function load() {
            const display = document.getElementById('anime-details');
            try {
                const resp = await fetch('animes.csv');
                const data = await resp.text();
                const lines = data.split(/\r?\n/).slice(1);
                
                let anime = null;
                for (let line of lines) {
                    const c = line.split(';');
                    const clean = (s) => s ? s.trim().replace(/^"|"$/g, '') : "";
                    if (clean(c[0]) === animeName) {
                        anime = {
                            nom:    clean(c[0]),  pop:   clean(c[1]),  score: clean(c[2]),
                            year:   clean(c[3]),  ep:    clean(c[4]),  censure: clean(c[5]),
                            etat:   clean(c[6]),  desc:  clean(c[7]),  img:   clean(c[8]),
                            stream: c[9]  ? c[9].split(',').map(clean)  : [],
                            dl:     c[10] ? c[10].split(',').map(clean) : [],
                            infoV:  clean(c[11]),
                            tags:   c[12] ? c[12].split(',').filter(t => t.trim() !== "").map(clean) : [],
                            malId:   clean(c[13]),
                            editeur: clean(c[14]),
                            prequels: c[15] ? c[15].split(',').map(clean).filter(Boolean) : [],
                            sequels:  c[16] ? c[16].split(',').map(clean).filter(Boolean) : []
                        };
                        break;
                    }
                }

                if (!anime) { display.innerHTML = "Anime non trouvé."; return; }

                const epMatches = anime.ep.match(/\d+/g);
                const maxEp = epMatches ? parseInt(epMatches[epMatches.length - 1]) : 0;
                let epOptions = "";
                for(let i = 0; i <= maxEp; i++) { epOptions += `<option value="${i}">${i}</option>`; }

                const tagsHtml = anime.tags.length > 0 
                    ? anime.tags.map(t => `<a href="tags.html?tag=${encodeURIComponent(t)}" style="text-align:center; background:rgba(255,255,255,0.05); color:#aaa; text-decoration:none; font-size:0.75em; padding:5px 8px; border-radius:4px; border:1px solid #333; transition:0.3s; white-space:nowrap;" onmouseover="this.style.borderColor='var(--primary)';this.style.color='white'" onmouseout="this.style.borderColor='#333';this.style.color='#aaa'">${t}</a>`).join('')
                    : `<div style="width:100%; text-align:center; color:#555; font-size:0.75em; padding:5px; border:1px dashed #333; border-radius:4px;">Aucun tag répertorié</div>`;

                const makeRelatedCards = (list) =>
                    list.map(name => {
                        const slug = name.split('.')[0];
                        return `<a href="video.html?name=${encodeURIComponent(name)}" class="related-card">
                            <img src="img/${slug}.jpg" onerror="this.src='img/${slug}.png'; this.onerror=null;">
                            <span>${name}</span>
                        </a>`;
                    }).join('');

                const relatedSection = [
                    anime.prequels.length ? `<div class="related-section"><div class="related-label">⬅️ Préquel(s)</div><div class="related-list">${makeRelatedCards(anime.prequels)}</div></div>` : '',
                    anime.sequels.length  ? `<div class="related-section"><div class="related-label">➡️ Suite(s)</div><div class="related-list">${makeRelatedCards(anime.sequels)}</div></div>`   : ''
                ].join('');

                display.innerHTML = `
                    <div class="anime-header">
                        <div class="top-info">
                            <div class="poster">
                                <img src="img/${anime.img.split('.')[0]}.jpg" onerror="this.src='img/${anime.img.split('.')[0]}.png'">
                            </div>
                            <div class="main-details">
                                <h1 class="anime-title">${anime.nom}</h1>
                                <div class="stats-grid">
                                    <div class="stat-item"><small>Pop.</small><span id="stat-pop">${anime.pop}</span></div>
                                    <div class="stat-item"><small>Score</small><span id="stat-score">⭐ ${anime.score}</span></div>
                                    <div class="stat-item"><small>Année</small><span>${anime.year}</span></div>
                                    <div class="stat-item"><small>Épisodes</small><span>${anime.ep}</span></div>
                                    <div class="stat-item"><small>Censure</small><span>${anime.censure}</span></div>
                                    <div class="stat-item"><small>État</small><span id="stat-etat">${anime.etat}</span></div>
                                    <div class="stat-item" style="grid-column: span 2; cursor:${anime.editeur ? 'pointer' : 'default'};" ${anime.editeur ? `onclick="window.location='editeurs.html?studio='+encodeURIComponent('${anime.editeur.split(',')[0].trim()}')"` : ''}>
                                        <small>Éditeur${anime.editeur && anime.editeur.includes(',') ? 's' : ''}</small>
                                        <span style="font-size:0.85em; ${anime.editeur ? 'color:#ff4757;' : ''}">
                                            ${anime.editeur ? anime.editeur.split(',').map(e => e.trim()).map((e,i,arr) => arr.length > 1 ? `<a href="editeurs.html?studio=${encodeURIComponent(e)}" style="color:var(--primary); text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${e}</a>` : e).join(' / ') : '—'}
                                        </span>
                                    </div>
                                </div>
                                <div id="mal-badge">
                                    <span class="mal-loading">
                                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                                        ${anime.malId ? 'Chargement MAL (ID forcé)…' : 'Récupération des données MAL…'}
                                    </span>
                                </div>
                                <p style="font-size:0.95em; color:#ccc; line-height:1.6;">${anime.desc}</p>
                            </div>
                        </div>
                        <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:${relatedSection ? '14px' : '20px'};">${tagsHtml}</div>
                        ${relatedSection ? `<div style="margin-bottom:20px;">${relatedSection}</div>` : ''}
                        <div class="bottom-controls">
                            <div class="playlist-box">
                                <label style="font-size:0.7em; color:var(--primary); font-weight:bold; text-transform:uppercase; margin-bottom:10px; display:block;">Ma Progression</label>
                                <select id="user-status"><option value="watching">En cours</option><option value="waiting">En attente</option><option value="completed">Terminé</option></select>
                                <div class="ep-row"><span>Vu :</span><select id="user-ep">${epOptions}</select><span>/ ${maxEp}</span></div>
                                <div class="star-rating" id="stars">${Array.from({length:10}, (_,i)=>`<span data-v="${i+1}">★</span>`).join('')}</div>
                                <button class="btn-delete" id="delete-btn">Retirer de ma liste</button>
                            </div>
                            <div class="link-box">
                                <div class="link-title">📥 Téléchargement</div>
                                <div id="dl-area" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:15px;"></div>
                                <div class="link-title">🎬 Visionnage</div>
                                <div class="info-visionnage-csv">${anime.infoV || "Aucune information supplémentaire pour le visionnage."}</div>
                                <div id="stream-area" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
                                <div class="info-generale-fixe">
                                    <strong>Attention :</strong> Quand une œuvre possède une deuxième saison qui porte le même nom ou un nom très ressemblant, je créé une seule carte pour toutes les saisons donc les informations comme la popularité sont plus générales, les liens de visionnage et de téléchargement sont biens présents, j'ai aussi inclus par exemple pour l'anime Furifure/2, le slash (/) sépare la saison 1 de la saison 2. Donc quand vous voyez un slash (/) dans un nom, c'est qu'il y a plusieurs saisons, sauf cas compliqués comme Ikenai Koto où ses ses 3 saisons sont en 3 cartes ou Bible Black en une seule. Si ce n'est pas clair n'hésitez pas à poser des questions sur le discord :)
                                </div>
                            </div>
                        </div>
                    </div>`;

                const dlLabels = ['⬇️ Terabox', '⬇️ Mega', '⬇️ Lien 3', '⬇️ Lien 4'];
                anime.dl.filter(l => l.trim()).forEach((l, i) => document.getElementById('dl-area').innerHTML += `<a href="${l}" target="_blank" class="btn-link" style="flex:1; min-width:80px;">${dlLabels[i] || '⬇️ Lien ' + (i+1)}</a>`);
                anime.stream.filter(l => l.trim()).forEach((l, i) => document.getElementById('stream-area').innerHTML += `<a href="${l}" target="_blank" class="btn-link">Lien ${i+1} ↗</a>`);

                // ── Récupération MAL en arrière-plan ──────────────────────────────
                fetchMALData(anime.nom, anime.malId).then(malData => {
                    applyMALStats(malData);
                    if (!malData) {
                        const badge = document.getElementById('mal-badge');
                        if (badge) badge.innerHTML = `<span style="font-size:0.72em; color:#555;">Données MAL indisponibles</span>`;
                    }
                });

                // Adapter le label du bouton retour selon la page d'origine
                const _ref = document.referrer;
                const _bl = document.getElementById('back-link');
                if (_ref.includes('playlist.html'))  _bl.innerText = '← Retour à la playlist';
                else if (_ref.includes('tags.html')) _bl.innerText = '← Retour aux tags';

                onAuthStateChanged(auth, async (u) => {
                    currentUser = u;
                    if(u) {
                        const docRef = doc(db, "playlists", u.uid + "_" + anime.nom);
                        let snap = await getDoc(docRef);
                        if(snap.exists()) {
                            const d = snap.data();
                            document.getElementById('user-status').value = d.status || 'watching';
                            document.getElementById('user-ep').value = d.epSeen || 0;
                            userRating = d.rating || 0;
                            updateStars(userRating);
                        }
                        // Vérifier si c'est la première fois qu'on ajoute l'anime
                        const isNew = !snap.exists();

                        function showConfirm(msg, onConfirm) {
                            const overlay = document.getElementById('confirm-modal');
                            document.getElementById('modal-msg').innerHTML = msg;
                            overlay.classList.add('active');
                            document.getElementById('modal-confirm').onclick = () => { overlay.classList.remove('active'); onConfirm(); };
                            document.getElementById('modal-cancel').onclick  = () => { overlay.classList.remove('active'); };
                        }

                        const autoSave = async () => {
                            const statusVal = document.getElementById('user-status').value;
                            const epVal     = parseInt(document.getElementById('user-ep').value);
                            const prevData  = snap.exists() ? snap.data() : {};
                            const now       = new Date();

                            const updates = {
                                uid: u.uid, anime: anime.nom, img: anime.img,
                                status: statusVal, epSeen: epVal,
                                rating: userRating, epMax: maxEp
                            };

                            // Timestamp premier ajout
                            if (isNew || !prevData.addedAt) updates.addedAt = now;

                            // Timestamp épisode mis à jour
                            if (epVal !== (prevData.epSeen || 0)) updates.epUpdatedAt = now;

                            // Timestamp note changée
                            if (userRating !== (prevData.rating || 0) && userRating > 0) updates.ratedAt = now;

                            // Timestamp terminé
                            if (statusVal === 'completed' && prevData.status !== 'completed') updates.completedAt = now;

                            await setDoc(docRef, updates, { merge: true });
                            snap = await getDoc(docRef); // 🔄 rafraîchit le snapshot pour les appels suivants
                        };
                        document.getElementById('user-status').onchange = autoSave;
                        document.getElementById('user-ep').onchange = autoSave;
                        document.getElementById('stars').onclick = (e) => { if(e.target.dataset.v) { userRating = parseInt(e.target.dataset.v); updateStars(userRating); autoSave(); } };
                        document.getElementById('delete-btn').onclick = () => {
                            showConfirm('Supprimer cet anime de votre liste ?', () => deleteDoc(docRef).then(() => location.reload()));
                        };
                    }
                });

                const updateStars = (v) => document.querySelectorAll('#stars span').forEach(s => s.classList.toggle('active', s.dataset.v <= v));

                onSnapshot(query(collection(db, "commentaires"), where("anime", "==", animeName)), (snap) => {
                    const cDisp = document.getElementById('comments-display');
                    let docs = [];
                    snap.forEach(d => docs.push(d.data()));
                    docs.sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
                    cDisp.innerHTML = docs.map(d => `<div style="margin-bottom:12px; border-bottom:1px solid #333; padding-bottom:8px;"><b style="color:var(--primary)">${d.userName}</b><p style="margin:4px 0; font-size:0.9em; color:#ddd;">${d.text}</p></div>`).join('');
                });

                document.getElementById('btn-post').onclick = async () => {
                    const t = document.getElementById('comment-input').value;
                    if(t.trim() && currentUser) { 
                        await addDoc(collection(db, "commentaires"), { anime: animeName, text: t, userName: sessionStorage.getItem("userPseudo") || currentUser.displayName, date: serverTimestamp() }); 
                        document.getElementById('comment-input').value = ""; 
                    }
                };

            } catch (err) { console.error(err); }
        }
        load();
    </script>
</body>
</html>
